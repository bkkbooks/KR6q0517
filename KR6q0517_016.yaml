body:
  text: 嗣法門人德玉編録筆語上百老和尚稽首拜上國山老人昨夏南樞星降北極虹飛本應隨衆歡呼接足瞻禮緣遵昔命故不敢復徇世諦知在慈育之餘必不罪某慢法耳今雖學衆四來宰官垂護奈人繁用嗇事事維艱勉竭黔駑之才徒效上驤之步以致牽縈坐是舉動靡能久失玄音羹牆更切敢馳微楮代訊興居花稻收成略勝去歲國稅納已過半雖感彼蒼之呵護實賴和尚之蔭庇也聊修輶敬用表蟻誠刻録呈刪悚惶不既來書附青龍石刻初七接來書云收成略勝去歲國稅納已過半復閲新刻語録山僧不禁蹈舞居然一佛出世矣兼之青龍一片荒地曩承遠近檀護及前執事人一腔血汗所成幸爾大衆有依叢林有託山僧縱老死丘壑復何憾焉吾子既踞座披衣為一方知識必也匡時挽敝體從上佛祖之淳風以衆心為心以衆耳為耳以衆目為目夫以衆心為心者其量普而無物不容衆耳為耳者其聽聰而好惡之聲無不辨衆目為目者其明遠而秋毫之末可察是以大海不擇細流泰山不讓土壤世出世間其理一也凡接待衲子唯以本分鉗鎚使彼透脫生死機無大小施之以平等法門叢林之興可卜佛祖慧命可繼為知識者能事畢矣二上教言兩接慈誨彌深捧讀之餘感愧交集況承諭云復閲新刻語録和尚不禁蹈舞居然一佛出世矣又曰佛祖出世蓋謂得人為急欲覓一箇半箇使正法眼藏勿令斷絶某觀今知識說法雲興不啻萬卉爭奇群英鬥麗某以疏才涼德忝録師門雖有上堂等語非敢顰效今時不過應酬請者而已奈侍僧不諳竊録成帙不謂用心未密更被好事者妄災梨棗正是不善游刃反蒙庖丁之稱益增汗顏耳又觀今之學者乍入叢林棄本逐末競習雅騷欲冀行解相應何異龜毛兔角懸絲慧命不幾岌岌哉青龍禪衆邇已屏盡浮華日惟種田博飯雖不能追上古之風規皆沐和尚之餘光而然也時間滿擬月貯龍江雲擔鶴渚趨呈座右以暢積懷齎儀預申伏希原宥三上春來福履與日俱新歲首倥傯未遑趨謁曩因台命兩遵尸素數載遭饑遭饉飲水飲湯幾於安衆無策道左之人未免交口而椰榆之今也歲有豐色衆有和聲國稅叢林亦有內託外護之者愧且喜也然主持之道進退以節代謝以時當此之時委任之限已周休沐之假可請或在座遴賢或遐邇延選伯仲輪肩逸勞宜共同為入室之侶須分法社之憂安忍我獨賢勞而衆咸袖手讀北山之詩不能不掩卷太息且師有言施之以平等法門某亦願師施平等心毋令我一人獨瘁也敬呈偈曰兩度無違領憲言不辭赤手主空門人情有進當須退與世還他古道有來書附青龍石刻自維揚返荊溪半年以來身如破車腳似飛蓬曾無片晷之暇奈何奈何昨見來書云歲有豐色衆有和聲國稅叢林亦有內託外護山僧不勝慶慰乃子福德所致亦叢林厚幸復何他慮至於進退之節分憂之勞此太早計生然青龍一坐具地已曾兩度鳴鼓上堂人天衆前分付與子並無年月期限之說亦非衙署傳舍之所何乃妄生許多葛藤山僧獨慮普同塔及重興隆福碑賴子協力為我圖成待山僧死後不用作供亦不必下語以此二事酬恩足矣外和偈曰聞說昔人曾有言養兒多為起家門須知不奉原非輔古道無如慧命存四上前六月草八日拜誦回札若親提命不勝汗惶內云半年以來無片晷之暇不幾為蒼生太勞乎老年神思不宜過繁所望寒暑自愛是則不肖惓惓之心也某自受託以來夙夜競競恪守常恐隕越以貽前人羞幸芘餘光勉支三載拮据竭蹶安敢辭勞第苦稟質素孱加之籌慮太過百疾洊侵心欲肩而力不逮為之廩廩師資之情寧不閔念昨同公議某某代主法席修楮報聞候嚴命下頒即齎儀延請一見祖庭重任授受匪輕二俾伊人信行樂從莫諉三使某得少息肩再圖報稱一舉而三善備焉此皆發露肝膈瀝膽陳情仰望北風以慰饑渴臨毫懇禱無任懸懸來書附青龍石刻前六月與子書中甚是明白毫無隱匿何故徒勞跋涉枉廢人力子既擔當佛祖重任升座說法開示後來可謂人天師範矣夫為人天師範者人莫行而行之人莫忍而忍之人難能而能之唯慧命為念弘道是懷以至功流百世名垂不朽雪後始知松柏操此之謂歟今青龍雖不大備僅避風雨遠近檀護皆知向佛亦可化度地僻景幽儘可行道欲舍此而他往我不知子是何意也不及盡言惟子勉之五上某以譾劣辱諭諄諄夫佛祖重任豈易擔當人天師範寧容濫竊易曰非所據而據之身必辱又曰德薄而位尊力小而任大鮮不僨乃事者與其隕越於後孰若規避於今再四籌維心神俱耗而夙莫靡寧者此也來諭云行人所莫行忍人所莫忍勗勵不肖至矣厚矣然返而內訟福慧兩無如觸籓之羝進退維谷欲逡巡謝事難逭方命之愆勉力重承又獲辱命之戾兩者之間無所逃罪時權其重輕則方命罪小辱命罪大寧處小而避大所恃慧照矜其兩難開其一面庶幾天高地厚之中稍可容足儻仍不允所請惟賦歸去之辭縱臨嚴命不遑顧恤極知狂瀆必犯雷霆願霽威曲原憐而可之則某幸甚法門幸甚來書附青龍石刻青龍一剎悉屬檀護脂膏所為與山僧何預焉況山僧於人天衆前兩次委付與你無不知者故爾放浪煙霞息影巖壑以待殘喘而已且維揚荊溪二處葛藤尚未剖斷何暇復顧慮於青龍者哉今而後更以瑣末事煩亂山僧者作不孝論至囑至囑與坦菴方學士鼎台嚴重望風度者物色無由幸方外人數獲抵掌迭蒙供賜良繇桑梓情深故爾垂青破格山野無他于請惟先師塔銘是用表章雖名卿巨公與師交游者往往不乏咸欲吐班香發宋艷為先師潤色然山野之意但祈徵實毋取增華計唯檀護交師最密知師最深華袞之筆當代史遷法社董狐一經品題便成實録俾千百世而下信大檀即信先德信先德始信參叩即參叩而悟本來令先師一片婆心人人透徹其為表章非止筆華墨焰供人豔賞已也昔張公為湛堂作銘流譽至今檀護又等而上之矣區區之私向己面陳隨蒙俯允今登玫在即遣僧走領以光不朽謹愧腆儀統希莞存來書附交游方外三十餘年前蒙開導捧誦法檀悔晤遲矣復諭為令師作塔上之銘況百老人中外知識朝野欽崇疏拙之才奚堪取重勉承慈命權為撰訖書訖外命選佳集已竟復僭辨數言敬付來者幸並察入隆惠遠頒卻恐不恭拜登容謝答檀越借牛踰月不聞音信正此馳思伏領華翰就覓一牛大為疑矣不知公之所覓者露地白牛耶放生耕牛耶若是露地白牛人人本有只因無始以來貪嗔癡妄反為昧卻君但己覓安用他求若是放生耕牛誠私用常住一涉私則為盜豈盜用常住而稱善知識者未之有也山僧自出方外與世漠如雖主法席室無長物不履豪門叢林巨細盡付執事出納支藉無復相聞惟普柳粥飯隨衆而已任緣住持不作常日想然此露地牛放生牛名別體同非一非二總在爾我一心之變化耳嗚呼今之不見先佛模範專事諛媚取招提之物或己用或人情識者憫笑恬然不知斯語若不向公吐露則殆無開口處願公採聽原宥不宣復善權西堂時一大師附丁未冬來書存兄稟質素贏弱且又年來多病不意竟歸寂於善權此皆定分似不可強者弟觀善權奇峰秀水古柏喬松實為江南名剎且佛殿自唐迄今朝凡幾易而嵬然無恙豈非鬼神呵護所致耶況又列剎相望龍象奔趨之所非如青龍僻奧禪衲難於往來也故老人遺命建塔善權以為可行道安衆耳然有其地須待其人弟揣非兄主持不足以振起先人之道何也兄知見精確足以服衲子股肱得人可以禦外侮才識淵贍足以慕士紳所慮者惟錢穀耳但使座下常有抱道衲子錢穀何足慮哉惟冀俯從衆願不虛來請法門幸甚老人幸甚老人去後未經三載不幸彼蒼繼喪哲人痛也如何某本道德荒蕪學識疏淺無論仰愧先賢即當世導師機語峻峭博辨縱橫敬嚴法道禮樂文章皆遠遜諸昆仲而愧弗若者也負愧之多於此而來教獨承謬愛者豈信有異乎人之心聽有異乎人之耳哉然雖過譽良多實亦難逃方命之罪況青龍屢辭先人不克是願今尚未得解脫將見銅駝薶荒草有日矣祗候方丈有主當容荊請臨風拜謝不盡欲言與諸山同門天下有可定不可定之事亦有可定不可定之數今以先師塔基徵之果然不肖未出青龍造塔之念萌之久矣既赴善權造塔之心無刻有間第所難者一坐具地耳四處訪求只澗東茶園稍可小就塔基遂請辨山且和尚起龕荼毗獲大小舍利不可勝數鎖子靈骨五色斕斑齒牙目睛全如故不意上蒼顯靈先人默佑忽於冬初有徽商尋得萬松嶺後一穴願酬重直即被舊住契賣不肖於中竭力挽回將茶園嶺後二地卜之於蓍龜鬮之於韋駝咸歸嶺後此非定數也耶然是處乃一片童山人多忽略豈天留以副先師遺命乎地近從銅棺山起伏來寺結太陽金星復左抽辛龍一脈聯絡五六水泡翻身逆勢有回龍顧祖之意入首太陰金星開窩吐脣龍虎四五重峰巒三十六逆案重重密羅以拱抱寅艮水源轉巽巳午曲屈到堂歸戌庫入洞口而杳不知去處灼龜者云局勢弘偉氣脈壯麗信不誤矣今觀此地不現於前不現於後而獨現於造塔之期微天之定數曷以至此且今山向甚利又得十月草四良辰故頇為入壙之舉而建塔之需非三百餘金不可時下十未及一不知將來何所措手特遣楮生代為報聞儻貴冗稍間或能移玉塔前一觀始信山靈有待耳致諸山同門癸丑九月十九日徑啓善權為先老人拮据之地自西歸以來九載於茲奉安靈塔工程未竟操不揆庸劣自竭愚誠黽勉卒事庶以存先人之遺意於無窮也詎意王林竟仗凶威恣行貪噬將圖鳩踞鵲巢何異指鹿為馬借官府之氣勢一日而封門者踵來倚吏胥為爪牙持籤而驅逐者雲集山門霹占嗟堂構之俱傾香火潛移悵神靈之何託自有蘭若栴檀以來未有弱肉強食入室操戈至於如此之甚者也操以不才謬膺郡邑檀護之請繼席善權三年於茲矣靜守清規勉敦苦行幸無愆失衆所灼知今日避此凶鋒畏其虐焰跳身而去徒手而行將老人苦心基業一旦都拋智不及謀勇不及奮嗟乎已矣又何言哉惟是山場可棄塔院難捐欲去則松楸無主忍聽啼鵙山頭欲留則榱棟不存難伴孤鴻月下誠進退之維谷並啼笑而俱難所望於我同門諸友道存傳拂誼切同衣應念在原之急難無忘將伯之助豫恩先人墾闢之勤憤彊徒侵凌之慘一瓢一笠冀隨野鶴飛來千水千山豈被閒雲留住諒有同心無煩贅說行將陳情瀝血鳴徹九閽亦且罄竹揚波播傳六宇何忍懸燈之遽滅豈甘花雨之終湮鯨吞既盡即法座亦屬於他人蠶食何窮恐扃泉莫保其抔土興言及此殊足寒心凡曰有懷能無奮袂所望惠然來臨萬勿漠爾慗置復雲間衆護法癸丑十月十五日一別三載坐臥神馳帶水盈盈遙峰歷歷輒隔知己之話言徒勤野人之寤想時詢福履用慰鄙衷茲承芳訊遠頒敢不舉山中異事敬陳左右誠所謂禍出非常魔高千丈者也王林憑恃凶威鑽營捷徑必欲盡踞天下之名山不遺人間之片土嚮年垂涎龍池而不得孰意其處心積慮耽耽於善權而不已也誑求當道賄結吏胥逼奪山門驅逐僧衆慘同破巢而取卵惡等禦人於國門痛念先師一生艱苦經營善權心力殫盡墾荒田者百有餘畝賠空糧者一十五年向之傾頽破碎者為之塗且蔇矣向之蕪沒荊榛者為之耕且普矣向之逃亡逋負纍纍官牒如山者為之剜肉醫瘡東支西補追呼無警官民兩安矣誰為為之皆先師一生艱苦殫盡心力為之也而今且鵲巢鳩踞張耕李餐矣然此皆為世俗言之也出家衲子本無所有山河可捨頭踵可捐一切皆空何貪何戀浮塵渺渺何非駐錫之場大地茫茫豈無容鉢之處身與閒雲而共住心隨野鶴而俱飛視彼血戰千場何啻空花一笑所可恨者先師自維揚西歸九載於茲奉命建塔善權蓋生平未盡之願力欲待補滿於將來也故操雖退院讓山明勢力之不敵而修塋守塔則生死以之假令狼心復逞鴆毒彌深侵及幽宮讎加枯骨操雖至弱至孱無才無力亦必張空拳而冒白刃奮螳臂以當巨輪堂堂官宰赫赫上臺豈容白日青天之下有此窮凶極惡之人或遇廉明執法獲申冤慘覆盆未可知也聊抒積悃以答來鴻容俟飄搖稍定彊暴稍寧更圖良晤再罄餘言致諸山同門甲寅九月十九日徑啓善權之事灰飛瓦裂一至於此恐法座在遠往來傳聞之語未得其實故敢披陳左右以為一笑善權之有陳祠由宋朝撫幹公捐資入寺買田常住歿後立檀越木主於寺側每年忌日一祭雖覺於叢林之體有礙而相沿至今多歷年所其勢固難以猝革故老人在日只禁其葷酒雜沓酣酗流連自是僧俗俱安十有餘年矣不意玉林攘奪之計已行貪婪之心無厭鵲巢彊踞既操同室之戈矛臥榻安眠豈容他人之鼾睡遂以吞占僧堂道院之故智復施之於陳祠百計多方令其折毀以詐誘之而不得以勢壓之而不從乃於九月十八日者乘其忌日公祭通族之耆長咸萃於祠揖拜未終拳棍猝發陳氏之衆披靡而遁遂乃焚其主撤其宇棟牖垣牆頃刻而盡於是陳氏之衆人懷義憤之心家有報仇之志不呼而集不約而同霜戈齊奮烈焰遄飛既僧俗而兩傷復殿宇之俱燬吁可哀矣尚何言哉善權之大殿重建於唐之大中陳氏之木主始立於宋之嘉定歷寒暑而無遷閲滄桑而不改至此而俱付一炬同為瓦礫悠悠蒼天此何人哉回思去年攫奪之時勢焰熏天英雄蓋世大地河山盡歸其掌握百千萬億莫遺於錙銖法堂鐘鼓變成戰鬥之聲獅象山門視為篋囊之物今安在哉亦可愧矣雖然彊徒之自作自受既惹孽火以燒身吾輩之旁觀猛省亦如冷水之澆背試看昔日之峨宮大剎今日之敗壁頽牆也昔日之瞋目張拳今日之焦頭爛額也昔日之鯨吞虎噬滔天燎原今日之斷煙荒草幻影空花也言念及此惟有戢足深山藏形窮谷豈可復與彊梁之輩角逐於血肉之場貪癡之人較計於沙塵之末此不肖之所以棄道場而不顧委塔院而弗爭未必非止亂禦暴之良術也時因便郵率此陳布仰祈高座勿吝惠音辭荊溪衆護法乙卯正月初十日貧衲自前年九月受彊暴之侵凌遭凶魔之迫脅漫云操戈於同室實類禦人於國門彼以爭鬥而來我以退讓而去山門法座竟屬他人方丈蒲團忽焉易主此乃塵劫之稀聞抑亦叢林之創見者也所可幸者先師數年之拮据尚留有待於將來貧衲三載之修持可告無罪於大衆攜瓢獨往心隨秋水同清振錫重來跡共白雲俱遠江湖空闊容鷗鷺之飛翔林壑幽深任鷦鷯之棲息跳出是非之海移來安樂之窩聊寄北郭一枝即同西方淨土溪聲山色觸目如新鳥語花香依然似舊笑彼癡愚攫奪自云萬祀千秋誰知轉盼之間已有灰燼之事金戈鐵馬不聞法堂鐘鼓之聲冷火寒煙豈睹蘭若樓臺之影黑焰熏天昔日之貪嗔何在枯骸蔽地今朝之寂滅誰憐始於爭奪者終於焚殺始於攘臂者終於挺刃始於一念之焰者終於燎原之火非獨人事之必然抑亦天道之無爽何意斯人乃昧茲理彼雖身致其殃吾實代為之愧痛念幡幢片席戈矛遽至於斯靜思衣鉢同源狐兔悲何能已所以遙瞻遺剎每惆恨而不前回望故山輒踟蹰而卻步者也茲承各位大檀越地方諸善信憫千年之香火無依喜一日之煙塵乍息還推貧衲復住善權此皆護法之虔誠亦是空王之默佑但在某千遍圖維萬難如命者孤飛野鶴安能再入攫食之場出岫閒雲豈可重游湯鑊之內況乃頽垣碎瓦殊難布地而成金敗壟荒畦豈易鋤雲而種木龕燈夜火何堪遍照宵燐山舍空廚豈足散施饑雀在昔日補殘葺敝尚未臻厥成至今日舍舊圖新應更難為力伏冀大檀越克成善果廣求善知識弘啓道場將見山頭柏影依舊凌霄洞口泉流仍前戛玉香臺嚴麗琳宇輝煌庶幾法輪不墜人天交慶於無疆蓮座常明道俗群歸於有象在貧衲私心克慰彌切瞻依即先師願力終成何勝欣荷云云請靈機大師乙卯三月十五日善權一席自老人駐錫以來十有餘年矣拮据維艱補葺稍就其未完之願力實有待於繼續者也乃存公嗣登法座遽爾西歸貫兄再繼禪林翩然遐棄由是衆檀共推不肖黽勉從事庶無隕越以遺羞競業自持敢謂恢弘於前烈奈何道未高也魔已隨之鵲有巢乎鳩將踞之彼王林者騁狼心於一往營兔窟於多方謬云清淨實行攫奪之謀罔曰尊卑竟恣彊僭之術獅王象祖幻成鐵馬金戈貝葉蓮華翻作刀峰劍嶺不肖自愧疏庸殊慚蹇劣固應避此凶鋒豈可攖其毒焰抴笻而去鷦鷯自寄於一枝掉臂而行鴻鵠已翔於千仞曾幾何時天暴其跡正云孽自己作妖由人興嗟何及矣謂之何哉所可惜者千年之棟宇倏爾無存百代之祖庭渺焉何託茲者風波梢息灰燼方除郡邑紳耆望幡幢而遐跂往來知識瞻檜柏而長嗟謂頽垣碎瓦之餘猶可重興蘭若思冷火寒煙之後何難復睹香臺瑤函纍牘寶札連篇挽出岫之孤雲返故山而再住雖衆信之虔誠實萬難如命者然念先人之餘願未終禮菴之工程甫訖聽山頭之啼鵙豈甘華雨久湮顧洞口之流泉何忍法輪常墜必有高賢克成弘願自非碩德曷濟艱屯恭惟某老大師修持有本法力無涯誼均同鉢能無水源木本之思望重諸山可堪起斃扶衰之任仰冀大慈俯從群請惠然肯來快睹人天之有主不我遐棄欣逢道俗之攸歸三華四樹常瞻高座於人寰萬嶂千巒豈阻孤笻於天末將見翠樓紺殿法鼓重新白石流泉松風似舊此誠無量之善緣莫負群情之切望不獨慰遺構之有成亦且慶傳燈之弗墜與明因衆大師顯聖為曹洞滴宗祖庭為規矩所自出非如草菴木主易僧更派換主遷宗者比也若乃祖堂牌位為左右昭穆住持先後所自定百世不祧千傳無改孝子順孫莫敢擅便爰是住持有住持位外剎有外剎位何乃顯聖竟將一不住持之牌位混入於住持位中此古所未有而今創見者也據云明因牌位係西遁居士為令師謀住顯聖有礙不得已而以牌位插入於中為一時之掩飾其說妄也且明因牌位愚菴老人主法時送入上無住持二字愚菴亦不送入住持位中何待愚菴示寂後煩西遁送入住持位中非惟不能與明因增光適足以取辱明因耳萬萬無是理也厥後住持四易未聞有異議至俍和尚鼎新祖堂勒有貞玫不住持者只許供傍楹碑文俱在其可忽諸是明因牌位斷無混入住持之理也明矣承諸位力移於旁楹以息衆議明因一枝殊堪慶幸俾死者得妥於九泉生者得沾恩於一面窮於法者俾通於法法門護法公其人也恐我回辨山後或輕信誘言復搖牌位混亂紀綱諸山共舉問罪之籌齊集祖庭之內有纍令師難幬衆位幸熟思之慎毋輕動與善權主人昨有禪者忽來告假某詢其故則云有要移老師靈骨過嶺建塔又要拆庵赴彼故預為之計某以茲事非可懸論建塔之舉固將計日而成功出菴之圖何事望風而退避用敢披陳本末仰瀆左右者某自辛亥應請善權即為老師擇地買山開基建塔此雖弟子之恆職抑亦老師之遺命也老師臨終諄諭每在善權一片石但使窀穸無虞松楸在望則繼嗣者之心可以無憾而老師之志亦可以少慰矣然風水之吉凶蓍龜之從違衆論之僉同與否固未暇深計也其時屢呼將伯未聞慷慨而助豫念同門疇能黽勉以從事同衣之來者不過九人捐資相助者四十餘兩餘皆親知告貸那東補西尺籍具存片言無誑況乃凶魔突起致使善權一席委於荊榛瓦礫之中而靈塔巋然無恙非獨老師陰持默佑抑亦善神有以保護於無窮也至於禮菴之建一椽半甓粒米銖金從未有樂助之衆在家之祖業變賣湊用者有之數載之拮据木頭竹屑者有之今欲別營塔石遷移靈骨者不可謂非純孝心腸菩薩願力嗟乎人之欲善誰不如我我以福薄才疏營建未能竣事奉祀未能盡誠方在夙夜疚心之際他人有能代終厥事者在某亦可以少逭其辜也但前此之勞吾實勞之前此之費吾實費之今既廢而不用舍而他圖某當措處來金奉還原助則塔菴之一石一木皆我之所自為之他人無預也俾得二三知己悠游率歲於其間而禪者何必去我亦何必留哉統祈上裁佇聽垂示請北溟大師伏以靈鍔藏鋒待贈於善器之傑慧燈吐焰必耀於熙世之時緇素咸欽天人共仰恭惟某大師座下智廣道高聲尊德邁胸羅星斗而宗律雙融舌捲風濤而韜略兼備芳標明於大鑑清範重乎連城誠末運之良規實狂瀾之巨筏也某蓬蒿短翮譾質庸材承乏當山深慚影於塤箎之列復膺國岫願安師於塔石之間謹當遜位推賢用是齎書迎駕恢宏道力勿吝仁慈白鶴翔南盼錦帆而速屆青龍佇北企金錫以遙臨震法雷而寒巖競秀施甘雨而枯荄爭榮不勝翹勤顒望之至復同門伏以節屆中秋丹桂香來雲外律當南呂黃花信報人間物類含輝天時協吉恭惟某座下崑岡良玉合浦明珠金錘匿彩囊括九峰之秀寶鏡韜光胸藏三泖之清新豐賴以流芳靈隱借之垂蔭實古今弘範緇素良規也某白社散人皖城末學忝居祖席代庖已越多年虛度韶華幻夢叨生五秩赤圭競守自知荷負門牆紺宇少加敢謂肯承堂構金飆曉發玉趾遙臨冒雨衝江誠若掉舟訪戴披風越境心希懸榻下陳奈信宿不留繾綣之餘情猶耿筐筐遠疊殷勤之厚誼何申臨楮神馳肅謝不盡賀同門伏以菊綻三秋百卉育芝蘭之秀星臨九月千峰騰珠玉之輝天和既萃於長嬴人類咸蒙乎康阜恭惟某座下胸羅寰宇氣冠諸方明暗隨機露秋光而藏春色主賓全用看北斗而面南辰德揚國岫之聲今猶載道法雨天華之頌早已曾聞振回末世紀綱復古見時禮樂某株守海涯徒懷山仰欲瞻風度莫罄雲從九頓荊溪遙致華封之祝三熏寶鼎載賡魯頌之章謹獻蕪言少申微悃專祈慈納不盡神馳弟子德備資敬刻方丈和尚語録第十六卷惟冀現前緇素生生悟自性圓明法界含靈各各獲常光瑩徹
