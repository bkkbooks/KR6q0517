body:
  text: 吳江顧有孝茂倫王載咸平評定同學諸子參閲鳳凰十詠已下俱和韻三星閣臨流傑閣自天題半展丹青與日齊不向家園供嘯傲惟同雲月老山溪顧茂倫曰三星閣出自御學不向家園供嘯傲深得徐文貞晚年心事鐵漢亭客去留亭想鐵公竹窗似立畫圖中年來筆下無窮思盡付山前一笛風徐介白曰東海風流如見且止園簇簇雲留洞口春殘碁半局且陶真山花野鳥情無盡何必桃源去問津趙之曰興致悠然錦溪橋虹枕蒼波勢欲飛水聲西下浣苔衣花開兩岸搖紅影鎖住春光不放歸王咸平曰自是道人本色語莫錯會山月軒軒前山色滿闌干軒裏清光照影寒相識只餘山與來同客細盤桓顧茂倫曰山月俞先生為方正學門人保方氏孤初冒險姓後更為余萬脣時橋延筠督學南幾疏請復方姓山月其讀書齋也弔古之什妙在不實寫其事芙蓉莊露染紅英出短牆迎秋又欲占秋光窗開十二煙霞徑別是人間天一方王雙白曰大為拒霜花生色南村宅半山半水半村居野色空濛霧捲舒閉戶不聞塵世事消間且閲古人書殳山夫曰即埋甕樹下摘樹葉書之滿甕更見他甕所謂輟耕録處詩有遠神使人尋味不到來儀堂窗懸一榻早安排茅屋交遊柱石才道是鳳凰棲隱處好教明月入山來包明成曰詠鳳凰而獨舉明月匪夷所思梅花樓方伯欣栽冷淡神繞樓花放淨無塵不勞寒策孤山蹇自有香飄滿室春王咸平曰方伯謂莫公中江也人品書法俱能一筆寫出摩霄壁青山江干第一峰劈開半壁勢重重雲來拜石橫難度倒臥長松欲化龍姚文初曰壁下有拜石堂堂去面壁存讀起一句想見振衣千仞之厙公八詠採藥徑林幽復道亂雲飛石子高低繞翠微採藥厙公隨月轉清歌一曲踏香歸倪天章曰單公如在呼之欲出藏書函書藏年遠待誰還雨老蒼苔點石斑分付山靈深寶惜莫將一字落人間葛瑞五曰只恐寶惜不住奈何覽德坡山前客到想高流剩得清輝月一鉤為問當年誰覽德知心只有鳳來遊顧樵水曰只舉明月鳳自來遊此意甚深旨鼓琴石一爐沉水一張琴留迹空山歲月深滿塢松風鳴舊曲卻無鍾子孰知音王咸平曰感慨釣漁磯一片巉巖臥碧溪水痕濃淡浪高低苔深不見林鴻迹時有沙鷗月下棲金孝章曰苦拈漁釣未免失卻磯字此為得之洗鶴灘溪老幽情古渡邊誰將素練浴胎仙潮來兩岸雲千片猶報風流勝昔年殳山夫曰鶴為仙人之騏驥方發得洗鶴意透士衡河橋之歎正未夢見在鄭公莊曲徑深存五柳風小橋斜架石玲瓏不應輕放間名出盡把棲心覓鄭公顧茂倫曰道著多少名人病處悔恨處真是度世慈雲陸寶村高風陸子露華清藏寶誰留去後名過客欲詢棲隱事枝頭啼鳥一聲聲周安節曰吳時陸氏藏寶處曰陸寶山後人爭發其寶山遂夷為平壤藏寶誰留去後名一語冷極佘峰十詠徵君故廬山水多年皆舊識文章六代起東南徵車不與辭庭外門掩春風共笑談程石門曰老杜哀壑無光留戶庭不及此起句之深遠道人舊址多年玉麈寂雲屏尚有人來訪二青踏遍殘霞何處問關關啼鳥悟空靈顧茂倫曰大青小青聰道人所留二虎名客來不訪道人面訪二青卻似當頭一棒講寺竹林上方瀟灑報平安一徑扶疏列萬竿山靜竹風涼似水老僧六月尚餘寒安大己曰此之者道人六月賣松風句更勝一籌香溪石徑藤花壓水滯輕舠剩有溪眠一徑高人在畫圖行欲盡不知身已醉溪桃徐嚮芝曰別有悟入處沐堂曉日日出先蒸谷口霞光搖殿角半窗斜客來獨把琅玕拍一簇金流滿地沙丘嶼雪曰昔有人上抱犢山見日出散髮大叫宿疑頓盡亦是此意塔院午鐘庵居溪畔似山農愛打棲頭日午鐘不問人間天早晚聲聲帶翠落危峰王咸平曰晚鐘晚鐘詩多午鐘詩少此作居然獨步層霞高閣一閣高懸碧漢間霞光滿貯醉人顏重重門掩重重水面面窗開面面山陳長發曰如身立赤城之巔與五百應真相往來無一字經人道過白雲曲沼雲水鄉沾彭澤居臨流洗墨繞遊魚橋邊活計三株柳石上生涯一卷書張九臨曰唐子百山靜似太古日長如小年不知誰為第梅花書屋深入長廊曲徑幽交加冷豔壓羅浮書邊一枕春風老疑是和身臥雪舟領樵水曰曾同山夫雨七醉臥其處讀此詩情境俱真何必向羅浮遊也東山草堂一室深幽抱石蹊道人多半借雲棲有時直向東山去那許尋芳信杖藜徐禎起曰有空山無人水流花留之致細林十詠崇真曉鐘巖高金闕白雲封別是蓬萊訪舊蹤為惜下方清夜永一聲夢破五更鐘周其凝曰他處曉鐘移易不得金沙夕照霞回斷靄影初沉風響仙巖雜梵吟不必滿山鋪碎錦直教遍地是黃金湯兩七曰與前作風格相同丹井靈源玲瓏三尺老山根傳是雷開冷石垣不信丹成仙去後誰遺海眼貯乾坤濮淡軒曰眼界大放淡令香嚴海性不止為仙家點綴西潭夜月澄潭另是一江河每對澄潭發浩歌人月雙融寒不溼水天一色淨無波錢礎日曰千偈漏觸不如一句道破素翁仙冢鶴去峰前曲徑幽仙蹤多為白雲留白雲也道仙蹤好一枕青山萬壑秋殳山夫曰彭素雲元時人洪武初遣中使召之忽化去其仙迹甚多于嘗有山中人導觀仙冢長句頗為同人嗟賞讀此自覺形穢矣義士古碑誰識深山表義碑芳流千古賑時飢斯文寄與煙霞道日日飛來護莫遺殳山夫曰此元夏義士樁也碑臥荒草中山中陸俟菴欲策亭覆之當鐫此詩子亭中亦一勝事洞口春雲空明一寶巧成紋緑樹參差散遠芬徑外似聞雞犬吠仙人知有臥深雲俞無殊曰宵然仙境晚香遺址山川夢老錦千堆風月猶餘土一抔草色似知憐故舊年年帶雨上高臺趙砥之日滴紙寒香甘白澄泉石罅流來色愈鮮甘澄不讓漢宮泉誰將靈液移於此放出東山一線天華漁石曰色聲香味俱足五爻奇石攜杖搜奇入翠巒雲根早得附金蘭乘間共坐溪邊月倣佛論交話歲寒包朗威日米顛呼石為丈後人繪圖傳之此詩亦可畫也玉屏八詠紫芝巖天開瑞靄繞層阿三秀光含紫氣多春到巖前花滿地猶驚人唱採芝歌王咸平曰偏寫得不寂寞玉蓮池水鏡深沉照玉顏花光一色繞池間含情似欲人同語擬是瓊仙月下還黃敘九曰水光花色是一是二會心處正不在遠仙人床閬苑仙人笑語溫白雲一榻臥黃昏年來想是飛升去枕簟猶餘石上痕徐介白曰字字飲飛學士亭窗開曲岸抱清溪雲作珠簾捲戶西視草不須人秉燭一亭明月代青藜顧茂倫曰亭為諸乾一所染二沈學士翰墨風流千載如新詩中有圖分明一幅學士亭圖興雲嶺高疊空濛映遠岑天將時雨便成陰悠悠不欲從龍去道是無心似有心安大己曰便有最陵高臥之思苦節碑風摩斷碣倚雲隈自分冰心老不灰素節若非堅白玉清名誰肯勒蒼苔戴耘野曰苦節先生二沈學士之父也碑為風雨剝蝕得此詩如珠光劍氣不復可宜晚堂興老林泉白髮新滿堂秋色一間人賓朋揖別香山後尚有黃花作四鄰陳長發曰林下何曾見一人曹時中自堪不朽詩足配之景華橋玉屏山隔水西疇勢展蒼龍枕碧流無那題橋人去後至今華月鎖溪頭徐禎起曰唐人風調大陸八詠丹霞嶺丹巖一帶淨如春目斷雲霞憶古人誰解登高生隱思不隨青夢走紅塵周安節曰喚醒多少赤鹿坡草眠赤鹿幾榮枯鳴入斜陽半有無想是尋芝回嶺去石邊遺迹月同孤王咸平曰只落落寫大意自好實發赤鹿便俗平原村一灣流水小橋過煙柳人家枕緑坡啼鳥聲聲渾似昨聽來疑有客吟哦歸元功曰士衡十年閉戶讀書即此地也俯仰之間便成今古詩能引人著勝也寶樹菴煙堆怪石翠森森蘭若初開玉樹深青磬敲殘幽夢冷梵音原是舊書音陸孝山曰以音聲作佛事真珠浦潮回浦口浪初移白鷺隨風展釣絲每欲尋珠來水面輕帆一片逐雲馳金孝章曰從白鷺入想幽極異極通首輕雋回風舞雪不足喻其萬一大陸亭玄圃光華冠世雄亭留石上正思公知心端是雲間鶴又自巡簷唳曉風程石門曰弔古興哀覽宋沈遼詩尚淺醉眠石不羡功名不羡仙杯斟竹葉飲青天笑看醉裏山河小一枕清風抱月眠白雪灘寒深玉骨暗飄香疏影平鋪傲衆芳寄語青山嘗作主莫教空老白雲鄉橫雲十詠連雲峰縹眇層巒懶不飛散成波浪奪天機風來陳陳吹難斷似待蛟龍雨未歸戴耘野曰山石固奇詩亦筆飛墨舞麗秋壁秋入山城影欲然驚人滿眼醉風煙不知霜老樹中樹惟見雲酣天外天周安節曰橫雲山多奇石見于山夫贈山石序又復見之寒和尚詩諸篇奇妙獨此更稱奇絶碧崇巖空臨一嶂碧雲涵似有苔錢障瘦巖我欲乘間來拾翠侵人寒色手慵芟王咸平曰正復不慵雙泠澗山分素練小亭西燕尾雙承石浪低玉漱雲根寒枕枕誰遺琴瑟一清溪倪天章曰溫潤中饒有異光熊熊太原碑為憐斷碣半山斜石蘚年年點落花有客頻來敲不去只留名字老煙霞來谷潭練入深雲洗嶽嵐擬將新月釣寒潭源流欲問來何處自有漁人為指南吳海序曰一往破的清風院樹樹花開不自刪瓊林幻出老禪關一聲鐘落山光曉贏得清風滿袖還徐介白曰列子御風行後重見此詩忠孝祠深開畫棟列英豪名節雙懸日月高血灑不妨山亦醉猶存松柏見貞操沈偶僧曰謾謾如松下風謫仙菴竹裏仙居翠欲分風敲石戶掩山雲當年獨唱清平調漫散天香處處聞李膚公曰似謫仙人句白龍洞傳説飛騰風雨遊雙溪深鎖石門幽山靈昨報重歸壑滿洞間雲淡不收顧茂倫曰每于無可著想處得最異之想大奇大奇天馬十詠二俊堂英譽曾魁翰墨場滿軒詞賦頌聯芳名高山斗千秋重茅屋還存俎豆香孫無言曰弔二陸者多貶刺之辭此作不失忠厚和平之遺平原兄弟有靈當復空山夜哭三高冢壟上花開連理枝四圍春色護穹碑高人去後憑誰弔日落空山鳥語悲顧茂倫曰楊廉夫錢思復為寓公陸宅之乃郡人太守林公慶同葬之于山人奇事奇三百年後又得此詩嘻何多奇也雙松臺森森臺畔立雙松待鶴心堅不受封幾度春秋無異色影搖千尺看飛龍畢西臨曰詩思堅挺如徑草之受疾風一柱石臨虛峭似筍抽條風雨揩磨渾不凋只道近天剛尺五那知身已在雲霄金亦陶曰氣格高渾濯月泉石出靈源照眼明悠悠浮玉映山城落花不與春流去深浸寒光轉二更顧樵水曰指月拈花無處無妙悟看劍亭干將亭下隱孤巒付與春風帶露看冷焰不隨天地老清光直射斗牛寒王雙白曰是説劍不是説劍憑人築著築不著莫負此老婆心八仙坡石坐群仙列紫苔想從渡海入山來松醪共飲三更月一曲清歌跨鶴回李膚公曰峰頭笙鶴儼然未散半珠菴誰剖珠函挂碧層煙光欲露翠猶凝曉來池上分清影半屬驪龍半屬僧葛瑞五曰千錘萬煉絶不露半分斧鑿痕留雲壁高崖花落蘚紛紛峻峭何妨宿斷雲顧影不嫌山寂寞疏鐘猶帶扣斜曛揖秀軒春入朱欄夢眼醒笑談面面海山青簾前一樹山梧好時有清聲到耳聽王咸平曰詩以秀出以秀入崑岡十詠婉孌堂貞風如昨想青袍處士文章價並高月照華堂憐影瘦偏宜擊鉢助詩豪殳山夫曰婉孌堂為陳徵君初隱之地後移居東佘白石起二句正指其實事更得虛步神虎穴曾聞聚石講山頭伏虎還應似狎鷗何日好風生穴外一聲長嘯滿林秋徐電發曰後二句用事化用意沉紅菱渡菱葉菱花傍水開倒牽山色浸樓臺一聲款乃微風起滿棹清歌兩岸來陳長發曰竹枝詞無此清麗采蓮歌無此靜遠楊柳橋楊柳橋邊楊柳風楊花點破碧玲瓏不辭帆落溪風裏只看人梯水鏡中顧庶其曰絶句推青蓮龍標第一此作倣佛似之乞花場間情老作百花場山水隨緣乞卉忙信手攜來培一徑春風猶在四鄰香丘興雪曰徵君自詠乃有此神境白駒泉生芻空谷惜幽間時對清流見素顏皎皎情懷君莫問遐心一片付潺湲涌月臺夜光如水涌無聲最喜登臺照影清乍見只疑山雪曉細看又道海潮生顧茂倫曰陶煉洗剝如仙人之三反毛五伐髓疑有龍伯泛濤吹鐵笛至也紫藤徑紫藤百尺走龍蛇影動還驚草字斜兩岸人家如畫裏蒙茸一徑倒懸花俞無殊曰清老中娟姿躍出玉光亭湖繞欄干野色侵幽虛滿貯水雲深偶來獨坐消間日只有沙鷗識此心趙砥之曰妙在無意中説出攬翠閣山家樓閣繞煙蘿遠接嵐光挹翠多昨日東風吹雨後窗前又見碧雲過九峰九詠一峰梧館曲曲清流繞萬松山重重又水重重鳳凰何處棲梧館只在雲間第一峰俞非指曰鳳凰山為九峰之冠此詩亦可以冠九詠二峰嘯亭攬德坡邊積翠濃厙公採藥破苔封一聲遠嘯間亭外滿徑晴雲鎖二峰顧賓臣曰幽興三峰靜軒蹊分雙嶺水淙淙月隱東西破曉鐘好向靜軒軒裏問佘山誰為號三峰周長康曰為子瞻只緣身在此山中句作一喝宛然如遊廬嶽矣四峰隱廬羽化丹丘樹化龍雲生洞口草生茸遊人是處尋廬隱那識茅廬隱四峰徐行之曰絶去拖泥帶水五峰吟閣薛子情留谷口逢千林歸隱一枝笻夜來吟罷離高閣猶自梯雲上五峰吳聞瑋曰玉屏在九峰中為最高峰近來種梅萬株吟與詩尤清遠六峰琴齋山老平原舊日容鶴聲不返去何從朱弦彈冷琴齋月尚有餘音響六峰顧英白曰如聞琴韻在古松流水之間七峰雪堂二俊風流錦繡胸春光一片淡溶溶誰將白雪堂前和留得高人在七峰陳集生曰高人題詠勝于麗秋時應有此嘆八峰竹樓石壁雲開挹翠慵當窗晴景抱遺蹤金篩竹影樓頭日返照澄湖浸八峰顧始菴曰瀟灑家風九峰奕圃一著先爭巧合縱青山列局自天鎔間敲奕圃燈花落餘響悠悠散九峰趙山子曰九峰倡和詩盈星充棟推凌山英先生九絶為壓卷今得寒大師九詠數百年後重為山靈增色鳳凰山陶九成隱地有陳仲醇來儀堂九山山以鳳為先覽德雲間不計年山得鳳鳴君子董鳳因山顯昔人賢非關靈彩殊群族端是文華壓衆巔燕雀不須頻侍候等間相伴有林泉沈二聞曰作是題者多矣高言落落所謂支通一義四座莫不厭心者厙公山厙公秦時人有亢桑子三卷埋于山下深谷人傳姓字芳煙霞採遍信行藏不聞荒草埋丹灶惟見寒雲鎖亢桑洞口樵歸風凜冽巖頭仙去月微芒近來黃石無消息剩有蒼松對夕陽俞犀月曰拔新領異胸懷所及正自佳佘山陳徵君眉公隱處丐為東漢佘將軍封地樹色空濛入漢侵樵歌聲裏雜漁音兩山煙雨徵君畫一徑松楸戰士心芳草巖生啼鳥過秋風門掩落花深東西多有貞觀寺莫向祗園覓上林馬橋菴曰兩山煙雨一聯足為隱君壯士千古生色神山彭仙翁素雲棲此有丹井蒲龕一名細林苔封畫棟半陰晴對檻風篁巧奏笙青鳥來時千嶂曉紫泥去後五雲生屏開繡壁飛花柳鏡展明湖語燕鶯盡道桃源多勝賞爭如仙壑爽幽情趙又呂曰近讀玉峰歸子遊細林諸詩羡其才筆高奇三復吾師之作寫情使事工麗而間適留連不能已薛山一名玉屏山薛道約煉丹處不見真君禮斗壇惟餘梅竹冷香攢蓮池月出疑垂釣芝嶺星懸似煉丹春老玉屏青不斷秋深金剎夜猶寒空山火棗年常有問是何人得解餐許竹隱曰春老玉屏二語鍊而淨直是唐人警句機山一名大陸山陸士衡生此有平原村杉徑依稀舊日村煙消轉覺鳥聲喧攜來鐵甲衣邊血寫出丹霞嶺上魂夜雨已憐猿鶴唳青山未老姓名存平原不是無知識那得清風守故園橫雲山舊名雲山陸士龍居些有黃子久宅高賢一去思依依滿塢濤聲展化機路僻從教頑石變巖深不道故人稀謾憐客夢餘京洛別有鄉心見翠微簇簇雲林知幾換風流今已屬元暉陳白筆曰英氣逸情筆端鼓舞而出二陸風流庶幾不墜天馬山千將鑄劍處一名千山房星曾説産窪湄降作無情骨更奇剩得一身和露宿胡為千里帶雲馳蹄邊草色消間日勒下山光浴半池更有干將金氣在夜深猶共吼坤維沈聲遠曰一結闊合有情致崑山二陸讀書處世稱崑岡雙璧松門石室靄煙中徑入松門窈窕通不有才華推二俊安留劍氣倚長空文章老去連朝雨俎豆新來拓晚風欲問玉光亭畔月讀書今得幾人同王吉士曰清言瀟灑所謂溈水著地正復縱橫流漫使讀者自有名通之目石鼓山附著名赤壁錢公鶴題為第十峰誰將巨石結巖阿間叩聲聲靜裏過磊落無心驚翡翠虛明有勢抱煙蘿身環流水知音少路接空山答響多不必桐魚頻搏拊天然仙鼓協笙歌沈五玉曰山光木色靜氣逸情披雜詠之互有映發再登二十四峰關前見赤壁題草三峰開今增山改曰草四峰嵯峨徑入茂林繁石上猶餘屐齒痕曾帶朝霞來傑閣得看赤壁繞清源山如識我情還切鳥似留人語更溫既曰草三何草四雲間又道辨峰存周芝士曰清詞麗句競秀爭奇使人飄飄有登勝之想九峰主人歌山藤踏遍巒江沚第一奇觀稱松水峰峰屏列泖如環造物峻深雅無比豫每遨遊蒼翠中呼仙呼釋問主翁盡道不知何者是歸來滿袖貯清風今晤九峰欣有主瀟灑懶與塵作伍慕道多年輕利名機耶雲耶非其數時或同歌何有鄉左佘右厙相和長時或同歌廣莫野高踏鳳凰跨天馬詞場墨陳排無讓唯善鐵崖呼欲上九峰煙接衆峰煙泖湖浪接澱湖浪天生奇境何磷磷一日十登不厭頻我愛青山藏我拙青山愛主得其人寄語探幽俠劍客風光莫並韶光擲好生擊碎利名關來到九峰賡白雪程坦如曰通章奇絶異絶人境俱奪妙在一結江南山水間遠神秀使人易就而難去者無如吳郡之城西雲間之城北群峰離立于平田水中無登涉之勞而有棲憩之適覺山陰道上猶為遼絶余家青芝塢中有鄧尉山居十二詠蓋志其近者杖笠所及多缺焉寒松大師貽余九峰草雲間諸山吟眺俱遍師剎席在古青龍非若余之朝夕處乎山中而詩乃數倍于余昔帛道猷陵峰採藥觸興為詩廬山諸道人遊石門退而尋之崖谷之間會物無主應不以情而開興引人致深若此今于師之詩中往往遇之余益爽然自失因寄語于師九峰主人春秋有佳會以待客歲為故事點易臺上道人作盧敖遊可復返乎余將與師扁舟赴之鹿床俞南史無殊拜手敬題
