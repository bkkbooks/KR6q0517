body:
  text: 嗣法門人德玉編録像贊經寫彌陀有聲其默有儼其容瞻之仰之以翼以通無煩海口雷音而梵唄嘹喨不借龍劑兔穎而字意玲瓏東西接引兮指諸掌風月貫穿兮意莫窮珍重仁人高著眼一池香散白蓮中圓通大士目貯千山翠旭容開萬井晴嵐善財南去少人談獨對風清月淡謾謂相逢無語梵音滿耳誰諳金鱗日日躍花籃六月何曾怕爛江風吹動海雲飛默默無言接上機踏遍煙波閒似我翛然獨立對斜暉初祖徑庭之機人不曉一葦翩翩過別島踏碎波心月半鉤清光滿目漾寒藻十八羅漢落落千峰之客悠悠四海為家鬚眉姿致飽煙霞各適風流瀟灑或笑或吟任我人嗔人喜由他宥詢近日甚生涯向道知音者寡雲門湛老和尚卓耳受南宗之喝甘心屈慈舟之膝未明舉一舉二便要驅耕奪食提向上以當生平除放下別無消息不知觜好傷人盡道腸如弦直斷人性命不假刀見人家財盡沒匿不可規模如何取式自有禪道以至於今幾曾見有箇樣不近人情的知識辨山瑞老和尚忘其尊德重不言而化忘其貴道高不怒而威不重翁九坐道場十會說法先分衣鉢預定歸期重只重走天下之雲水未許揚州倣佛策天下之龍象那容越國依稀啼不是舉頭天外客爭瞻明月上花枝青龍百老和尚青龍石刻抽雲門之顧鼓荷玉之浪奴兒臨濟婢子溈仰夫如是乃人天之災彗本佛祖之禍殃胡為乎名喧異域聲震遐方故知魚之能躍鳥之能翔如師之道神龍不足以諭之一芒畢竟如何春風來大地萬卉盡傳芳春霜面貌秋月丰神徵今有道鑄古無情參臨濟禪而口吞臨濟悟雲門旨而氣傲雲門肘後佩靈符妖魔咸遁跡眉間懸寶劍狐兔早潛聲為法為人一片襟懷深暢徹樂山樂水滿腔肺腑已頻傾真風難禁流芳遠挂向雲堂啓後英霜顏凜冽雪鬢交加燈傳百丈席繼龍華陷虎之機毒超黃檗劈佛之手辣逾丹霞弘開祖道風回遠截斷江流日又斜一曲新豐酬滿座鳳麟濟濟遍天涯自題從無伎倆振家風白棒頻拈掃太空更若懷中疑不了何妨問取賣油翁髮染嚴霜形同椎魯七處開叢席至勞無功數年住辨山於事無補捻雙空手只期後哲為型惟一赤身欲與前賢繼武德有所慚言無可矩動靜既不能以周身春秋怎配享於祖父龍華常住請鼻孔昂藏齒牙疏缺少喜多嗔將南作北棒驗龍蛇枉費神言分玉石徒饒舌值茲末世澆漓半是倚彊行劫自罪引他毀堯譽桀莫若釣皖水之白雲躍赤尾兮化風雷而嘯月白雲常住請頭鬅鬙眼卓朔遍剎塵無定著兩浙三吳鳳翥龍驤七處十會雷轟電爍呵臨濟未是白拈罵德山漫稱老賊有時掘地覓天瑞現優曇有時指迷鋤逆聲鳴寶鐸嗔譏直與爾無干好惡從教人貶剝莫莫莫祥麟只有一隻角天瑞麟請磊磊落落瀟瀟灑灑有耳似聾有口似啞適其性日霽風清逆其情雷轟雨打乍嗔乍喜秀抹深山之容忽後忽前輝聯明月之雅得人一牛還人一馬不比尋常之乎者也秀也實請氣少神情骨非聖彥怡聞其名怕見其面吹布毛為法施琢璞玉為瓊辨忘恩背義者穆以春風抱道守貞者激以雷電若還格外英靈決不隨他轉變欲詢者漢真僞古道從來一貫古璞玉請貌不驚人語亦無味聽教弗明參禪不會念子曰而古板苔生演摩訶而胸襟茅塞呵佛罵祖時絶無德嶠英豪千人萬指處偏合寒山火隊空中花摘殘水底月撈碎辨峰麟鳳滿乾坤不信愚蒙惟此最子了英請尊之弗為榮毀之非謂辱只探如來藏不入如來室須彌剖微塵明珠作魚目有問西來大意向道何必不必丹桂風搖萬樹金青山月皎一團玉剖塵靜主請秋雲一衲春水一鋤爭之不足讓之有餘一片野情無處著高山來釣放生魚臞瘦骨稜稜通身無見解探遍諸方禪未常輕納敗只悔入辨山屈膝禮三拜一笑滅卻正法眼再笑貶卻毗尼戒青龍兩住笑徒然衲子相逢笑索債佛祖頻來共結冬仍言陷虎機猶在萬事付之一笑中一任諸方爭笑怪青龍常住請坦坦蕩蕩癡癡兀兀笑倚一笻今經半百若謂是青龍奚啻太虛添彩色若謂是善權還如遠水探明月是非拈卻兩重關佛祖到來難辨別等閒問取子西堂端的分明對一說子青昊西堂請碧落曉藏身滄溟時沐面髮侵雪幾莖衲挂雲千片奪食饑猶虛驅耕苗自遍知伊不知伊咸云臘月扇莫若分付與珂公當陽直指人親薦薦不薦道他洞上第三十世孫仔細看來我亦不曾見珂月璨參頭請火裏敲冰石中取玉彈沒弦琴唱無腔曲一千七百則味不黏脣三藏十二部字不經目鞭泥牛耕空劫之田遣木偶淨滄溟之浴家私狼藉十分柴炭不存一束現子繪之何所圖笑看山青與水緑慧慈現知載請遠聽感慈近親嫌暴滿容斯瘦非因田地遇時荒兩鬢將皤豈謂師塔無人掃挽頽風反貽笑於頽風行古道復深慚於古道譽之而不逐念紛飛毀之而不隨緣顛倒欲知爾有甚長請把鑑光一照一杖敲殘明月半瓢貯盡蒼煙相逢道是地行仙雨打桃花拂面常有客來問道惟舒石子談禪巖高樹老不知年風送清香滿院渠正是我風吹淺碧柳絲輕我不是渠雨洗淡紅桃萼瘦非渠非我孤明月湛水中天即我即渠長嘯人聽庵畔路此段真機惟自知豈是丹青描得就生緣桐岫弗知皖國鄉談主法善權不諳荊溪風土閒少而忙多才疏而智魯懶求於仙慵作乎祖放蕩不屠出水蛟風流惟跨巡山虎者樣人如何做青龍之嫡嗣繩蒼辨之祖武玉侍者好收取他時若展開一任驚寰宇爾我不孤負五五二十五古璞玉侍者請騎虎性淡情疏心直口快最無分曉逼石女生兒惟有化機斷瞎驢逐隊力成師塔人美而不知延住祖庭魔侵而不怪讓善權化貪者之癡說指迷啓盲人之瞶雖無致怨如砒恐不免譏猶蠆阿呵呵憎者憎愛者愛順兮逆兮兩俱忘燕語鶯啼青嶂外善權常住請胸襟雖冷志氣益堅慕師之道感師之賢仰而戴天座中輔弼十三載俯而履地塔上栽培二八年難於時語隨於前緣憔悴不因茶飯少奔波多為法門憐白駒無力揮戈挽且坐茅堂聽杜鵑存善卷禮菴雜著寶劍連環頌懷藏造化不知年出礦難將金鐵傳爪髮胡為投大冶超然迥出湛盧先鑄超然迥出湛盧先更復磨礱始得全試看良工呈妙手陽紋暗與白虹聯煉陽紋暗與白虹聯巧上何妨再著研露出等閒鋒似雪從教神鬼也驚顛淬從教神鬼也驚顛好拭塵埃弗涉纖三尺霜含天地老縱橫原不犯中邊拭縱橫原不犯中邊佩帶翩翩氣浩然匣出鋒鋩渾不露全提塞外息狼煙佩全提塞外息狼煙光射清虛透碧天照徹無私全大用些些觸著髑髏穿光些些觸著髑髏穿紫氣更深吼月圓驚得須彌顛倒走無端嚇殺老金仙鳴無端嚇殺老金仙雪夜騰輝出市廛忽躍延津成變化張華何計握龍泉躍張華何計握龍泉信手拈來絶要玄空擲不傷鋒不損方堪許話祖師禪擲方堪許話祖師禪出匣何如入匣先放去收來常在握懷藏造化不知年藏蜜蜂頌和宋天封佛慈禪師韻蕊綻芳叢刺有時帶晴歸是帶香歸門開漆桶通玄路活潑機從林外飛異類分身天一涯春光收拾晚排衙堂中閫奧無人識體態風流出當家翠潑山花日暖時在途曾未把家離驀然桶底全翻卻玉蕊空成蜜滿脾穿雲吸露美晴光底事紛紛為孰忙刺著不能知痛癢等閒切忌錯承當平生家業寄枯桐一竅通時百竅通撲面相逢輕一劄幾人皮下血流紅牧牛頌𤚱角詢窮雲外濤聲踏碎溪邊撩風口笑草鞋穿不憚關山路遠月曉每同月問霜寒常帶霜旋何時得遇老南泉共把家私判斷尋牛未睹峰前來影卻憐道左原貧破錢苔上露痕新反覆於中細認乍有乍無欲現半明半暗猶湮想伊只在此嶙峋端的無勞更訊見跡殘跡多遺石面吼聲忽聽山腰春深毛色雜柔條箇樣靈機誰肖明月四蹄莫畫清風兩角難描謾言知有是今朝著意收歸始妙見牛雨霽溪眉散步煙消谷口逢渠依他狂性就他除入手何須遠慮全不顧時卻在些兒動著還無林泉謾縱意生疏緊著金鞭莫恕得牛帶露閒行北澗和雲散放東坡細披白雨一青蓑踏遍山河朵朵不用風搓繩繫肯將地畫欄羅如今趁亦不之他豈似從前纍我牧牛浪拍蘆招返含風搖竹指回家半鞭倒影走飛霞者段風流瀟灑短笛橫吹韻杳夕陽一曲雲斜紛紛天際落梅花溢目韶光俊雅騎牛歸家棕履常留石闕玉蹄不到松關一生活計付潺湲且了現成公案放足橫眠白晝連拳高枕青山休云萬事轉頭間未轉頭皆夢幻忘牛存人蕩蕩人牛盡蕩空空明暗俱空空無空處未為通依舊冰河焰凍況是深居巖壑不教移步巃嵷爭來寶殿話吾宗莫向人前打哄人牛雙忘彩散雙眸復睹笙吹兩耳遙聞天然呂律諱言勳太古音回雅韻素羽重歌白雪絳桃更潑紅雲水天一色卻平分倒浸長空月暈返本還源夜靜無停月窟天明獨步雲堆荷衣拂去帶青來柳巷花樓不礙兔角橫穿佛祖龜毛倒繫風雷乾坤撥轉笑顏開功大慵加蓋代入廛垂手十二時歌平旦寅灶冷虛齊滿隙塵不見松花炊破釜徒將煙火望西鄰啼猿寂落葉額樹轉流光到眼新黃鳥弗嫌人面瘦白雲知我舊來貧日出卯一室多年懶為掃舉步常拖碧蘚香開門放入紅輪曉圓陀陀光皎皎此箇明珠誰缺少端的還從衣內尋叮嚀莫向外邊討食時辰菜煮黃虀不厭貧瓦鉢揭開吞日影香糜分出曉堂春忘五觀棄三輪腹飽休云味轉真自是洗盂人去後何曾粒未得黏脣禺中巳生涯此際成何事花開壟上淡鋤雲葉落溪邊頻拾翠散昏沉消瞌睡循環復把琅玕計歸來展手尚無心那有閒情說大義日南午脫栗休將時刻數香遞遠風淡蓽蘿聲消幽磬沉茅戶木雞啼金牛舞滿腹陽春一時吐更把瑤琴反復彈未聞幾箇知心腑日昳未活火鐺中蟹眼沸煙篆紛紛漲水聲香消陳陳傳風味足清神多爽氣到口方知無忌諱運用尋常每自為翛然那復有尊貴晡時申閒策孤笻到海濱錯落清機同水鳥婆娑短髮學山民無高下絶疏親萍水相逢便問津等閒不解空回首莫怪煙花冷笑人日入西牛履牛衫半禿首幾欲談玄沒箇人間消逸興憑吾有趙州茶曹山酒擬飲還須同出手不是大瓢七碗流到來未許輕開口黃昏戌獨坐寥寥安一室壁架青燈隱復明瓦翻蒼鼠藏還出細叨叨啾唧唧讀盡華嚴知幾帙舉似煙霞莫外求此中猶勝波羅密人定亥風送泉聲來嶺外夜靜寒燈照六窗更深無夢真三昧佛不求祖奚愛一枕青山憨布袋帳破休嫌明月窺屋穿自有白雲蓋夜半子庭虛萬里清如洗一片金篩竹葉青幾家漏斷蓮花蕊紙帳前草龕裏肱曲蘧蘧忘脫履隨地遊仙忽作聲虛空驚得笑歪觜雞鳴丑夢醒慵呼祖逖友屋破床頭好笑天被穿身外惟搔首衣斜披腳赤走尿瓶踢得翻筋斗箇事應須說向人奈何不是同流叟贈天成監院殷勤問道已多年鶴髮婆娑志益堅謾謂古稀今便幸春秋猶過趙州前訓童行既為生死出家立志務須向上舉目看他上流律身戒為榜樣參禪要盡法源閲教須知比量見人切切溫和處己時時謙讓行不隨境飄流住當為人仰望細思我是我非任從人得人喪聖賢解脫稱高緇素慳貪成障識破人面獸心由他前稱後謗果然心不負人自是面無慚狀戒將孝作根基道以德成厚養生難際遇法緣不易得為僧相若能依此行持佛階定可趨向示禪人筆底滔滔本自由何勞紙上更追求如能墨海都翻卻尤勝當年南匾頭話頭牢把莫遲疑著意追尋看是誰看到水窮山盡處一輪明月上梅枝示張淨菴醫士學道親如診脈親分明指下莫因循等閒看破誰遲速把手風前笑越人示李道人齊僧不必擇叢林何處叢林不是僧株守一方無變易還如風鼓欲盈罾壽檀越謾說人間甲子周閒來正好跨青牛高歌一曲煙霞外不羡當年老趙州示化士修行本在道心堅心若堅時石也穿果正因明成大願何須向外覓單傳絶糧饑餐緑葉採新楸渴飲清泉接上流數遍琅玕無一事和衣高枕臥山丘化大殿賢于插處草叢叢為號空王殿已空好向青龍舒臂力大家扶起梵王宮巍峨一殿聳雲霄像半淋漓瓦半飄一念隨心成願力何須山野舌重饒化磚古祗園今重架闢草鋤雲開大廈給孤意旨甚分明就中幾箇能酬價忽酬價功高不在金磚下化米選佛從來第一功弘開爐鞴顯宗風廬陵米價逢人問到者方知價不同化知浴曾聞開士觸宣明體罄塵空總現成看得現成公案徹心花獨綻少林春化油燭投子當年錯指名一瓶滿貯下桐城於今不了重拈出剔起光明處處新化齊僧田欲成佛祖在心田要植心田仗福田百福田中勤布種勝前幾倍植心田化柴煙無香積乏薪然欲縛青山著半肩塵冷灶中添把火好來共話獦獠禪化梓法寶正法流通自古今承當正法在仁人不因繡棗來相報那得人人轉法輪化知浴疏選佛開爐際聖凡於格外安禪結制會龍象於場中雖云道在人弘必曰功由檀助於是某上座矢志堅心為衆行化拈起古靈公案而遍叩知音展開無垢家風而盡詢識者洞山果趙州茶要須信手拈來寶壽薑雲門餅務在當陽拓出味不黏味汗流則慶快通身塵不染塵水洗則宣明徹體大行此話速道一言王孝子序古者國王大臣鄉舉里選其意云何蓋天經地義之大以孝作忠無異理也而簡冊所傳曾閔而下事多緣飾其為篤行隱君子百不得一焉豫方外人於忠孝缺有閒矣顧常樂聞忠孝逸事客秋歲祲倣迦文乞食例不惜芒鞋走青溪道邑之文學九一王君揖余而言曰師知由拳有天性純孝二三君子乎將臚而為之傳豫聞之喜可知也既而詢其姓字採其幽芳若泰卿王公其首著云以九一所稱其生事死葬與祭語焉極詳亦不數數見者與跡其壯而棄舉子業隱漆園獲升斗以色養至兩尊人疾劇瀝血格神願以身代逮夫墓木拱矣春霜秋露之思如見厥考焉以迄不匱之誠錫類之孝皆出諸性成非今人所可勉焉者我思古人又曷忝焉越一日王公迎而授之粲豫益喜可知也乃請其實録整襟讀之何其與九一所稱如璧合也噫求忠臣必於孝子之門若王公者雖戢影市門不求聞達而不發於身必發於後其長君玉修亦復至行有學將不終為諸生其年又英英負奇與孫枝並秀行見子若孫經明行修以孝作忠翊聖明廣風厲者舍公家其誰與歸今賢邑長既有薦矣賢郡公已有報矣各臺憲俱有獎異矣他日史氏羅而致之勒為國書上掩曾閔不啻天宮龍藏同垂不朽哉山林野衲亦將引手加額為聖代得人慶歲在辛亥春上元日方外人某謹序祭祖文時康熙玄默困敦歲南呂月上浣日住荊溪善權禪寺比丘不孝孫男某遠遊歸來追慕不已百拜具奠嚴氏堂中遐邇神主失祭多年為文告曰嗚呼祖先餘慶積善忠孝兩存儒釋是羡我生不辰庭幃屢變大父母升尚猶及見嗟我家君陳雲遭扼更傷母兮汪瀾預溺痛割肝腸淚揮成赤意欲殉難誰嗣誰惜托跡空門冒險遍尋枉勞跋涉怙恃無音首丘有念江山報傾傷哉君父兩冤莫申矢志殊形利名敝屣訪出塵師悟西來意愛別離苦等於大寐生住異滅視同一致不惟自勉且為人勉三十年來水逝風捲鳥寂山悲春秋誰薦瀝血矢詞莫寫哀泫有大圓鏡塞乎蒼穹同吾君父偕吾祖宗息乎其內游乎其中一生一死間不髮容少申子道少盡後事大家團圞庶幾在是俎豆江漣簠簋峰翠配享森羅稽首來儀建青龍隆福寺普同塔記青龍石刻世之記普同塔者類言本之月令先王掩骼埋胔而不失乎仁人君子之用心止矣若然乃郡國之漏澤園非禪林普同塔也塔之為義至高至堅至潔亦至嚴不以窣堵坡與多寶塔作大小觀也塔所利者四衆人等經云天人空中過往遇塔則瞻禮如佛世之人不茹素不奉戒者不得而入焉或祭掃或入塔必虔必敬且收録有主守護有神其珍重如此先老人鋤草芟荊歷有歲月而惓惓于塔之一事囑託再三書復每及操也承師遺命運費鳩工卜地諏日甃以崇臺別以三穴環以高壟扃以邃門寺基之內乾兌之方青龍浮屠適當其陽巽流來旺生水到堂己亥分金壘塔深藏松竹環而梅繞別是山中天一方遂喚穎君記之願後之入塔者幸毋昧于斯言送牌位入祖庭定約朝廷有太廟大夫有家廟釋氏有祖堂親親昭穆序次秩然不敢以私不假以勢惟德惟賢乃可服人今龍華祖席左設宗堂從西乾東震本山傳法宗派供立牌位右設祖堂奉祀開山老人及繼席諸師凡住持寂後有嗣成禮請送入無嗣常住供立或開法外剎名垂當世非繼席者不得混入祖堂此一定論無有異議惜乎近代師承授受訛亂非惟道眼不明亦且人品大壞朝為弟子暮竊同儔覓利貪謀法門叛逆生既不齒死亦何存嗣後欲送木主入宗堂者必先徵其悟由訪其操守取其拈頌語録等稿並不犯前失必須齊嚫禮儀成款請當代主人送入不可苟就猥褻因循私意強入宗位者也或遁跡林泉三二十載若龍山等又當別論凡我住持同盟斯志務須敬慎毋輕允諾不致貽笑諸方山門幸甚法道幸甚自序余名智操字寒松別號隱翁桐城嚴姓父百亨母王氏夢僧借寓産時聞香當天啓丙寅八月十八日也六歲授書至道也者不可須臾離也余云元來道在平常衆異之舞象時遭寇亂家君被執母溺殉節豫潛桑免誓願為僧因占別硯地藏閣脫白是年二九癸未四月十八日也號天遍覓怙恃無音入山焚修將酬罔極草里打供虎隊往來偶閲壇經至不思善不思惡前緣盡釋有禪者來山指授一歸何處初攝心時如按浮瓜起滅相乘忙無所措舉話似易開口覺難晨汲暮樵通身話頭如秉吹毛遇虎狼而不怖無一法可當情如是者四年功成純一草二圓具實際戒經云心佛衆生三本無異始契物我一如打七三日如大圓鏡不見有身心世界因僧答話有省遍參知識二十餘員咸皆印可毅然不顧草四參青龍百和尚於辨山尚拈棒一畫豫即喝尚便打豫又喝尚復打觸燈墮地釋然大徹呈偈日探遍諸方最上機何如直下絶離微若非一擊連燈落那得心空及第歸順治己丑臘月十八日也尚問南泉斬貓時如何余云明月照人冷清霜透骨寒曰趙州頂草鞋又作麼生豫云雲歸山入畫風動水生紋曰如何救得貓兒豫以手作鵓鳩勢云谷呱呱尚深器之自此徵詰古今勢如破竹俾掌堂司整肅清規草七壬辰佛誕日付以衣拂拄杖並偈曰鷲嶺一枝辨峰現瑞四七相承二三密記蒂固根深花聯葉綴我今付爾芬芳大地豫三卻之何敢當此尚曰賴子與我出一臂力隨赴越州大能仁每見呵問話者不諳時節語胍適逢上堂舉黃龍曰老僧今夏向黃龍潭裏下三百六十個鉤能仁今夏向八百里鑑湖上拋個漫天網子豫問黃龍擲釣於澄潭水底能仁張網於鑑湖波上忽遇透網金鱗如何相待曰三更紅日朗豫云多載垂鉤知老手因齊慶讚事如何曰照破漆燈籠豫云日篩竹影山添翠風過嵒花香滿林曰蟬聲不在緑楊裏分付行人仔細聽豫云一句迥超千聖外松蘿不與月輪齊曰也是葛藤裏翻筋斗豫一喝便出尚語衆曰問話須看此樣草八返青龍上堂立僧分座接納因舉雪竇顯請宗禪師升座因緣豫聞即得隨機說法三昧一日落堂考工畢上方丈問訊尚曰今日堂中幾人悟道豫云若不是某幾錯祗對和尚曰座元大似不曾落堂豫云將謂無人證明曰既然落堂因甚容他聖僧瞌睡豫云且喜今日放參三十一尚補雲門屢交青龍余堅不任代攝結制與衆同單務則先之勞之三十五尚赴佛日書通護法兼兩序曰寒座元為人真率梗直見識超卓可作二代主人代山僧說法也云云豫辭至浙確請尚回尚曰青龍一日無主我一日不回遂親擇日送以法帔衲衣勉進方丈雖居正位仍稱舊職將過數月因事迎歸豫仍輔弼三十六尚遷善權命再繼席辭不獲已書偈而去追隨杖笠十三年業已焚香對衆宣贏得一身輕似鶴那堪霜雪更留連異日緇素尋至刻意挽歸將三載數上書堅辭不允回扎內曰並無年月期限之說亦非衙署傳舍之所山僧獨慮普同塔及重興隆福碑賴子為我圖成待山僧死後不用作供亦不必下語以此二事酬恩足矣四十進山告假特為上堂命回忽中秋升座末曰當著僧接青龍堂頭來老僧不過草七八勿遲復謂衆曰他日建藏塔梓全録須就青龍商確塔成誰守三年屢問無對者草九豫至尚已草八黎明書偈坐脫衆理前話豫云何不道不須罣念十載未難衆曰始終原不易豫云事久見人心衆勉豫修行狀請塔銘於坦庵方學士因遵遺命龕歸善權豫轉青龍已力完所托舉同門繼其席四十六赴請善權卜地建先人塔於萬松嶺畔明年回里掃塔墓應香爐雲際二寺請以酬生身脫白得戒三大事畢再住善權培植塔石工程未竟霹占重興操戈而至心隨勢焰同燎抴杖而行跡共白雲俱遠四十八遷安樂院五十建禮菴力行躬役兩月告成宜有者悉新備之守護始無風雨之虞荊溪衆檀請豫復住善權力辭不容舉同門攝其院自辛亥建塔以來峻拒外請雖遭攫奪而修塋守塔則生死以之無何辨山龍華屢招五十三方王祖席風規稍弛情詭日撓夙興夜寐似為整肅而問鼎潛謀人境變幻得賢為難所荷猶有憾也每慚德薄塔事難終經營十有六載自信不食前言從昔己丑始親近先人至今丙寅計三十八年造次弗離生死一致受苦口日常佩服經逆耳時為銘心六十一編梓先老人全録入楞嚴大藏流通命僧守塔退隱白雲成壽塔於寺左流金偈曰自題自塔自生涯自看青山只自賒非是自身拔宅何山風月不為家吁昔托胎處世時不能生事死葬殊切痛心既披編南詢以生死為念是非人我故不顧及至老大又不能潛棲嵒壑養拙過時仍復吳山浙水種月鋤雲亦宿緣之所致也承先人付囑之重叨法社蔭庇之深德行學業時愧前賢唯依依祖道佩從上之遺訓直心待物與世無爭雖鶴質龍鍾實不敢以須臾恣怠惜其世異時移真風掃地不以節義為懷怡然勢利是趨情知救弊無能而恆以謙卑退讓豈復辨其是與不是耶故余處世一味平常不登謁總隨緣寧使草長法堂為時人所棄唯撫正挽古風事無矯強形可使辱志不可陵追想前境知音少遇末後一機自道去也
