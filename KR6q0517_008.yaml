body:
  text: 嗣法門人德麟編録再住安慶白雲香爐寺語録出隊歸值中秋本山衆護法請上堂遂升座拈香祝聖畢復懷中出香云此一瓣香臭同乾矢橛貴等死貓頭為他酬價無人纍我十回拈出供養八處九會洞宗正傳二十九世百愚斯老和尚不圖熱鬧門庭要了現前公案白椎竟乃云師塔期成古善權一身培植十餘年爾來將得全卑願又被白雲召我還大衆流光迅速不與人期佛法無多久長難得山僧昔未久住茲山只因塔上松楸無主別去則苔生古殿露冷巖頭今來各各須是心如秋月皎潔無塵獨露乾坤光吞萬象朗清輝於大地高豎法幢揭普照於中天弘揚祖道如斯標格足可觀光正與麼時怎生委悉再理舊詞連韻唱村歌社舞又重新上堂白雲老漢無端變作一條萬歲藤微塵諸佛總在裏許卓一卓云放過即不可上堂過玉帶溪見出水蓮轉繞佛徑到白雲山一生參學事畢虛費草鞋堪作什麼不是知音徒側耳種竹示衆有志參禪惟動惟慎無心合道載節載貞個裏端倪如同種竹欲得陰繁色翠應須土厚根深冷淡扶疏莫使焦芽敗種精神徑直方堪傲雪凌霜戛玉篩金清風有待化龍棲鳳明月相尋歷盡歲寒了無變易何由高節人相重只在虛心自不欺栽松示衆為惜童山植翠妍钁頭猶帶壟頭煙人生欲奮凌雲志遮莫從他歲月遷須早辦莫遲延但假深根常得地何憂直幹不扶天白巖位和尚訃聞上堂話別錢塘數載違祖庭各住謝同時朝來聞得江頭信竟作人天墮淚碑唯白巖老和尚素風遼廓景行彌高鑄古烹今翻轉近時鐵案調龍洗象蕩除空劫家私摘法海難摘之珠見未曾見彙宗門莫彙之集聞所未聞挽墜辨訛傳驚殺草中狐兔救焚成大統立枯紙上蠹魚誠為末世光幢且忽厭乎世矣致使法城震恐魔壘揚威後進初登何棲何泊白雲特為燒香舉似大衆或來不來有伴無伴三冬枯木秀九夏雪花飛啓窯示衆暫借龍山土一丘窯成六合白雲收不萌枝發深窯焰火浴泥龍笑點頭因事告神窯蓬曉構借鄰斧為學陶濱成梵宇斧竊何人杳不回伽藍弗察胡為主竊者是夜投斧殿側中秋上堂問不訊平分秋色如何是上大人師云頭不梳面不洗如何是丘乙己師云用則行舍則藏如何是化三千師云雲從龍風從虎如何是七十士師云出其類拔其萃如何是爾小生師云居處恭執事敬如何是八九子師云唯不諾走不趨如何是佳作仁師云學之則聖之模如何是可知禮也師云入太廟每事問進云不因秋月朗爭見碧天高師云謾云侵早起更有夜行人乃云山僧上在大人膝下學得乙偈卷而懷之已有年矣任是三千客問七十子求未常吐一元字腳今遇平分秋色欲拈供爾小生天瑞侍者先露八九只貴發揮佳作不問可知禮也是汝諸公還委悉麼謾云侵早起更有夜行人挂木魚不向禹門躍浪深惟從香積吼清音金牛公案分明舉能有幾人識此心那是此心擊梆四下龍門浪平和尚訃至上堂茗水溪邊踏翻皓月道林山上別展家風不墮功勳雙彰明暗惟其古道猶存得以閹拈辨嶽任彼隤型易調嗒然亦似浮雲於素於緇共聞共見何期大法海頃下慈帆羅漢峰俄顰翠黛龍吟曉霧成愁韻瀑瀉懸巖總淚痕莫謂相逢不相識清流一掬表同門上堂山川繞檻宛如水墨屏風塔石凌霄麗若神仙洞府霞生谷口樵子斫雲邊月滿溪頭牧童歌隴外謂是佛法眼中著屑謂是世諦滴水難消阿呵呵罷罷罷饒他吳道子顧虎頭有筆也難描畫上堂三世諸佛無中說有青山常運步六代祖師有裏尋無白日不移輪淨名杜口早涉繁詞摩竭掩關己揚家醜象骨禾山玩弄神變腳跟下好與三十棒如斯告報普請承當擬議之間白雲萬里應供示衆一段真機不覆藏通身有口謾宣揚擎來滿鉢雲千片香積何須羡上方大殿僧堂落成升座一拽石山門騎佛殿二搬土露柱拽僧堂長短方圓本自然發機不用千鈞弩所以白雲殿堂迥別人間天上諸佛處此殿是故此殿最吉祥諸佛入此堂是故此堂最嚴淨當知此殿此堂不屬陰陽攝受不拘年月推移盡從諸公妙明性中流出直得十方諸佛異口同音宣說偈曰兩彩功成喜有期玲瓏八面鎮坤維白雲吞卻太虛了正是心空及第時穿井示衆靈泉深隱白雲隈海眼沙封久不開卓錫弗辭甘醴出梵玫有待故人來原書闕
