body:
  text: 龍眠方拱乾坦菴婁東吳偉業梅村選荊溪史惟圓雲臣陳維嵩其年參秋夜懷諸乾一董德仲倪思曼秋聲來何處老我湖上山湖山堪寄迹故人久未還沉吟扶杖起問月出松關明月殊不妄照我鬢毛斑一步一俯首徘徊興欲攀仰天舒長嘯餘響答人寰寒泉流碎玉落落瀉蘆灣懷人千里夢猿叫數峰間祝齊司馬俯松山之東蒼翠碧雲同梅花綻庾嶺竹韻和崆洞御屏日杲杲靈樹月朧朧支公年八十渥赭顏如童不採商山芝清間樂春風不馭蓬島鶴瀟灑鳴秋空山深雲自在倘佯於其中可以永今古吞吐氣成虹祝張太史長生無異訣恬淡貴天然我聞廣成子玄知大道先爾形不常役素養碧嵒前爾神常清淨默契白雲邊瑤葩香雪几坐看芝草鮮況師人天者裔出大金仙青山凝紫氣緑竹護蒼煙玉顏映春色春色日生妍應與乾坤老不隨景物遷秋日送北溟和尚遊雲門吳江之水出青龍微茫宛轉醉秋楓秋楓一葉隨雲駛滿載新詩泛海東海東雲門有六寺此去先遊最上峰落霞過眼成殘夢夕照連山點畫中慚愧青溪守株客寂寥獨抱老焦桐吳嶺風霜今更別見人須為剖虛衷祝戴文學日麗南山山之陽桐葉叢叢靈鳳翔至人雲外空今古造物何心來禎祥竹戛玉兮柏舒翠薰風拂拂吐清香千齡應瑞結芝宇古稀為晉碧霞觴壽量期與寶掌齊長生何必羡雲房心知和樂悅未央山川稽首祝無疆永且逸兮順而康御屏擁翠松風長行居徑山特作翠踏浮雲碎尋幽繞碧叢千林雙徑出萬壑一笻通步散長天外身間夕照中嘯聲來絶頂引起四山風住徑闢人來少山深我得先清池留好月茅屋老蒼煙居竹連身瘦棲霞帶影然溪聲常在戶春去不知年坐日霽松梢淨間趺滿地金禪餘青嶂迥定徹白雲深草健芽穿膝苔幽翠溼襟無人堪共語萬籟坐成陰臥不必胡床問煙霞到處家半簾垂紙帳滿榻浸梅花門掩青山靜雲眠白日斜深嵒人事少無復記年華賦得緣雲擬住最高峰為愛青霄好餘情總莫聞卻招松頂鶴同住嶺頭雲春色高低共秋光爾汝分是誰知此意一徑下斜曛收春亭為徐平谷賦愛此間亭靜開簾捲蓽蘿林幽逢夏少地暖得春多踏翠攜笻入尋芳載酒過止因徐孺在倚檻發長歌阻雨泖上飛閣驚風雨凄凄動客吟朝雲迷棟牖空翠溼衣襟鴈陳投寒渚濤聲隔遠林旅懷空佇望流水話知音石萬蒲何來一寸碧得占四時芳老節非無萼盤根別有香盆穿龍骨瘦石露虎鬚長莫與仙人採春留入畫堂和胡旋九過訪辨山原韻山靜人來少文星照遠峰臨流時踏翠帶露幾扶笻嘯冷重嵒竹吟深曲澗松因思風度久月夜喜相逢又未識旋公面冰霜我素欽千山留客屐一語見君心石老蒼苔瘦嵒高古木森不辭三徑杳風裏再披襟過天童訪友因探名藍勝迢迢踏翠來三唐留一寺兩宋結層臺水自蓮橋出雲從楓徑回談深青嶂迥身世等蓬萊冬日偶成衲破無人補簾疏待日遲千峰清玉案兩鬢老霜枝何處非佳致相逢發雋思滿庭楓葉落清艷欲催詩又曉起霜花瘦風寒啓戶遲篆煙凝素壁梅蕊逗新枝遊子留深意歸人寄遠思聽鴻來迹杳清唳一行詩秋夜星河斜未轉漸漸火西流月色憐清夜砧聲報素秋人從霜下老家在夢中遊卻憶當年事江湖一釣舟舟泊垂虹亭贈客過訪洞庭秋色好一棹泛東南偶泊垂虹處多逢逸士談晴湖開遠鏡曉嶂潑孤嵐共坐江雲冷霜楓落葉酣熊司馬蔣太史同遊張公洞久熟張公洞乘間適勝遊古藤欹怪石飛乳結重樓雲竇通幽靜霞光帶溼流如何荒壞處亦自有丹丘寄介大師雲深環曲徑萬竹隱玲瓏光摘耶溪月家傳辨嶽風龍蛇遊筆底花雨散庭中他日豫相訪江天一棹通訪徑山主人兩載人三晤唯窺豹一斑禪心澄碧水法眼老青山香散曇花靜經翻貝葉間好同雲外客日日笑松關和徐太史秋日見寄風來吹我袖桂溼夜光浮石冷依雲坐山深帶月遊情酣楓一徑夢老菊三秋幾得耶溪棹波乘客思悠懷湘翁和尚夜靜蓮花漏幽懷淡不勝翻書惟自適看竹共誰憑夢冷三江月愁消一夕燈迢迢山水杳縮地愧無能曉泛太湖虛白天初曉山城動早炊片帆收宿雨滿棹載寒漪濃淡雲中髻東西水上眉蒼茫渺無際何處問鴟夷不流泉源關知何代澄澄異衆泉名清慵逐浪色皎可藏天曉掬爐峰翠秋涵耶水煙至今人不識萬古伴逃禪程純士楊昂霄聚五程敬三謙益同移竹種暮雨蓬門溼根移宿土深攝生唯有節虛己欲無心己自林收暑況逢山更陰他時燈影下宛若聽鳴琴楊箕六羽公南一代工飲辨山岕片次戴月樓韻品實龍團俊吳興浪得名引泉烹月白和蕊瀉天清香帶三春秀風隨兩腋生坐深醒客醉寧復釀群英十七夜雨後看月和韻離畢才霑潤餘輝更覺圓橫山流皎潔跨海涌嬋娟眉挂千尋緣心空萬里天睢睢忘夜永不復枕書眠次韻留別戴月樓百雲無定迹數載托門墻未到稱觴日先期祝畫堂一帆懸極浦千里隔清光惟有山前月依依客路長蘆菴八詠己亥春涵公來余溪上詢其居曰蘆菴以其環菴皆蘆也詢其境曰雪浦以其秋容橫徑春色繞籬籬之右有溪溪名返照溪之東有閣閣名回瀾前汀宿鷺後沼敷蓮蓮沼之上築室如斗有霞可貯有月可乘乃瓢月窩也如是心竊嚮之得假秋孟縱扁舟凌積雪悉如公所言成詠以記即目俾後賞者知豫境志蘆室數椽雲裏縛危墻風捲層層接浪長秋岸柳殘猶積絮曉簷月落尚餘光夢清似臥深嵒雪坐冷疑談滿室霜何復空無塵一點好將湖海盡含藏菊徑稜稜石夢抱苔生砌冷西風節操清曲列繁葩開曙色斜分幽艷傲霜晴送人欲語含香立揖客無言帶笑迎步滑秋光侵履溼偏迷歸路錦中行繞屋梅冰肌照水萼初鮮鐵骨橫聰影乍眠暗有清香環竹戶瘦無寒葉泛流泉四簷日暖開三徑八面春消浸一天久羡主人多舊識夜深風動月娟娟返照溪薄暮西山蘸水涯半竿返景釣平沙龍鱗疊疊篩金碎燕尾離離剪玉斜影倒堤邊分素練光回鏡裏織流霞乘間小立桑榆外上下隨波一望賒回瀾閣縈紆一片溯危樓面面遊人倚碧流簾入浮光清可掬檻凝浩色冷難收繞簷淡浸雲天曉倒影深驚海國秋半笛涼風間縱目山川消盡古今愁宿鷺汀鳥落腥風染巨河飄颻絲頂玉揩摩煙棲恍似潮侵岸沙宿猶驚月映波夜色踏殘寒不少湖光點破碧無多周回十里迷漁艇曉散空餘緑漾莎菡萏池盈盈數畝浸漁磯露滴新荷色更肥對月無人常欲語惜香有夢淡慵飛光搖緑幹流斜影彩織晴波浴素輝岸葦環舟人不見清歌知有採蓮歸瓢月窩斗大乾坤奪化工虛心淡與玉蟾同簷分眉黛浮清影輪抱詩瓢貯晚風一室光留霄漢外半間雲借廣寒中人家猶隔山前路那有雞聲到澗東五旬初度晴虛萬里鴈傳聲天入冰壺影更清丹灶與人既無分青山自是老間情不須露冷三更夢空有秋高八月明嵒峻住來忘晝永知非誰又學長生春日偶成荼蘼香褪筍抽芽門對蕭蕭竹幾家鶯語垂楊聲漸滑人行芳草興偏奢煙霞錯落東西岸桃李參差上下花回首渡頭風色淡支笻間數燕飛斜嚴太史丁豸史同遊怪石塢分韻得斑字東風攜我一朝間礙徑蒼枝取次刪樹老薜蘿生就古苔封石磴養成斑乍看盡道雲歸壑小立猶驚霧宿山笑指巉嵒猿莫度倚松時見鶴飛還考盤謾興溪風滿徑暗飛聲竹裏人家帶翠耕寧與乾坤藏古拙肯將歲月博虛名煙深春色梅初放香老秋容菊又生一片野情間不徹枝頭好鳥語分明過雲際寺探幽獨得入重巔一杖斜擔萬壑煙水滿石潭龍乍起雲飛松徑鶴初眠巡簾清磬敲明月抱嶺疏鐘扣碧天何處僧歸溪上影好來燈下共談禪細林懷古高登仙徑欲尋蹤丹灶煙消冷似冬鹿去峰頭蒼蘚積鶴飛洞口白雲封曉看柏葉疑清影暮對梅花想素容只有細林山上月還來夜夜照孤峰蘆灣釣艇兩岸秋深色半殘生涯分付一漁竿花飛亂雪溪顏老日落清灣水面寒碧藻戲魚翻錦浪緑楊曳棹下晴灘絲綸收拾渾無事笑狎波鷗鏡裏看潮回古岸蓼汀秋老悵無涯浙浙寒濤嚙淺沙澗激千尋光涌月溯回萬里氣蒸霞疏楊帶雨隨風亂小艇依鷗出浦斜遙望煙村迷野渡蘆灣隱隱幾漁家舟中值雪遠近平鋪一色天新詩滿載子猷船紛投湖面尋無迹點綴梅腮看更鮮歸鶴淡迷雲外樹披蓑慵釣水中煙而今好劇剡溪興謾枕寒流抱月眠鴈字二首絶海排空筆勢寬遠塗霞練飽風翰篆成鳥迹煤還溼隸出龍文字欲乾曉起仍將雲拂斷夜深常把月批殘似知爻未分河洛先展飛章壯大觀高揮瓔珞起霜風點綴才情奪化工雨過形鐫青玉案日斜影勒紫霞宮乍看疑帶煙微抹細認還連霧薄籠堪惜時文都掃地故將古篆寄蒼穹江夏張千戶全家殉節和韻煙捲黃沙鼓角時一聲吹動滿城危魂銷馬革荊山冷血濺蛾眉漢水知細雨催花添客淚空林啼鳥代人悲全家雖載千秋史金碧還留佛火垂剩一子出家和拙菴大師崆洞山寄懷頻年蹤迹傍雲寒雲水空濛鼓棹難不有風回邃谷何來好月下晴灘懷君襟度三江闊笑我鬚眉半雪漫峰泖只今情更好片帆莫惜剡溪歡和霞胤大師春日過訪韻多年瓢笠懶為裝喜遇交知舊話長暖入溪頭春雪霽晴回谷口早梅香愛君瀟灑常牽思愧我疏慵老更狂把手山前時一笑童心未改任風霜和汪周士季青過訪韻常年竹屋老山家慵向侯門轉法華分野忽來雙德宿煙雲影動半窗斜時遊碧嶂同尋藥間品清泉共煮茶天亦有情留客意故將風雨阻嚚譁影息空林懶渡杯足音高蹈遠纖埃談深石上連雲坐嘯徹松間跨鶴回茶熟清泉翻蟹眼香銷活火宿螺灰淵明莫訝山齋冷他日乘間須再來春日間居和韻二首霜翎無復憶蘇耽翠旭猶思訪劍南風綻好花偏訝妒雲依怪石乍疑貪輕煙小浦梳晴鷺細雨空階浴曉蠶自是山家多逸趣棋分仙子共攜籃欲卜幽棲老益耽幽棲原不在終南影垂柳葉因絲細香結桃花為子貪三箬風清啼越鳥五峰日暖簇吳蠶春深是處園林好摘得青青蕨滿籃挽默符大師寂歷青山鳥不鳴池塘芳草夢初驚影分隻鴈雲千里魂散孤鴒月五更春樹依依添黯色秋江浩浩瀉愁聲忍看白社今寥落風雨黃昏滿室生南洲和尚白雲夜話鐘沉古寺漏聲殘喜對幽人興未闌蕉葉驚心來暮雨蘭香有意薦春盤敲窗竹影隨風弄墮席燈花帶笑看自是話深眠不得一聲旅鴈破雲寒偕諸禪者雙石庵移貓竹分得淇園襲暗香飄飄林外碎琳琅半生活計餘三徑千個間情可一方鸞鳳棲殘因節徑魚龍釣盡為竿長此君不作趨炎態常伴山家六月涼社日新晴同諸子集戴文學草堂次韻二首陰雲散盡起和風誰露晴光野色融雨霽子林山欲翠天開萬境日初紅奇花約我招陳子芳草催人訪戴公曉出橋邊聞鳥語青霄不與昨時同暗度陽和擘柳風晴攜藜杖帶泥融山含宿潤微拖碧花擁晴嵐淡抹紅明月滿懷歸劍叟白雲幾樹挂壺公侍中也道田家樂笑指春光處處同宗學博過訪和韻深入煙霞何有鄉誰來車馬曉飛揚傳經幾度開文苑曳履頻遊選佛場皖水風高聲遞遠君山月朗影流長白雲意欲連宵話他日還期到上方圓通大殿上梁兼贈笑翁和尚弘濤峻秀壓群山大啓圓通紫翠間彩結珠林瞻佛地霞流金碧擁禪關千尋殿聳天花墜百丈嵒開海鶴還遙望庭前香篆細滿爐雲靄鷓鴣斑和戴恂九春日過訪韻香老梅花識素心無干寵辱古猶今文章不易連城璧聲價先馳翰墨林明月一壺青嶂曉高風滿徑碧雲深朝來展讀臨軒外錯落珠璣助客吟讀衍慶堂詩門環翠靄萃英賢滿座清風別一天引鶴徐行流水外攜梅同醉畫堂前裁成雲錦人爭羡瀉出珠胎世並傳不獨洛陽增紙價會須忙殺市書船宗堂種桂朝移雙桂植庭中老翠連雲抱曉風香散黃金來佛國影分碧玉自仙宮參差皓月陰猶霽點綴輕煙淡欲籠笑倚闌干清夜永時聞蟾窟覓芳叢竹筆筒銘三笑圖三松筆我銘之成三絶端硯銘二首端溪産英水玉函聲曷表爾德曰恆堅貞金全其聲玉全其質德潤煙霞眼明鴝鵒不雨長陰無霜自肅堅而不頑靜而克淑吾是以知端方之品皆可以入聖賢之室竹祕閣銘日新月新乃規乃式清在爾躬玉咨爾德處己虛心同人有節雪後君子為天下則題畫嵒峻虛含碧霞明溪欲曉秋來柳不疏山色青無了春日遊鐵壁居三絶露深花不語風淡竹生濤遊遍日將暖呼童解縕袍梅老籬邊雨石廚香且甜住僧留我宿款待不須鹽嵒畔煙如滴有人高負暄問君何所取山鳥識人言竹杖不必輕投棄時陪出遠山摩娑青骨瘦常帶白雲還蒲團片雲鋪地穩山靜不知年坐冷初晴夜從他欲雪天癭瓢間貯雲千頃高懸月半鉤翛然天地外樂飲孰同流先師窣堵自辛亥至甲子告成匠人索塔石之直昕夕促迫鬻衣鉢償之不足則變青羶基業猶未給也感成八首偈書八月別維揚一棹仙龕載墅航歸砌善權經七載是誰卜地問真藏簾穿紫燕舞雙雙殿老無人撫石幢偃柏不聞山雀噪巉嵒惟剩籜龍降鴈序推豫穴可尋眠牛早購誼捐金山來話到全無主空有冰霜一片心聯芳六七水雲親履未西歸各隱淪已道豐碑摩歲月不聞遠棹訪嶙峋同出師門志各堅清標嵩嶽起家傳非關道阻雙魚杳只為多參解脫禪二七功成九月中青羶變盡鉢囊空欲賒玉露酬鐫客先鬻金飆償石工門開一室貯煙霞老去空山兩鬢華世事渾成原上露人情總付水中花鐺煮乾坤帶晚炊光生窣堵月臨池那知無限山川意總在源流不盡時龍華十詠彌勒峰坦腹何年降翠微青山不老笑忘歸非關雲月頻來去自是襟懷朗素輝青龍岡幾曲稜層幾曲斜蜿蜒蒼翠轉天涯不須潭上僧擎鉢遠自東來作護沙獅子嵒白澤峨峨語碧蒼嶙峋山色遠昂藏天教生在千嵒上不待聲傳百卉芳象王峰六牙高獻鬱崔嵬隱隱無驚石上雷謾道春深花不入長流噴鼻繞溪回花石澗誰來石上種芳叢不逐清流繞澗東料得春歸無著處群英轉闕水晶宮寶珠池松杉倒水緑雲垂半畝環塘合浦移只為夜光常在沼卻教龍鳳到山池六和泉誰引曹源滴滴清天光和月繞山城不因六寶供千指爭得長空作雨聲天井嶺甃碧嵒嵒貯石坡玲瓏孤聳響山阿人來谷口探奇勝不是雲過即鳥過嘯月臺層臺四出倚雲林似與清光好更深夜靜時來留客坐一聲長嘯碧千尋怪石塢層層石浪涌溪山曲徑高低翠靄間雲捲渾如秋水骨雨晴錯認落星灣皖桐八詠桐梓晴嵐丹嶂橫開水墨屏樵歌谷口畫中聽遠分山市千尋碧淡抹仙嵒一帶青練潭秋月雲根淨洗貯深淵蕩漾晴空一鏡懸別是冰壺清有露波光占斷十分圓投子曉鐘夢破城頭韻更清猶疑絶頂扣新晴非關古寺聲沉遠盡入松風徹五更孔城暮雪寒光壓屋寂無聲歲晚林巒玉疊成欲訪前人偃臥處梅花冷笑自知情浮山夕照霞流淡影泛岧嶢樹轉餘輝翠欲漂直繫長繩牽返照莫教倒景入波搖樅川夜雨林深黛色掩寒扉帆捲漁燈帶濕歸滴碎山川侵客夢洗清天地悟禪機竹湖落鴈翠繞雲山水繞空字排沙磧印歸鴻不知紫塞春風裏何似清波閬苑中荻埠歸帆野岸蕭蕭浸碧流扶疏黃葉捲歸舟晚來一幅霜天景和影和帆帶月收禮菴八詠菴為師所築退居守百老人塔離墨峰天開仙嶂出雲端丹灶縣嵒挹露寒翠壓芙蓉平地起嵐分陽羡半山看善卷洞林深空谷倚山隈漁棹無從載月來澗底水墨龍起處年年常見碧桃開九斗壇梁武帝祈雨處錯落瑤臺石徑分空山老樹帶斜曛六龍去後秋風冷鶴化壇前一片雲萬松嶺林立森森展翠屏影搖十里老龍形不消圖畫鵝溪絹秀拔江南萬仞青洞山泉一泓卓出碧雲涼清瀉時翻玉線長曉起坡前和露汲深林靜泛落花香明月池風生細浪鏡中圓一片寒濤浸遠天誰把冰壺移在此清光放出影娟娟藏真塔即百老人窣堵坡老去雲霞一塔新風摩金碧淨無塵夜來石上聞天語何處青山不待人待仙橋飛虹百尺鎖柔條素練難將翠影飄竹杖曉來因俟客間行不覺過仙橋寶嚴八詠寶嚴出名即雲際寺吳中石像吳中浮出露金容一片晶光燦影重不為乾坤開寶筏那知山水育靈蹤宋世槐陰翠積千條雨露新前朝金碧蔭無塵黃花溪畔年年發惟有山僧是故人石屋嵐橋嵯峨石室鎖莓苔簾外嵐生戶半開宛轉蒼龍晴臥影路通宵漢待仙來考峰峙錫為解山前兩虎爭一峰高峙碧雲擎林間雨過天風起多少人傳振錫聲東林吐月亭亭翠聳樹邊多夜涌冰壺漾碧蘿山白盡驚天乍曉溪明又道水生波西澗鳴泉源出石溪響翠微涓涓右繞瀉珠璣等間不放漁舟入雨化空聲夾岸飛石蚌含珠石涵瑞彩露猶藏百嶂仙嵒吐夜光瑩徹胎間搖藻麗影分潭底照流長金雞宿水芥羽星睛鑑碧漣慵裝錦翼鬥花前朝陽不唱山邊日踏水惟眠鏡裏天白雲八詠香爐寺霧靄樓臺日上遲沉檀煙暖噴金獅欲尋芳馥來山谷只在氤氳未篆時白雲山玉屏高倚列奇峰曉接嵐光簇影重有意伴僧間抱石無心不復遠從龍繞佛徑霽碧星河永夜清盤空燈火繞山城風隨徑轉更三漏月引人歸磬一聲出水蓮山形如蓮前臨溪水香清雲錦綻煙波石瓣層層挹翠多開有年深常欲語更無人向虎溪過流金即蓮心師塔建此疊嶂遙開一鑑圓白雲捧出碧嵒前煙流仙沼堪成畫風靜蓮臺足隱禪步月臺雲銷石磴月華侵碎踏寒輝涌碧岑皎潔不嫌山寂莫留連似與客情深帶玉溪堤分燕尾漾清灣十里銀濤束半山有問晴飛何處雪溪聲遙指白雲間回龍岡遠出天門躍翠虯飛騰千仞浪中浮隨蜒隨蜿橫雲外知是崢嶸幾度秋龍門八詠龍門高登禹浪轉星河隱隱重關翠靄多曉起噓雲天外去惟餘石戶掩松蘿瀑布一派空飛萬斛珠風吹不斷接雲衢金波莫與山收拾留取鉤簾挂石臞羅漢峰西來不愛白雲乘擁翠跏趺最上層明月也知青嶂好晴空先照坐禪僧天方池半畝天開石上流波光湛湛冷煙浮凌晨花落千峰影薄暮風生一片秋白龍潭光分素練半晴陰滿沼腥風襲遠岑想是曉登三汲浪嵒邊猶剩一池深雨珠崖石老空林雨蚌胎人疑合浦夜光回寒輝點點山藏媚莫使驪龍盡日猜古藤洞門開萬壑鎖煙霞草長仙蹤一徑斜滿壁龍蛇搖翡翠和風送出碧桃花獅子峰峭拔孤峰搏象形玲瓏萬仞眼懸星風生大壑渾疑吼會有人從月下聽山居九峰翠色連三泖四海晴光共一天盡是我曹囊裏句尋詩何必到梅邊靜裏清飆自掩門山中別是一乾坤七松五柳高風在雙桂三花古道存經脫白處崇禎癸未剃髮桐城地藏關七日即遍參康熙癸亥過此感賦撥草桐陽翠滿樓繞城山水轉長流翻思髮落軒前日一杖翛然四十秋煙霞盟久未登樓棹轉煙霞接上流忽聽山城相耳語聲聲道我鬢垂秋六十自敘夢託高僧兩鬢霜聲啼戶外報更長當年愧與潮同日此夕空傳滿室香母氏夢僧借寓産時聞香時逢犬吠起塵沙教秉方規義更嘉祇為酬金全不顧始知清白可傳家甲戌民變家君救方氏數十人報千金不受咸以義士稱之深入鋒波覓二親號天弗應淚痕新不因別硯投空谷爭得椿萱脫苦辛明季寇亂父傷母溺遍覓無音代酬夙志遍詢煙水浩無邊暗度韶光草七年坐破蒲團知幾幾得來妙處不須傳晉謁草餘知識末後脫穎辨山記莂時年已草七矣青龍十載善權三轉入爐峰即香爐寺草木酣石丈詢窮雲際寺名路浮圖仍繞國山嵐尋師塔址數卜名山吉壞難求仍遵遺命巋巋窣堵未成功問鼎人來劫火空築室暫期安樂院辨山權肅舊家風寺占塔荒不遑居處暫赴兩山為權守之計一塔培成十六春禮菴廬名猶待再來人緣茲重謝靈山召日掃蒼苔補石垠時憶再來之識築室獨居頻辭外請晴光攜我繞仙岑摩撫碑幢護上林六十一翁何處問瘦笻只在白雲深塔事告竣命僧代守歸憩白雲讀木崖集風雅爭傳紀有年忽遺珠玉滿庭前情知陶謝應無敵寫入香山第一篇乾坤老我不知年姓字時聞客在前一帶雲霞裁古句兩京風月展長篇訪投子青祖塔傳燈載祖塔三峰巷後明人依葬片石僅存瞻禮感賦前朝金碧叩西鄰斷碣相傳欲隱淪不是龍眠山上月常年誰照塔中人再上層巒翠密遮林荒塔老夕陽斜殘雲滿徑誰收拾間殺三峰幾樹花寓靈泉陳越樓姚羹湖丹楓潘木崖戴叔冶方世五東來過訪別後鴻奇半有無高軒遠過草亭孤徑荒無假凌晨掃天遣簷華洗石衢深林寂寂鎖蒼苔惟有白雲去復來靈鵲不曾傳信至燈花昨為故人開柳外旌旗拂曉塵英耆驚喜白頭新那知一會靈山客來訪三生石上人編百老和尚全録有感遵選遺編刻不停渾忘寒暑逼微形裁成一字分今古寫就千章冠丙丁深懷剞劂遇人稀誰是同知慧命微欲向鋒前陳錦繡先從紙上燦珠璣法檀滿載訪知音古道無人冷淡深款乃一聲山月上娟娟照我草年心懷淨土得南無十二字稽首西方孰指南一程十萬鏡中函蓮壺聲滴花間漏點點催歸客未諳荷生王沼露香無遠散雲光列畫圖因憶天台華兩勝樂邦端不越長途果結禪林隱淨阿花開淨社繞禪河永明禪學猶崇淨禪淨誰分水上波瑤階寶樹色堅彌樓閣參差蘸碧池歇祖相逢時一笑故鄉謂我到何遲朝朝斫額望彌陀一別慈顏幾夏過叩到中峰天欲曉雙雙白鶴舞雲和一朵蓮開生一佛池澄七寶風微拂優曇現不在西東掩映交光香馥鬱迦陵疇昔曾同願大事多逢知識勸一日護生十二時半函課唄聲千萬花綻蓮池託化生香風遠引繞金城輪珠百八誰為念念到無聲莫問程風送梵音過嶺西梵音不輟轉前溪但蒙大士舒光照早得彌陀引手攜晴湖萬頃𣵪無方載出新荷滿棹香佛繞長隄聲遠近月高古塔影微茫霽碧關河千嶂淨鳥鳴時雜人歌詠休從象外覓西方端在目前嘗掩映金臺何日臨東土接引人歸千佛數非颱非幡任捲舒花開花謝無今古舟發楊子江訪青龍北和尚議刻先師遺稿櫓聲搖拽水聲清千里尋幽一棹輕獨抱琴書梯白浪不知身在畫圖行凍解陽和霽水濱江頭浪暖早逢春不辭一葉浮千頃猶把珠璣覓故人再發楊子江會青龍方丈丐梓百老人法檀斜披細雨涉江干又是春光一度看但得遺篇開夢眼何妨白髮走波瀾刊梨曾約叩朱扉踏遍空江帶雪歸驚起風前雙白鷺似知識我故飛飛三發楊子江抵青龍圓成先老和尚全録空濛煙水暗晴窗挾艇飛來白鳥雙為竟瑤章消歲月望中三復過龍江曉泛晴川訊隱淪到門喜見舊來人書成笑對前年樹遙映由拳雨後新同青龍北和尚送老師全集入楞嚴大藏兩兩冰心水一灣知心猶在海邊山遺風載上鴛湖月深貯樓臺翠靄間繡棗期圓託上方慧光滿載問行藏滄江與我情何好來往波中已四霜囑託楞嚴經主事鐫書不問歲時遙一字功成一淚消雨後風前收拾好莫教零落委塵囂留別青龍北和尚數載深談喜有期此情惟許白雲知霜顏客別霜顏客後會遙知是幾時雲開沙渚送歸鴻早發吳歌浩渺中回首龍江波浪闊片帆千里飽春風秋夜吟漏寂山城獨掩門幾家砧杵亂黃昏風前落葉吟訴句隔岸鐘聲欲斷魂送耿玉齊歸楚白雲江上櫓聲柔劃破波心兩道流今日送君離古渡他時應夢洞庭秋遊虎丘天外披雲入寺中點頭石老憶生公澗邊鶴去人何在萬古霜摩一劍風夕照斜穿石竇山光紫倒射籬根草色黃任是魯戈揮不住餘暉一徑下牛羊題點易臺昔人點易坐高臺點罷臺空人不來今對易臺留夜月莫隨朱露點蒼苔蘆花皎似梅花淡不香平鋪數里欲飛揚看來月下寒無影細剪秋風兩岸霜贈送袁重其吳水悠悠不計年吳山渺渺隱高賢鬚眉尚未知袁子耳畔惟聞霜哺篇再遊西湖春風再到武林遊花半含悲柳半愁剩有湖光山色在六橋不見舊蘭舟西湖老我每偷間草載重遊鏡裏山花柳盡銷峰骨露空餘橋畔水潺潺登太平寺萬壽閣大江西下九龍蟠高閣凌霄入畫看拍遍闌干天欲暮濤聲猶帶雨聲寒即景回文次韻雲堆巧石山塗墨畫入詩情風捲煙群草鬥香花細細老松篩影月娟娟詩從無字處生還從有字處覓執一失一不墮枯葉邊即逐亂流中去矣寒松和尚禪宗峻峭音節高超有字無字兩際俱斷信手拈來溯洄波浪吞吐風雲知師之詣於此道者深也有客持師集過梅村問詩從何處生曰千林雙徑出萬壑一笻通又問詩從何處覓曰卻招松頂鶴同住嶺頭雲是為序婁東吳偉業盥手謹題
