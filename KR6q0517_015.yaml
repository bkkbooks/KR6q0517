body:
  text: 嗣法門人德潤編録佛事彌勒佛開光不居兜率天特到隆福寺終日笑無休當陽施大意且如何是大意以筆點眼云紺目豁開千日光明明燦爛輝天地祖師開光梁王殿上失卻一隻青龍寺裏點出圓明既稱碧眼胡僧今又何須特地不因漁父引爭得見波濤達磨忌九年面壁成多事隻履西歸又脫空不是重重揚家醜只因齒缺不關風百丈忌再參馬大師美巧翻成拙一喝三日聾畫蛇又添足年年此日一爐香斷弦須是鸞膠續掃雲門湛然澄祖塔高撐石傘啓雲門電閃雷轟宇宙昏佛眼難窺吾祖意起家遍界有兒孫天龍共喜四衆同尊塔影當空日卓午千秋景仰柱乾坤辨山瑞白雪祖忌儒兮同桑梓相識不相見釋也作公孫相見不相識利道拔生幾箇知年年此日露消息甚消息一片栴檀海底焚金雞啄破琉璃窟掃辨山瑞白雪祖塔離山已草年禮塔今隨衆大地指為爐白雲拈作供不是道德難忘惟圖此話傳誦上香云即此用離此用琉璃殿上繞獰龍瑪瑙階前飛彩鳳百老和尚像成開光若謂是先師夜半虛明若謂非先師天曉陰晦是非俱拈卻一月普現一切水是非裏薦取一切水月一月攝畢竟如何舉目能令三界靜振鈴直使九天歸百老和尚忌法門摧法幢折魔宮復起波旬悅人天哀慕痛無依端的此心向誰說沉速一爐茶一甌願師定起返閻浮無邊法海砥中流不倦津梁運法舟三轉巴陵語且休好看異日再相酬百老和尚忌山色常明顯當時之妙用溪聲不斷演去後之玄音雖則道化他方此土為人愈切正當設供還來也無拈香云唵誐誐曩三婆囀伐日囉斛百老和尚忌三年前燭剪刊關月三年後香焚鳳嶺煙未審今日又如何滿口道來無一字半杯清茗瀉三江掃國山百老和尚塔萬里雲霞新氣象千峰蒼翠舊容顏熾然說法常無閒莫謂歸真有七年大衆你道先師說些什麼拈香云諦聽諦聽百老和尚忌日掃塔示寂維揚日於今八載周箇中無限意堪笑不堪愁大衆師歸愁不勝我獨笑何由幾見塔前水日日向西流百老和尚忌大清國裏兒孫遍地盡謂今朝是十周忌單單守塔門人不作此般機會若拈巴陵三轉語不無彼此瞞盰更作楊岐女人拜未免互相鈍置事到於今如何即是惟將柏子熱爐中焚卻幾多不平事掃冶父星和尚塔昔年秉戒沐餘光今日重瞻窣堵傍天外無人貧似我朝來撮土作心香雲黯黯水茫茫盡道歸真將一載誰知遍界不曾藏掃衍慶石鼓和尚塔多年林下仰高風窣堵今看繞碧叢自恨一身貧徹骨遠陳杯水獻雲中諸人還見衍慶和尚麼滿天風月清如鏡十里山花展笑容辨山且拙和尚訃至晤別兩周逢夏五一回笑語一悲音松山有約來看塔竹杖何期去別岑幾見彩雲翻白雨誰知遠淚落空林言言不盡傷心事只在栴檀篆靄深白雲大師訃至昔遙百里同參訪今隔千程得訃音草有二年端的意一爐香散白雲深惟我白雲大師律持五部教博三乘每訓英賢不動推辭之念幾興名剎毫無眷戀之心視富貴若浮雲等生死如夢幻業日富而譽日彰德彌修而行彌著借海口不能少分宣揚採蘋蘩聊作真前一供大衆你道大師還來納受也無揭諦揭諦波羅揭諦掃松漩二師塔剃染十天方才得見戒同兩月即便分離然雖久遠睽違宛爾音容不隔大衆既是音容不隔且道二位是何面目煙霞錯落籠芳芷竹樹參差鎖翠巒掃雲際寺諸耆宿墓千里歸程日夜催滿腔心事付蒼梅髮雖不在當山落源遠還從此地來祭掃宜先知早返參尋恐後故遲回今朝依舊空雙手肴借山川茗一杯掃藕家同始祖福一公五世壽三公六世大學公諸祖墓三百年前昔人已乘白雲去此地惟餘緑水流三百年後緑水一去不復返白雲千載自悠悠誰道山無主松杉成上古誰云祖不靈沉速對朝焚非圖探本尋源祇要大家委悉一年一度秋風涼天長地久有何極掃五里潭七世祖諱升嚴家觜祖母倪氏墓七世遠分流家聲惟自起嗣後裔更繁源源渾不已孫為學逃禪見性在雲水一物不將來栴檀焚海底問諸人委不委花開五里潭果結嚴家觜掃林家沖曾祖榮軒公畫眉沖曾祖母嚴氏墓昔日曾瞻葬祖翁今朝重謁翠微中山山水水拈為供莫謂緇衣奠不豐箇中事許誰通一片金環石上月夜來長照畫眉沖掃畫眉沖祖父青城公祖母劉氏墓崇禎壬午清明節大父母焚祖塋側康熙壬子中秋時燭剪畫眉山上月拜別雖經三十年日日何曾有閒隔沒閒隔端的別祖意明明不覆藏箇中消息向誰說掃五里潭先考百亨公先妣王氏墓齊家國睦里鄰偉矣諸儒傑出教子孫習禮義良哉百世芳流曰佛曰仙惟勤惟致事生事死誰重誰輕誠不忝嚴陵之後裔端無慚王母之遺轍雖子不談父義然兒豈譽母賢祇為兩袖清風別去那期三十載半肩明月歸來奚止數千程因遵割愛之言敢動號風之慘惜其素手罔極難酬一瓣拈來四思總報大衆見麼五里潭前金鳳舞仙人石上玉鸞飛徐護法點主花開奕葉緑陰繁遠襲清香遍八坤自是流芳承大業兒孫代代起家門沙彌剃落人生未易得為僧將相由來所不能一斬青絲絶愛憎丈夫稱贏得師名繼祖燈付衣著佛衣成佛子行佛行證佛果總在一念之間端的還曾見麼揭開箇裏明珠照破山河朵朵沙彌剃落為離生死叩青龍自古僧形髮不容豐草堂前都鏟卻頂門迸出一輪紅付衣堅固通身簇錦奇魔軍戰退樂無為驚群須是英靈漢敵勝還他獅子兒沙彌剃落出家初不為虛名名若虛華道未親直把虛名拋格外虛名不與自成人付衣孝名為戒忍辱為衣佛佛授手祖祖行持直下薦得不隔一絲何也自從盧老收歸後須信人人總有之沙彌剃落白髮三千丈緣愁似箇長金刀時一舉熱惱化清涼者般事豈尋常皓魄一輪滿緇田九穗香付衣羅紋結角錦層層一縷龍披伏大鵬三事全身被股肱仗師承標榜人天有路登沙彌剃落除愛結著鞭先髮斷青山入善權昨夜春回空劫外覺花香綻玉壺天付衣酬恩有著柔和因明果正發向上悟無生形端影直然則信受奉行合作麼生一塵渾不染萬法悉皆空抱拙大師封龕霽碧星河冷浸天垂楊兩岸鎖蒼煙梅梢月落珠簾寂畫閣香銷石鼎寒惟抱大師踞涅槃城長法王家足整三千天然有不肅之威儀仁育四來法爾具無緣之慈愛生鐵鑄成金獅子巧拙渾忘純剛打就玉麒麟功勳不涉到今日金磚落井稱錘到梢俊也彩鳳沖霄茫乎羚羊挂角直得妙協全開歷歷塵中混跡平懷常實明明炭裏藏身當此之時如何結局夜半金烏啼徹後桃花依舊笑春風闔然大師封龕畫樓鼓適轉三更忽爾東風海岸生浪涌千尋撼石嶼煙橫萬里障沙城凋零柳線愁多起冷落梅花夢不成堪惜上林慧月殞更憐巨浸法舟傾山川變色天垂淚鳥獸易顏水咽聲此際相逢何所事卻將簾幔挂斜曛秉炬舉臨終偈云今年三十五倒跨豐干虎縱橫不犯鋒遍界無能睹者漢生平倣投子之清節效大梅之密保日用間囂囂然而不與諸塵作伍逗到臨末梢頭略露些子風規使人與非人咸知本有且作麼生與他相見鑑靈枝大師起龕陽春有腳不居一隅而芬芳萬象無言卻借長空而吐露惟靈大師智足超宗仁能纘緒青溪演派飛海底之紅塵荷玉分流翻山頭之白浪紀綱法社則玉應金春宴坐人寰則鳥閒花靜方囊錐之露穎遽寶鍔其潛鋒蕙帳冰生不勝怨哀猿鶴蘭帷冷落誰當依止水雲欲冀北斗藏身何如南山轉步序鴈行昔忝居左論賓主今猶在先以手招云靈老靈老隨行踏斷流水聲好看寫出飛禽跡秉炬鶴騰霄漢出銀籠功盡超然體皓融帶月一聲和露冷靈枝任運剪春風穆堂大師封龕恭惟穆大師儒門俊傑釋苑英華繼孔氏之真宗傳家赫赫接曹源之遠派波浪滔滔半世深潛遠追鐵笛遺韻一生鯁潔實有紫芋餘香滿擬望隆迦葉那知嵒失空生爛柯山忽添悽慘之色蒼梧水頻增哽咽之聲長夜鐘沉石女聞之垂淚晴天霧鎖木人見也攢眉雖欲舊話重圓爭奈全身拶入大衆要見伊全身為人麼封龕云夜半一輪當戶照珠簾倒挂影玲瓏起龕日出連山黃金鎖脫出重關月圓當戶芳草幾曾迷古渡直饒是坐斷千差又何妨密移一步阿呵呵紫羅帳裏懶盤桓佛祖位中留不住秉炬別桐山兮勢且壯過梅嶺兮眼何高葉歸根兮覆青草雪飛片兮點紅爐出廣長舌兮一朵優曇火裏開轉大法輪兮三世諸佛立地聽穆老穆老從今唱罷無生曲還來助我主禪林石鑑大師訃至二十年前同志參禪奔南走北兩各一天二十年中同嗣青龍抱道守志一西一東二十年後忽聞報訃暗室燈殘狂瀾舟覆傷哉傷哉已矣已矣雖則同條生卻不同條死夜深明月上闌干梅花掩露淚如水存焉和尚訃至十二有人來帶得國山信法門砥柱傾同行鴈折陳慧命若懸絲衆生薄福甚我傷天淚流我哭天心震願不倦津梁再出那伽定參玄人早精進百歲光陰只一瞬四可闍黎啓龕六十四年與麼來吳江波浪吼如雷六十四年恁麼去不斷雲連天外樹正漝麼時誰共委坐斷千差不是你月娟娟而萬派欲澄風拂拂而六窗自啓半肩竹杖敲開幾處雲山一緉草鞋歷盡百城煙水以六度萬行而為基階將淨智光明而為棟材鬧市場中忽轉回依然落在白雲隈者雲隈不是汝安排遂抴杖云闍黎闍黎隨我來舉火緣暗紅稀獨露道人活計猿啼鶴淚全彰古佛生涯於此明得生而不生皮膚脫落性天真於此不明滅亦非滅滿目風光頻漏泄四可公微不徹擲炬云瞥和鼎知藏火夢冷西風楊柳煙歌殘曉月江天水生也死也沒兩般來兮去兮何彼此五千餘軸總閒言一藏由來是故紙者裏若解再翻身玉鸞和焰衝霄起月松田頭火披起青蓑一任穿雲帶月撐開緑笠何妨覆地遮天正當布種耘苗便乃收因結果既到者裏合作麼生咄咄咄莫狐疑月落松梢鶴夢遲大地掀翻誰作伴菊花開口笑東籬善持寮主火值雨來時眉生眼上去時眼上生眉感得上蒼垂淚引得送者拖泥要知箇裏風光一把無情善持典座火如來禪祖師禪拈來盡在薄刀邊斜批明月和光煮細切清風帶影煎沙裏油兮須自肯醬中蟲也任人傳回頭忽唱還鄉調一片紅霞吐白蓮了心火頭秉炬了心禪德會麼你終日跛跛挈挈苦骨勞形或吹火因風直使柴頭發笑或將薪掩焰從教灰面生煙汝還知冷灰裏豆爆麼擲炬云轟聖源禪士火梯山涉水草鞋穿行腳橫挑杖半肩不愛教中稱義虎卻來林下學逃禪掌記室追南公之墨蹟充客司步顯老之衡權要識轉身一著且看覿面親宣腦後圓光高萬丈煙霞染就杏花天悉慈禪人火箇事分明說向誰玄關叩遍貴無欺行殘白日居雲晚坐冷青燈臥月遲一片風光藏兩目萬重嵐色挂雙眉挂雙眉焰裏翻身看悉慈牧童火曉牧緑楊深處暮歸芳草溪頭四蹄踏斷一天秋閒看西風美柳對客慵為扣角月明高臥山丘露地僥君成白牛繩頭端在吾手擲炬云走冰輪火凍雲千尺帶霜葉以飄空冰鑑一輪照樵樓面疊回盡是轉身消息居然脫體風流冰輪汝還知脫體風流麼煙散長天拖白練花開陸地長青蓮僧守心火木落山寒正是歸根消息霜清露冷誠為得旨規模化城幻景休貪寶所真棲不遠但得虛襟無礙自然撒手翛然看取眉毛長丈二何須更覓守心人獨朗都寺封龕斜搭袈裟著半肩年高猶誦木叉篇光明寂照歸何處雲散長空片月圓惟伊禪淨兼持戒乘俱急輔法社務死生綽有楊岐之雅致護叢林明因果仍效寶壽之規模瑪瑙階前正好擔當重任琉璃殿上無端撥轉輕舠須識藏身原無蹤跡封龕云一聲掩上涅槃門獨露清名揚練水牧童火踏遍芳叢到眼青斜披篛笠半肩雲一聲短笛和煙冷兩角清風帶夕曛霞飲溪光分瘦影月眠山色露微形今朝繩斷鼻頭脫撒手歸來莫問程均被米頭火雲山歷遍孰為儔遠步曹溪習上流帶曉閒閒將粟脫臨風細細把糠浮不圖米熟三更讖喜得功成九月秋更透者重關捩子蘆花和影浸滄洲僧蓮果火一段風光本成現蓮開陸地花如霰拈來覿面須親薦莫留戀大冶爐中看轉變也魯火爾方十六齡棄俗尋師友經律頗相應死生悟非久焰裏好翻身雲閒須撒手也魯也魯出世因緣尚未周此番歸去早回首三喻禪人火翛然一笠遍天涯行解相應妙法華霜老煙成堅固後逢人正好喻三車少溪火生從何來溪邊梅蕊帶霜開死從何去焰裏芙蕖和雪露生死兩途俱踏翻依舊眉毛眼上安舉火來是恆如來去是恆如去來去總恆如何必更回互不回互火光迸出珊瑚樹湛得侍者火家住瓊州大海邊卻來吳地覓生緣轉身不必余三喚自有清風舞翠煙舉火越嶺猿啼風色淡吳江葉落鴈聲寒蘆花兩岸澄秋水一帶蒼煙覆翠巒慈光汝向者裏會得生死涅槃任去來而靡變今時那畔隨運用而不遷於一切法而得自在若或猶豫擲炬云逍遙從此無拘束滿目慈光卻更新德喻優婆夷入塔坐斷聖凡路了無古與今四面絶壁落寒暑莫能侵入骨云從茲放下閒家具笑看新篁出上林僧時雨入塔因透死生關久已拋情識一片為衆心今日方收拾欲識其中人須登者一級者一級春秋嘯傲自閒閒花雨飄颻灑不溼陳氏優婆夷入塔捨不得兮成漏泄通身放下離生滅不須向外苦追尋箇裏乾坤閒歲月覺如監收火為衆多年不憚勞因明果正鑒秋毫昨宵結算雖收拾帳底依然猶未銷未審如何消得烈焰光中高著眼香風滿徑雪花飄入塔一生持戒殷勤萬事浮雲看破今朝顯露全機覿面休云錯過不錯過無限青山列畫圖春光影裏乾坤大僧圓淨火圓同太清無古無今淨如皎月非生非滅通身饒是絶無塵看去依然猶未徹徹不徹分付祝融為爾說入塔一點靈光本自圓何須向外覓言詮巍巍獨鎮乾坤小嘯傲春秋不變遷玉之行者火志大慕叢林肯羈菴與院剃髮已三年事師無二念一程未到家超然登彼岸饒是玉無瑕也須經煆煉此番歸去來莫把紅塵戀玄溟監收封龕多年為衆半世焚修晉謁名山化導不分僧俗相股肱叢席殷勤只究死生期鑿飲耕餐而頭頭得妙鋤雲種月而處處分身叵耐今時不古即從忙裏偷閒君既然寂靜龕中我寧惜封加戶上遂拈封云一片白雲橫谷口了無形影落人閒舉火萬事翛然無一說好看焰裏飛霜雪西方此去早歸來再與叢林作軌則入塔玄闍黎頗真率翛然生死無拘束多年為衆不憚勞今日藏身在隆福悠悠嘯傲老林泉坐看山青與水緑玨明禪人火春風漏泄百花香春鳥喧鳴白日長極目無非安養國何須向外覓西方急轉步莫悠揚但得通身絲不挂自然彈指到家鄉德基尼入塔一夢破浮生了無人與我萬緣既已空榮辱難羈鎖德基尼會也麼人間天上此為尊十丈蓮開華一朵僧德明入塔緇也素也惟德惟馨來兮去兮非明非暗千差坐斷萬緣空一念不生全體現普同塔落成衆亡者入骨千派環來圍窣堵萬山擎出繞煙霞湘南潭北何須問生佛從來共一家舉火爾虛爾虛良可規模出家十載志不移初今日轉身歸去也人間天上總無拘德茂火連日雨淋漓偶晴送德茂霞光陸地生蓮花焰裏笑未審笑箇什麼擲炬云道道入塔日月高兮莫能照山川易兮莫能移驟雨至兮莫能溼嵐風撼兮莫能吹四無壁兮孤迥迥中無門兮峭巍巍既無門與壁此又安甚處雲藏無縫襖花發不萌枝僧法忍入塔八十五年光陰一瞬生死去來夢幻泡影若從者裏拶開方證無生法忍德壽優婆夷入塔昨朝脫卻嫁時衣今復披雲入翠微識破繁華都是夢坐看山色轉斜暉知幻禪人入塔知之一字衆妙之門踏翻關捩迥絶言論撒手歸來無一物青山何處不稱尊明宗入塔高而無上廣不可測浩浩波光重重山色坐斷千差亙古今風光遍界有何極上善優婆夷入塔七十餘年上善生死光陰如箭今朝撒手歸來贏得春風滿院擲骨云薦僧慧日入塔迥絶遮闌不存向背放下通身得大自在一輪慧日麗中天皎皎晴光敷萬卉入塔生緣西蜀行腳東吳煙霞飽飫城市安居涵育公會也無六十四年成夢幻轉身直入大毗盧衆善信入塔寬若太虛無缺無餘量周沙界非內非外任他若聖若凡若男若女俱到無陰陽地上同行同坐同明同暗任意逍遙渾忘人世雖然相逢相聚笑呵呵更有春風春又春入塔不必望梅止渴何勞畫餅充饑但肯身心放下自然得證無為望梅居士知不知轉身不踏來時路滿目青山第一機楊君仲入塔高林山色好百卉吐清香不須尋淨土覿面即西方會得則薰風影裏春初去不會則流水聲中月乍還畢竟如何大悲千眼莫能看僧聞覺入塔焰裏翻身清香拂拂體證金剛了無變易其把住也煙封霧鎖其放行也雲白山明正恁麼時還是放行好把住好薰風一陳自南來聞則清涼覺時現入院掃瑞祖塔五十年來清風匝地大千界內朗月當空欲盡大地人不許夜行投明須到獨有操孫冥頑不振忝繼祖席燒一瓣香奠一甌茗貴圖此話大行若說道無可比德無可名猶是太虛面上畫彩增妍且向何處見祖端的鐵蛇橫古路彩鳳舞丹霄退院掃瑞祖塔前年繼祖席不辭赤手挽隤綱今朝退祖席剩得孑身存古道惟其如在規矩森嚴緬想風神描畫不就未若茗烹三箬供列五峰恭陳塔前聊循家禮今古酬恩是此心莫言臨別不如舊赴辨山龍華寺請掃百老和尚塔臨終顧問誰為守塔三年應對全無我到傳聞矢志追陪十載風霜獨任餐霞宿露惟聞虎嘯猿啼砌石栽松只見雲來月往盡道廣長舌現那知頻喚人歸雖鄙願將周敢忍離左右奈祖庭催赴故暫假權伸我昔本懷時略露師今心事幾能知龍華退院歸掃百老和尚塔去時一肩明月歸來兩袖清飆不欲撩雲作供只憑拾翠成肴非是情疏禮簡卻還舊日遺標掃百老和尚塔一年一度焚香日焚到今朝二十年汛掃栽培無別意惟期大願力重圓操已老師未還法門敗壞不堪憐撫膺隱隱誰同語九拜臨風訴塔前老人曾有二十年再來善權之語攖寧和尚起龕大道寥廓如珠走盤宛轉偏圓無往不適而況千巖拱翠萬壑流輝者邊那邊隨緣得妙盡謂朝來留不住相知豈在久盤桓舉火西風一夜洗穹蒼誰道江南失鴈行露冷烏啼千嶂月更深猿叫一天霜惟我攖兄隱顯全該故生平用不盡一著子今日當陽顯露一切人攀陪莫及鑽仰徒然直得向火焰裏大奮全提別施機用要與兒孫留榜樣光前耀後一莖茅入塔護國寺中踏翻雪色山陰道上占盡風光時或電閃晴空應機而發花飛六出隨類而施時或藏舟於壑藏山於澤藏天下於天下提骨云者個藏在何處丹樓凝曉日碧殿鎖春雲雪大師入塔三十年影不回鄉二六時情不附物雙足跏趺處隨他黃葉墮空庭一肩放下時不管青苔封古殿生前克己道韻悠長末後為人聲光藹著寓大師入塔五十二年無可說溪聲山色常饒舌今朝北斗面南看楊柳清風與明月此是者漢末後行藏等生死若浮雲視去來如夢幻逗到而今密移一步銜花鳥自難尋跡孰謂將身北斗藏空明火來自何來香飄雪裏綻寒梅去從何去潮落江邊橫古渡來去分明俱擺脫摩空萬里飛銀鶴於中若解再翻身焰裏芙蓉朵朵新素聞火懸巖頂上抽身不留朕跡荊棘林中轉步迥絶程途縱然與麼行持未得通身慶快素禪德要識通身慶快麼雨洗長空流翠色煙籠寒碧淡山光聞初柴頭火不貪仙著爽幽尋頻縛蒼煙下翠岑夕照半肩山色老清風一徑暮雲深急轉步謾沉吟今朝尖擔兩頭脫撒手歸來月滿林內照火生死全憑內照功五更夢破一聲鐘轉身獨唱還鄉調踏斷千峰與萬峰看腳下且從容春到花開翠色濃入塔一笠翛然別戴山悠遊教海瀉潺湲縱饒談得天花墜又隔機先第一闕文振法師要透關麼入骨云白石無寒暑清風任往還舉火庫司多載盡忠勤聲價清高是處聞收拾瓢囊歸嶺去行藏猶勝賣薑人入塔六十三年前一肩推倒世塵緣六十三年後兩手拓開生死路正值在今朝虛空築岸架銅橋生白公會也未霜曉庭前花滿地僧逾玄火八十六年一夢回春風是處鳥聲催真機歷歷分明露箇裏縱橫歸去來入塔佛不是心道不在說彼此同途行藏各別既然彼此同途因甚行藏各別入骨云歇雪谷書記火非是無言說談玄口不開倒跨鐵牛走乾坤任往來喝一喝云切莫錯會大衆此是雪書記把斷要津不通凡聖最後為人一著子今日當陽揭露了也儻或遲疑更須諦聽哀哀哀誰委悉子夜金烏輝雪谷折腳鐺兒要汝提此番歸去須來速入塔紅爐焰裏翻身轉一道清光爍太虛坐斷千山峰不露渾忘寒暑到階除離塵優婆夷入塔昔日離塵脫垢今朝息妄歸真但得全身放下自然不落死生入骨云金雞唱破瓊樓夢鐵樹花開浩劫春宛然禪德火落葉紛飛十月天霜花一帶洗寒煙不須更去尋安養極目西方尚宛然急轉步莫留連擲炬云薦取天龍一指禪弟子德備資敬刻方丈和尚語録第十五卷所願滄溟浪裏同乘般若之舟功德林中共結菩提之果
