front:
  text: 寒松操禪師說法之圖贊鷲嶺一華嵩山五葉代轉金輪遞翻珠㲲青原南岳甘露揚鑣杖橫兔角拂豎龜毛瑞百二翁模範天降乳滴曹谿為時龍象首得寒公作大導師酬機爍電出語成詞開法青龍宗風獨唱泖水波澂崑峰月朗錫飛國岫大振全提狼突鴟張彼何人斯師顧嗒焉浮雲敝屣讓而不戶古善卷子雖隱安樂守塔志堅冒險築室孝義兩全蒼弁屢邀席繼祖苑塵垢金剛秕糠鐵面喬松千丈斗南一人凜矣高秋盎焉熙春荊溪法弟子陳維崧頓首贊寒松操禪師語錄序方今教外別傳之書流為世間何啻千萬識者憂其多而不可程也余獨以為不然蓋佳言玅句並非文字無絲毫意識之可尋故古之今之金聲玉振放之瀰綸宇宙收之不存涓滴千燈千照皆可以存其心養其性寒松大師蓋其人矣師神充氣浩眼正心空係洞宗正傳第三十世瑞老人之冢孫百和尚之嫡嗣也屢遷名剎倒卓烏藤啟天下之聾聵其垂手年深機辨縱橫雲蒸霞變四方問道者接踵而至其一言半句如珠在淵如寶在山雖欲隱藏沉痼詎可得耶信乎佳言玅句照世明燈開人心目豈小補哉虞山錢謙益沐手拜撰達磨西來原無文字厥後宗師曲垂方便故有法寶流傳正謂道本無言因言顯道棒頭有眼機用全超寒松和尚出世多年宗風大振高懸寶鏡照徹十方拈一條棒尚無佛祖開兩片皮豈有滲漏是以橫說豎說正說倒說如世寶翁信手拈來取之不竭用之不窮俾大地人虛往實歸無不獲益雖然畢竟家珍在於何處讀是錄者請下一語山陰祁熊佳拜手敬題寒松操禪師語錄序今天下衣伽黎而坐曲彔者大江以南盈數百家求其不墜前人風烈為當世之所推許者蓋未可以僕數今於寒松和尚屈一雄指焉憶昔入就老人住百丈自余與百兄數人揚歷座下於時象蹴龍踏人人以古道自期曾幾何時而諸兄皆作先哲矣余以衰邁無似閉戶窮山雖祖燈麤成而邪說未息思得英傑十餘輩與之并力撐拄則亦可以上報先宗下接後學慧命而四顧寥寥莫為之應中夜撫膺百感交集幸斯道未喪爾者寒公與一二同人振拔於吳越江楚間於是望玉笥峰頭漸有喜色而寒公七坐名藍爐火轟爍猶為四方之所奔趨有投子大慧風烈祖武箕裘真堪不媿其語錄具在讀之者自能辨其機用也寒公住善權時遭法門大故而一杖飄然如棄傳舍至今義興士大夫多其高風昔人論文章必及其人品余於茲錄亦云廬陵偶道人淨符題於錢塘之白嵒山中寒松操禪師語錄目錄像贊序開堂疏第一卷住松江青龍隆福禪寺語錄第二卷再住松江青龍隆福寺語錄第三卷再住松江青龍隆福寺語錄第四卷住常州國山善權禪寺語錄住安慶白雲山香爐寺語錄第五卷住安慶寶嚴山雲際寺語錄再住常州國山善權寺語錄第六卷住常州荊谿安樂禪院語錄住常州洞山善卷禮菴語錄第七卷住湖州弁山龍華禪寺語錄第八卷再住安慶白雲香爐寺語錄第九卷第十卷座元寮秉拂語錄機緣問荅第十一卷普說第十二卷拈頌古第十三卷拈頌古第十四卷源流宗旨頌第十五卷佛事第十六卷筆語第十七卷題贊雜著自序第十八卷方外英萼第十九卷九峰艸第二十卷拈來艸青龍開堂疏伏以五葉花開嵩岫並敷於鷲嶺千流派涌洞源大演於龍江後五百年而再逢實千萬載之希遘恭惟寒翁大和尚猊座下桐谿踵跡梅塢韜光道業深淵探泗泓之正脈機投直指得弁嶽之真宗足福足慧足英才峙泰衡於宇內全彰全收全妙用羅星斗於胸中敬承奕世箕裘振起傳家衣缽惟此青龍古剎首稱唐宋名藍性空師弄月吹雲鐵笛之餘音猶在百和尚敲風打雨烏藤之正令森嚴鳳起蛟騰纔見禪林美盛錫飛杯度又聞主席空虛若非入室白眉莫整高賢之矩必也超宗異目能承前哲之風懸寶鏡而罔象失威秉吹毛而野干碎膽庚等儒門樗櫟凡世菲葑蹭蹬宦途已醒浮華之夢優游法海將求解脫之方輸玉帶於無言何妨機鈍呼瓶鵝而隨出尚荷慈深惟冀俯念愚蒙即垂久可幢幡影動一天花雨蔽空來龍象聲喧滿逕香塵隨步涌欣法輪而大轉喜佛道以興隆草木含輝結彩雲於越嶠湖山增色布紫蓋於吳天異口同音引領合掌謹啟順治十七年三月十三日雲間包爾庚諸嗣郢等疏國山開堂疏伏以洞水湯湯千古淵源開勝地國山奕奕三生功業刱名藍欲繼志以光前必丕承之有後恭惟寒翁大和尚克家麟趾弘道馬駒一柱砥中流挽頹波於叔季十年撐法社纘貽緒於艱危試之彼而有然施於此宜更效茲善權禪寺肇自唐朝列祖風規隳於近代致使野狐山鬼清晝跳梁遂令偃柏雷書終朝失色乃明監院初開草昧驅豺虎而剪荊蓁迨百老人大振綱宗坐狻猊而趨雲水擅東南一方之勝增唐宋三李之光辣掌獰拳方破眾生之夢雙林隻履倏歸震旦之靈雖繼席再易其人寸木難支大廈而闡法久虛上座兩期已閉香廚問鼎潛謀輒垂涎於旦暮徹桑良策期禦侮於高明敢邀錫杖西飛慰父心以承父業試看鐵輪高運膺天眷以護天人曜等賦性凡愚皈心虔切愧乏黃金布地敢居護法之倫幸有赤膽包身願執降魔之杵伏願俯從眾志式肯遄來青龍興而善權又興箕裘迭紹子孝著而宗風益著花葉重芳殿閣千尋騰寶光於午夜松楸十里分翠色於諸天仰冀丙原可勝寅肅臨啟無任悚切翹勤之至謹疏康熙十年四月十三日荊溪蔣曜胤修等疏白雲寶嚴開堂疏伏以天柱祥麟趾遍江南而寶珠承足桐谿威鳳羽儀塞北而珥筆生花本來文苑奇英洵是法門梁棟恭惟寒松大和尚猊座下子陵遐胤珊珊丰骨清奇弁嶽正傳曄曄門庭高峻才優班馬曾別硯而還山學富陳劉乃披衣而得座絕六塵而超六相真能承二桂家風入三昧而達三明盡得鬧五宗堂奧法開隆福一人轉億萬剎之規模席繼善權尺土衍千百年之基業惟此香爐勝境元非近代名藍雲際禪林盡是唐朝古剎久矣二山乏主確乎多載思公佇瞻道價為尊啟承後烈遙企德音作範光耀前庥玄鶴歸來識得當年風月青獅逸出重開舊日雲山秉慧鋒而破昏衢施智燭而輝長夜然等欲從竺國若非顛老酬機莫契忙中省要有志香山端賴晦公指示方知格外真常冀涉水而攀巖亦披雲而問渡伏願弘揚宗旨祖燈共佛日長明大展法輪象力與獅弦並演黃鸝枝上龍舒三月皆春白鷺田中皖水一天流碧甘雨時霖于紀極法雷頻響于寰區化洽人天功超賢聖臨穎神馳翹企之至謹疏康熙十一年二月初吉龍眠姚文然程芳朝等疏安樂院開堂疏隱不擇地豈買山之可安佛欲棲雲縱泛海而非遠托可中之缽不必獅巖結午夜之跏何須牛首恭惟寒松大和尚人天法慧雲海弘慈入次第之定五色皆空遊解脫之門一塵不染處必爭之地而示以無爭舍罔覺之場而歸於有覺洵孽海之慈航乃迷津之寶筏啟嶲等情深頂禮志切皈依掃竹枝之舍暫作旃林剪罨畫之薇權充優缽雖非奈園之勝亦稱鹿苑之精所朢惠然肯顧不我遐遺袈裟佈處頓令大地作黃金寶錫飛時俄使凡鳥瞻白鳳則花雨遄飛法門有慶祥雲普被善信知歸不勝翹企之至康熙十二年臘月十一日荊溪周啟嶲儲振等疏禮菴上梁開堂疏恭惟寒大和尚洞山獨秀歲寒知松柏之尊龍樹同榮剝復見優曇之貴被忍辱鎧作大道干城吹大法螺為降魔寶杵當雙林之回首號泣呼天矢端木之堅心精誠動地昆季實繁獨賢勞而建窣堵折衝丕振爰高舉以避波旬天道好還人心思舊辭百堵之重興願十年而守塔誅茅闢土不煩緇素銖錙築室開場盡變青氈基業今者虹梁建極凌虛綵結千重惟祈獅吼震林普施法音億麗合詞虔請眾望允歸康熙十四年四月二十七日義興陳維崧史惟圓等疏弁山開堂疏伏以事由律制似有定而無移道以時行每理長而輒就居恒遵度猶須方矩圓規濟亟衡權始克聯珠合璧恭惟寒松大和尚客宿華宗曹谿嫡乳由桐江而傅桐邑韡鷲嶺之一花自善慶以主善權振嵩山之雙桂瑞翁奕葉推弁巘之鳳毛百老蕃根頌泖峰之麟趾龍岡遙接青龍寺無非道顯龍華國師謀占吳國山其柰棋逢國手雖爾雷書偃柏名勝銷亡依然山鬼埜狐譸張奄息禮菴精舍以無爭而止爭安樂名藍憫大覺之罔覺允矣魔難勝佛信然正可挫邪既七坐乎道場宜一歸夫祖苑惟是龍華片席實為大廈難支無祿雙林遄返三年之案未圓猶欣巨植久巋一柱之擎有在斯等敬遵公議不敢私圖人惟求舊既山主之心同條聿維新亦諸方之志一雖復築場念切欲嗣端木之儒風其如請法意誠宜赴華林之大任伏願龍安飛錫庶幾祖業孫承鷗適渡杯咸使肯堂復構得蒙俞允實慰翹勤謹啟康熙十七年臘月初吉吳興嚴我斯丁珝等疏
