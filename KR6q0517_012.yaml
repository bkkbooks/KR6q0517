body:
  text: 嗣法門人德泰編録拈頌古七十九則世尊初生一手指天一手指地周行七步目顧四方云天上天下惟我獨尊雲門曰我當時若見一棒打殺餧狗子喫貴圖天下太平強中稱勝招焚六合之尤陳後興兵徒奮一椎之勇若據青龍看來彼此不無其咎何故天下有道則禮樂征伐自天子出自言自語自徘徊自動芳心自作媒不是自家親骨肉誰將炭送雪中來開天闢揭地戶毗嵐園內煙塵鼓雲從龍風從虎赤電光中霹靂舞韶陽吞吐幾人知風送清香播寰宇世尊於臘八夜睹明星忽然大悟歎曰奇哉一切衆生具如來智慧德相但以妄想執著而不證得大小世尊開眼寐語無端六載葛藤牽跳出通身是蓋纏眼病空華休賣弄誰人頂上沒青天世尊一日升座大衆集定文殊白椎曰諦觀法王法法王法如是世尊便下座文殊一椎不妨驚衆簡點將來也是泥裏洗土塊若是青龍但只撫掌呵呵大笑看者世尊如何合煞幽谷瓊枝帶露開春含紅紫錦成堆誰知遇陳催花雨褪落飛英滿翠苔世尊坐次見二人舁豬過問者箇是甚麼曰世尊具一切智豬子也不識世尊曰也須問過珠穿九曲大覺可謂神功玉解連環青龍更資一路倘遇二人打箇噴嚏舁豬便行又作麼生一微塵內開門戶自引賊來反破家井底懸帆風勢惡夜乘明月出蘆花世尊因文殊至諸佛集處女子出定因緣今時盡謂文殊是大智所以無出無入罔明乃初地故得有出有入如斯話會孤他先聖青龍見處也要諸人共知出得也與三十棒出不得也與三十棒為什麼聻自來一統乾坤那許分疆立界一棚傀儡紅線抽牽燈殘人醉月上闌干清音撥轉西廊去露滴花梢夜正寒華山一睡嶽陽三醉眠者而得酣酩者而反寐堪笑堪悲誰同誰異名園一夜雨春風洗出青山如潑翠世尊在靈山會上拈花示衆云世尊拈花一盲引衆盲迦葉微笑相牽入火坑還有免得此過者麼喝一喝云眼裏無筋一世貧賣狗懸羊已不仁那堪眼裏又添塵斯時若掩蒼顏出免纍兒孫誑後人世尊因七賢女遊尸陀林可笑七賢女逴得些子即便旋蒸熱賣幸逢帝釋不諳時宜懡㦬放過若向青龍索此三般但云情知你在鬼窟裏作活計三物從來離向背明明借問轉周遮不周遮憍尸迦何不當初再獻花殃崛尊者因持鉢到一長者家長者已是錯問世尊已是錯答殃崛已是錯傳産婦已是錯聞善權今日將錯就錯諸人不得錯會一點春山一點愁一絲春雨一聲鳩聲聲暗寫春情甚誰識春情寄壟頭賓頭盧尊者因阿育王內宮齋三萬大阿羅漢二尊者若不是育王並須出國相逢便問家山路笑指家山路不遙回首暮雲歸未合抬眸新月上林梢善慧大士一日披衲頂冠靸履朝見梁武帝帝國要識三教聖人體麼恁麼也不得不恁麼也不得恁麼不恁麼總不得要識三教聖人用麼恁麼也得不恁麼也得恁麼不恁麼總得直饒會得體用拄杖猶未放過非禪非道亦非儒三不完全總是孤只道聚沙終作塔那知捏土不成珠寶志公垂語曰終日拈香擇火不知身是道場善權者裏終日拈香擇火不得喚作拈香擇火野老家風迥異常太平勳業總相忘皇風一片知何處燕舞鶯啼日正長三祖信心銘曰至道無難惟嫌揀擇大小祖師祇會抱不哭孩兒打淨潔地上毬子既是至道無難亦不礙揀擇春暖山自青溪晴水自緑菜花一片金麥浪千層碧明不明擇不擇二水中分白鷺洲風光兩岸生涯別南陽忠國師一日喚侍者者應諾如是三喚三應師云將謂吾孤負汝誰知汝孤負吾三喚三應鉢盂安柄兩箇郎當一場氣悶是則是不圖打草只要驚蛇子規枝上語聲聲暗把愁腸訴與人啼得血流無用處不如滅口過殘春有婆子供養一菴主二十年常令二八女子給侍婆子者僧彼此不無長處若是佛法三生六十劫梅雪爭春未肯降騷人閣筆費評章梅須遜雪三分白雪卻輸梅一段香青原思禪師參六祖問當何所務不落階級洗耳溪邊飲牛流上未是老成高蹈掃除朕迹撥轉機輪試看俊俏生涯當時才見祖云落何階級便與掀倒禪床豈不俊哉背手掀翻寶座平任從金殿五雲生巍巍頂相難攀仰千嶂惟餘一月明馬祖一禪師因僧問為甚麼説即心即佛祖曰喚鐘作甕指鹿為馬大師固已不能逃其責若夫體會大道直饒千佛出來亦無啓口處人間四月芳菲盡山寺桃花始盛開莫謂春歸無覓處依然轉入此中來藥山儼禪師因僧問如何是道中至寶山云莫諂曲僧云不諂曲時如何山云傾國不換貧而無諂富而無驕藥山老人聊亦可矣若是道中至寶猶未得在何故未若貧而樂富而好禮者也門外百千竿緑竹庭前三兩樹梅花客來莫道貧無待清淡門牆有幾家藥山久不升座院主白云大衆久思法誨藥山不惜一詞足可觀光及被院主拶著未免話作兩橛琉璃殿上金才布瑪瑙階前玉又施明露秋光猶不委暗藏春色幾人知藥山因化主到甘贄行者家甘問甚處來未成老幹之才先典從容之職化主其然也可惜藥山不用疾焰過風負他來意不少待納金時好與連棒打出且教愧殺者俗漢病源不識假儒醫賣藥人遭買藥迷不是山中重點破幾從箇裏別端倪丹霞然禪師訪忠國師值睡次乃問侍者南陽正令全提未免傷鋒犯手侍者咬牙喫棒依然禍出私門若是撞著英靈衲子管取直下棒折龍生龍鳳生鳳暗箭傷人心膽痛殺活直饒一時行家聲難討千鈞重丹霞訪龐公門逢女子靈照洗菜次大小丹霞向女子手中失卻一隻眼龐老也是屋裏販揚州青龍看來總是一隊賣私鹽漢拄杖子不在且各與二十笤帚柄夜影透窗天上月蘆花飛起渡頭風漁歌一曲才堪聽又被風吹別調中大顛通禪師因韓文公過訪問和尚春秋多少首座扶頭大顛把尾雖然頭尾相稱早被文公勘破時有僧問一般扣齒為何擯出有意氣時添意氣曰首座分上又作麼生不風流處也風流一般機用顯家風疑殺昌黎箇老儂不是臨巖重返擲爭教天下絶狐蹤百丈海禪師每上堂時有一老人隨衆聽法不落不昧獅入狐隊不昧不落狐入獅窟五百年前終日長安道五百年後春風醉未歸前後俱坐斷一聲鐵笛冷兩兩玉鸞飛由來祖位莫能留獨自酣酣臥古丘若把花枝半掩面不令人見轉風流野老祭江神乞兒翻筋斗莫作兩般看等是揚家醜百丈因僧問如何是奇特事丈曰獨坐大雄峰僧禮拜丈便打明鏡蒸食未為得所干將補履尤可堪嗟萬仞峰頭作者機縱橫殺活在臨時區區若解翻身轉不負娘生兩道眉南泉願禪師因趙州問如何是道泉曰平常心南泉雖是嚼飯餧嬰孩諸人切忌作道理會崎嶇不涉妙無求春去秋來意更幽啼鳥一聲千籟寂清風明月兩悠悠歸宗常禪師因李刺使問如何是祖師西來意宗豎拳云會麼曰不會宗云措大拳頭也不會歸宗好箇拳頭無端傷筋露骨卻成鈍置待他道不會便好驀頭一拳果是真措大必然別有生涯宗師誰謂無玄旨慣是為人窮到底細把瑤琴反復彈奈何不入聾人耳章敬惲禪師因百丈遣僧來探候敬上堂次展坐具禮拜起將敬一隻靸鞋以袖拂卻塵了倒覆向下敬曰老僧罪過運籌帷幄費盡百丈機謀決勝千里不消章敬權巧較量將來總被者僧勘破千里施謀意更深重圍掉臂機偏巧囑使覆鞋兮狼心不少老僧罪過兮暗箭誰曉百丈師章敬老看來卻似大蟲戴紙帽杉山堅禪師與歸宗南泉行路次逢一虎各從傍過了泉問宗適來見虎似箇甚麼宗云似箇貓兒宗問山山云似箇狗子宗又問泉泉云似箇大蟲字經三寫烏焉成馬杉山普願與歸宗道眼元來總不通一箇山君分幾種至今描畫不成功雲巖晟禪師問僧汝爺在否曰在巖云年多少曰八十巖云汝有爺不年八十還知否曰莫是恁麼來者巖云猶是兒孫恁麼不恁麼總是兒孫邊事要識爺麼當堂不正坐那赴兩頭機嶽陽樓子洞庭槎皓魄懸輝照影斜簾外轉身全不顧從來祖父不離家雲巖因僧問二十年在百丈為甚心燈不續巖云頭上寶花冠曰意旨如何巖云大唐天子及冥王者僧與麼問是知有不是知有雲巖與麼答是續心燈不是續心燈具眼者辨看從來香爇御爐煙不易綸音向外傳堪笑遊人誇意氣那知尊貴本天然龍潭信禪師未出家時居寺側天皇巷賣餅為業潦倒龍潭一釣便上煙飛石室去猶還謾道山中別有山回首即通仙子徑拈來一粒便成丹三平忠禪師因到石鞏鞏曰看箭平撥開胸石鞏雖有穿楊之作依然習氣難忘三平縱得隱身之術未免弄巧成拙高高一箭中紅心弦動春風笑展襟未識穿楊機用別到來誰不費沉吟溈山祐禪師偕仰山摘茶次溈曰終日摘茶盡道節拍相應不知互揚家醜一莖兩莖斜三莖四莖曲盡愛舞煙霞那知翠筠溼黃檗運禪師捧鉢至南泉位坐泉見問長老甚年行道曰威音已前泉云猶是王老師兒孫檗歸位焦磚打著連底凍赤眼撞著火柴頭本無位次可安排説甚何年行道來賓不賓兮主不主好將活捉一坑埋百丈正禪師示衆汝等為我開田我為汝等説大義開田了衆請丈説大義丈展兩手示之展開兩手聊以塞白若作大義以酬衆何異空拳誑小兒青龍亦開田了有人請説大義拈起钁頭便打因甚如此重賞之下必有勇夫大義明明甚坦夷何須展手涉多岐白雲深處家山好一曲清歌信步歸趙州諗禪師因臺山路上有一婆子趙州勘破婆子將謂將謂婆子勘破趙州元來元來雖然盡被者僧勘破驀直去勘破了鱉鼻被蛇吞大蟲遭虎咬真懊惱腥風毒氣遠侵人平地喫交猶不少趙州因僧問承聞和尚親見南泉是否州云鎮州出大蘿蔔頭好箇大蘿蔔頭塞者僧口則得塞天下人口則難懵懂無知總不記得一鏃撩空萬機寢息別別衲僧幾箇知端的趙州因僧問學人乍入叢林乞師指示州云喫粥了也未曰喫粥了也州云洗鉢去僧有省者僧悟則不無爭奈未曾咬著一粒米為甚麼聻從門入者不是家珍夜深涼月篩寒水漁子紛紛來問津三汲浪高春夢破江天一色露沉沉趙州問婆子那裏去曰偷趙州筍去州云遇著趙州又作麼生婆便掌州休去偷天者情雖不善換日者心猶太狠只知彼彼無端不顧傍觀者哂劍戟相逢詎偶然明來暗去各通權誰知就裏機猶別退步從來卻占先趙州因僧問狗子還有佛性也無州云無一點水墨兩處成龍佛性有狗走抖擻口佛性無猴愁摟搜頭無無無有有有堪憐錯亂滿寰區誰解移星並換斗趙州到一菴主處問有麼有麼主豎拳州云直饒收放隨宜縱奪可觀簡點將來猶未盡善因甚如此貪觀天上月失卻手中橈撈蝦摝蟹放蝦生單把蟛蜞較重輕換卻幾多人眼目到頭偏愛看橫行一竿拋兩岸收放任悠悠誰識龍門客從來不上鉤趙州因僧問萬法歸一一歸何處州云我在青州做領布衫重七斤者箇話頭纍我數年而今思量只是冷笑且道笑箇甚麼茫茫宇宙人無數那箇男兒不丈夫等間拈出上頭關無限行人著意攀祇道春從南苑發那知梅在雪中蟠趙州因僧問如何是祖師西來意曰庭前柏樹子趙州雖則與麼為人不免被者僧勘破一語昂然不變常水中擇乳須鵝王堪憐野鳥無機見空逐黃鸝過短牆唱盡黃金縷重吹紫玉簫曲終人不會風過緑波搖子湖蹤禪師一夜於僧堂前曰有賊有賊衆皆驚動一僧被湖把住云維那捉得也捉得也曰不是某甲湖云是即是只是汝不肯承當理契則神貧子獲衣中之寶性封則物壯士失額上之珠子湖雖有機變其奈不逢蕭翼致成龍頭蛇尾八十婆婆心不歇更深欲解愁腸結其如底事少知音徒把心情託明月賠盡老精神筵前一令新那知村店酒難勸玉樓人普化見馬步使出喝道化亦喝道作相撲勢步使令人打五棒化云似即似是則未是賣寶遇著瞎波斯山頭波海底月就身題目天然別孔仲尼溫伯雪傾蓋相逢甚奇絶話到山空海月殘各將衣袖掩容還洞山價禪師與泰首座冬節喫果子次乃問洞山奪璧還趙首座玉本無瑕若作得失理會盡被果子塞卻且道節目落在何處夜半烏雞帶雪飛泥牛入海須彌倒一段真機見也不拈來掇去價難酬片雲歸嶺青山露水面風生送遠舟日用頭頭收不得機酬劄下難合轍掇轉盤兒都漏泄向誰説幾度秋光與明月僧問洞山如何是衲僧孔竅曰十八女兒不繫裙大凡出言吐氣須識那畔今時如湛盧似火聚近之則然眉觸之則失命祇如洞山此語還是今時事那畔事莫將支遁鶴當作右軍鵝巧畫蛾眉出繡帷臺前古鏡吐雲飛無言童子呵呵笑贏得春光滿面歸一枝梅放壟頭春無限風光可玉人不識花開深夜雪又隨春霧泛溪濱洞山上堂有一人在千人萬人中不背一人不向一人且道此人具何面目雲居出曰某甲參堂去洞山要換卻天下人眼睛若非雲居也大難承當雖然畢竟此人具何面目瞎朝來一撫沒弦琴不落宮商調更深除卻風前鍾子耳高山流水幾知音洞山夜參不點燈有僧問話了卻退山合侍者點燈乃召適來問話僧出來僧近前山云取三兩粉與者上座僧拂袖而退後有省暗然燈明與粉不無格外鉗鎚未免污他男女呼則進省則退固知身入帝鄉空惹一場懊惱碧岫峰頭借問人指山窮處未安身直饒過後知端的怎似靈苗不犯春洞山因僧問蛇咬蝦蟆救即是不救即是山云救即雙目不睹不救即形影不彰此則公案諸方批判者甚多錯會者不少或曰者僧問處有賓有主洞山答處有正有偏與麼商量總是蝦蟆浸死水畢竟如何蛟龍爭肯宿澄潭畫堂寶鼎起青煙皓月沉沉古鏡圓夜靜木童歌白雪聲聲唱出洞中天投子同禪師因僧問月未圓時如何子云吞卻三箇四箇圓後如何子云吐卻七箇八箇者般答話不無俊俏終是未得玲瓏有別善權月未圓時如何一點瞞他不得圓後如何瞞他一點不得沉沉禁殿漏聲遲煙鎖瑤臺影不移何處好風簾外起三更紅日上梅枝夾山會禪師初住京口因僧問如何是法眼因緣一人傍敲正打一人顧後瞻前可謂有始有終徹頭徹尾雖然一等是與麼問答因甚肯後不肯前雪後始知松柏操事難方見丈夫心對竹曉驚禪影瘦倚松暮覺老身間風清雲白乾坤闊剩有梅花照雪寒德山鑑禪師因飯遲拓鉢至法堂前酌然者段淆訛有道一拶有道低頭有道密啓要且摸索不著直得其迅如電其聲如雷其暗如箭自古及今即便是透關底也須急著眼始得不然莫謂德山只得三年活盡大地人亦只得三年活共把瑤琴月下彈渾家心事露多端更闌曲罷人歸後靜夜江聲帶月寒仰山寂禪師問僧何處來曰幽州山云幽州米作麼價曰某甲無端從他市上過踏折橋梁者僧祇知踏折橋梁要且不識米價若是善權即便和聲打出終不使伊耽滯半途舉一明三拈頭知尾伶俐衲僧能有幾咦饒君踏得草鞋穿未免通身是泥水法華舉禪師到福昌昌問回互不回互師云總不與麼曰為甚已喫福昌棒師云一家有事百家忙曰脫空謾語漢師云調琴澄太古琢句體全真堪笑馬扁三遇著可知道彼此脫空謾語帶纍無位真人撫掌大笑者裏還有回互也無鶴有九皋難翥翼馬無千里謾追風兩山高出白雲中各展春光占上風回首晚來江外望殘霞片片映波紅黃龍南禪師問隆慶子得座披衣向後如何施設曰遇方即方遇圓即圓師云與麼説話猶帶唇齒在曰隆慶即與麼和尚作麼生師云近前來為汝説隆拊掌曰三十年用底今日捉敗黃龍用盡婆心不顧眉毛拖地隆慶雖稱種草奈何家醜外揚都來喫棒有分何故利刀割肉瘡猶合獅子教兒迷子訣翻身一擲虛空裂他家父子好機關臨濟未是白拈賊寶峰文禪師參黃龍不契往見香林順順曰甚處來師云黃龍曰黃龍近日有何言句師云近日州府委請黃檗長老龍垂語曰鐘樓上念讚床腳下種菜有人下得語契便往住持勝上座曰猛虎當路坐龍遂令去住黃檗順不覺曰勝首座只下得一語便得黃檗住佛法未夢見在師於言下大悟單刀匹馬直入重圍偷天換日別展機關一語喚回鸚鵡夢九天奪得彩旗歸將金來博鋀證龜而成鱉啞子喫黃連有口難分雪結結結轉身無地著羞慚露柱汪汪淚成血同安丕禪師問僧甚處來曰湖南師云還知同安者裏風雲體道花檻璇璣麼曰知師云非公境界僧便喝師云短販樵人徒誇書劍僧擬進語師云劍甲未施賊身已露同安終日大開門戶誇驕賣富撞個負販徒也與他交易一上只可待僧曰知便好和聲棒出不惟令彼當下勦絶亦令諸方知我風雲體道春山春暖鷓鴣啼啼遍春山客路迷回首落花風掃盡空隨流水過前溪疏山造塔因緣兩個老古錐同坑無異土被龜毛繩子縛作一團向無陰陽地上埋殺了也有相救者麼也是臘月蓮花二八嬌娥刺繡簾一條紅線兩人牽堪憐無限春心事分付空山泣杜鵑睦州陳尊宿問武陵長老了即毛端吞巨海始知大地一微塵長老作麼生陵云問阿誰州云問長老陵云何不領話州云你不領話我不領話一卷一舒一擒一縱可謂照用兩全較量將來也是普州人事間駕扁舟浪裏遊江風江水共悠悠疏煙細柳斜陽外一曲滄浪天地秋臨濟玄禪師問黃檗如何是佛法的的大意三人證龜成鱉賺他後人依模畫樣致使佛法大意掃土盡矣翻身才得探龍珠轉步猶來捋虎鬚不是從前多意氣只因肘後佩靈符臨濟上堂我二十年在黃檗處三度問佛法與麼説話似乎未曾瞥地蕩盡家私貧徹骨熱腸百結剖無由一回觸著傷心處不是愁人也著愁臨濟兩堂首座相見同時下喝大小臨濟卻被兩堂一狀領過雲霧深深閃電藏東西一爍露寒光自來處處無蹤迹何必人前較短長靈雲勤禪師因見桃花有省乃述偈謾道玄沙不肯靈雲更有一人不肯玄沙在花發山前春意深故人到此愈精神不因夜雨溪頭過怎得東山一帶新一番雨過一番晴夜遞東風柳眼青春色滿園關不住黃鶯連叫兩三聲香嚴間禪師上堂若論此事如人上樹香嚴布縵天網不是遇箇無齒大蟲幾乎勞而無功霜風凜凜不容攀一見佳人便解顏不是酒腸寬似海怎知詩膽大如山光孝覺禪師到法眼舉柏樹子話承聞趙州有此話是否覺曰先師無此語莫謗先師好一箇善問一箇善答雖然問答分明要且總未會得柏樹子在好兒不食分家飯好女不穿嫁時衣返擲一身離舊穴清風滿目見還稀雲居膺禪師命僧送褲與住菴道者者曰自有娘生褲不受居命傳語娘未生時穿箇甚麼者無語無故人之致難以受綈袍之贈有徐孺之賢方堪下陳蕃之榻欲得慎始慎終只消道箇不勞罣念秋滿東籬菊正芳何須五斗日忙忙黃花白髮巾中滿誰識先生晚節香雲居一日擲癢和子問衆云會麼衆曰不會居云趁雀兒也不會布網拋筌要且終日不獲一禽正眼看來卻較些子黃土搓成金彈子天邊直打鳳凰兒控弦幾弄驚寰宇野雀林間總不知曹山寂禪師辭洞山山云子向甚麼處去曰不變易處去山云不變易豈有去耶曰去亦不變易甚處去路遙知馬力不變易事久見人心是則是𡬡耐二大老猶欠一著在月明簾外影千竿鏡照臺前玉一團若謂清光無轉就何如北斗面南看曹山因僧問如何是獅子山云衆獸近不得齊眉共躅未許承當異目超宗堪為種草非曹山不能發洞山之旨非此僧不能顯曹山之用直得亙古今窮天地而不移空芥城消劫石而不易未審如何辨的喝一喝師子咬人韓盧逐塊自是超群拔萃由來返擲非常玄關踏碎絶囊藏回首全身瞻仰莫守寒巖孤滯千山臘盡回陽處處春風遞遠香誰識花飛枝上曹山因僧問世間何物最貴山云死貓頭最貴曰因甚死貓頭卻貴山云無人著價曹山雖有撩天之價且無濟世之功有問世間何物最貴拄杖子最貴因甚拄杖子卻貴一棒一條痕鐵山當面勢崔嵬觸著從教滿面灰莫笑長年人不問家無滯貨富何來曹山因僧問清鋭孤貧乞師拯濟山云鋭闍黎鋭應諾山云清原白家酒三盞猶道未沾脣者僧迷衣中之寶向外馳求曹山添醉後之杯反成虛設若是遇著淵明必然別有風致大施寶藏接嘉賓滿座風光一片春不是侯門尊貴客頻頻空興滿杯斟九峰虔禪師在石霜典侍司會霜遷化因緣首座祇見錐頭利侍者祇見鑿頭方二人喫棒有分至若石霜意俱未會在南帆破浪來爪渚北棹衝濤渡甕城各逞風流歸去後從教鷗鳥自疑情雪峰存禪師因僧禮拜乃打五棒僧云過在甚麼處峰又打五棒喝出前是雪裏送炭後是錦上添花未審其中意作麼生為憐三歲子不惜兩莖眉象骨不諳事牽驢飲澗水驢死不回頭又去按驢觜雪峰上堂要會此事猶如古鏡當臺胡來胡現漢來漢現玄沙曰忽遇明鏡來時如何峰云胡漢俱隱沙曰老漢腳根猶未點地在玄沙見甚麼便與麼道那是雪峰腳跟未點地處秋風清秋月曉兩兩相逢眼倍皎掉橫古渡調聲高唱出蘆花音韻藐音韻藐甚堪誇鑿山透海遵神禹鍊石補天羡女媧雪峰問德山從上宗乘學人還有分也無山棒曰道甚麼峰云不會明日復請益德山道無固是憐兒不覺醜丹霞道有也只具得一隻眼善權又不然我宗離背觸不立有無機直下超凡聖烏雞雪上啼翠擁青山夾晝新一般蓬戶兩般春相知不在梨花白縱是清茶也醉人雪峰示衆世界闊一丈古鏡闊一丈玄沙指火爐曰闊多少峰云如古鏡闊曰老漢腳跟未點地在玄沙者漢慣得其便大似家富兒嬌正眼看來古佛家風又豈止掃地而已將謂猴白更有猴黑展演跨灶神出鬼沒鏡闊火爐大機圓應腳未點地大用直截好看新月上江皋莫認波濤翻夜雪雪峰問僧甚處來曰浙中來至焚香禮拜船來陸來事絶安排不涉不隔語繫驢橛兩度棒出知恩有日焚香悲鳴未必好心咄是何言歟關鎖重重客路岐徒將雙足刖天涯爭如獨巫空山裏花落花開自有時雪峰問僧闍黎名甚麼曰玄機峰云日織多少曰寸絲不挂峰云參堂去僧去三五步峰云袈裟落地也僧回首峰便打文彩縱橫機梭不挂道無橫徑理當即行敢道雪峰鼻孔落在玄機手裏若甄別得出許你天下橫行水洗水金博金離罣礙別疏親寶鏡當軒驗正邪玉梭轉側看橫身斷機杼之錦兮誰能比列巨石之精兮知幾人弟子寂定寂盧備資敬刻方丈和尚語録第十二卷普願凡為皆回向菩提有作則必獲如意等攜物類共悟無生
