body:
  text: 吳江顧有孝茂倫王載咸平選定新城王士祿西樵平湖陸世楷孝山候官許珌天玉武進薛信辰國符參桐城智操寒松號隱翁百愚老人法嗣住青龍善權白雲寶嚴安樂禮菴辨山別硯客有四方志去去尚沉吟客離還可晤硯離莫可尋硯問余何適遠在薝蔔林知足空天地乘閒閲古今我元不逃質停雲飄素襟半瓢乘野色一杖荷松陰念子生平志潤得古人心留助知己者銷磨歲月深招隱人生有所事隱顯莫全超達則善天下致君繼唐堯不然見機早縱意樂陶陶第一休為上第二隱為高嚴陵非無友友莫易爾操陶潛非無祿祿莫折爾腰閒來七松下枕石臥雲濤閒來五柳前抱月歌青宵此情誰可訴所以為君招細林同友人雪夜讀莊子一鼓二鼓天三峰四峰雪窗破不關風紙報寒聲冽遣夢讀南華似與鬚眉結凍宿垂天雲快睹禽中傑江海一逍遙逍遙惟自竊偶感逍遙情是情有幾徹將此情與寒只對梅花說訪陳其年史雲臣賦得白雲深處地僻絶無塵風光高且曠濤聲萬壑連漁樵尋莫向中有飲翠人翛然忘得喪素懷羅百川白眼空千嶂門掩青霄雲夢翻滄溟浪我來訪舊棲無心到月上回首問家童笑指煙霞宕春宵遣懷次百老人韻夢破一聲鐘遠峰月漸起搔首不成眠門開深竹裏長嘯發清風紅墮山茶蕊回看松際雲淡罩清江水夜寂幽籟沉萬里清如洗此意誠難言未識誰相委閒步問蒼梅梅默笑而已中秋次韻贈東澗公霽碧光可依煙柔晚色靜遠水化雲英樓開玲瓏景玉兔散天香疏鐘響空嶺幽興入清澄雲流石夢冷袒裼坐臨風倚月聽歌郢白雪老秋容談笑娛清影濤聲侵竹枝桐陰落金井涼從今夜來誰能發深省和東坡戒殺詩水有蓮可肉山有筍可汁但將筍與蓮日可飽脣溼物我同性靈稚耄戒在得護生悟尚遲恣意何太急惜珠因惜鵝惜語因惜鴨相殺在虛鄰相訴在幽冪血畫刃邊痕濺來天亦赤骨亂澗邊堆橫來地亦白今雖異影形昔也曾冠幘人能為物憐物亦代人泣人物兩相憐惻隱心不缺蔬可供高人茗可飲嘉客苟不昧素心心可與神集寒晚同徐竹逸儲雪持限韻霜花泣亂叢水煙縈石髮桐滴露無聲雲將推出月螢掠點疏簷獨樹落寒樾鴈塔蕩冰壺餘光流莫閼閒愛楓葉丹一棹清歌發好景不多停聚散成倏忽南安太守草書歌東海先生豪且放翰墨淋漓世不讓管城斫盡老湘筠客卿磨盡幾滄浪或在琅玕或薜蘿半無衫履半頭科灑灑直疑神鬼助瀟瀟但見雲煙過一掃龍遊千幅絹似越攻吳遺鏃箭恍兮又是驥奔泉得法不因人舞劍縱橫醉裏更無憑點點行行山石崩淡似飛雲流曉月禿如老樹挂枯藤說甚草章與急就說甚鳥跡與蝌蚪是蔡是李不堪論曰顛曰素何足數天將奇伎與先生不同他悔學衛夫人徒費手寄懷王玠右名世兩兄弟美人兩兩江之芷江煙一帶隔秋水停雲正在大江頭目斷東皋劍氣紫陡有瑤章天外來高歌雅坐春風堆波浪溯洄三泖竭繁華一洗六朝灰仙臺多見暮雲起十載神交惟一紙山川老我興扁舟風月知君心萬里青溪溪上沙草深黃浦浦邊魚鴈沉野客秋晚誰相對再期山水共談心秋日寄懷獨立和尚憶得梅花一笑別蒹葭又是驚飛雪老我青山藏我拙孤懷耿耿亦癡絶何時江上將蘆折漾藻飄煙渡兩浙浙水相邀探禹穴談詩說劍光生冽金山寺金碧江心柱寒光照影閒鉤簾吳月上捲浪楚雲還鐘落巖前水僧歸鏡裏山一拳古佛地曾不借人間隆福寺即青龍十二景樹老前朝寺臨春起臥龍門連湖水闊地接海山重殿古風鳴磬樓高月扣鐘一塵飛不到時有白雲封青龍塔誰插空中柱高標碧漢齊湖山來遠近日月繞東西下視疑無地通霄信有梯憑欄時一嘯天小白雲低升仙臺昔王可交成仙處羽化仙何在流泉咽洞簫棋殘雲局冷臺老雨花飄跨鶴尋丁令吹笙憶子喬多情壇上月夜夜照丹遙酒瓶山昔韓世忠勞軍處疊疊山如簇餘酣淡夕陽瓶遺空貯月劍古暗飛霜青草留人恨秋動客傷至今誰得醒嚷鳥下沙場白鶴江澄瀾回白羽煙淡冷危巢丹頂浮朝月霜魂掠夜濤潮隨清淚落鐘帶片雲敲憶昔乘仙去還疑化蟄蛟通波塘雲根穿白水柳線曳清灣出海分諸國回瀾繞萬山櫓聲煙外冷鷗夢鏡中間何日乘槎便星河滿載還杏花村醉鄉迷曲徑映日掃霞空香滴凝朝露帘斜揚晚風尋來攀翠客半是典裘翁江釀宜春滿波流一片紅會龍菴徑僻幽居勝浮橋水面橫經殘雲夢曉鐘落夜潮平試看蛟龍聚謾言風雨驚應知開白社恐起蹙眉聲獅子橋怪石連波架猙獰跨渡頭毛添春草緑吼逐雨溪流枕水驚狐泣橫空動鬼愁誰為題柱客千載壯滄洲醉眠亭一亭春色古面面醉風狂石枕青山迥泉流白墮香杯中傾兔魄夢裏到仙鄉笑問簷前鳥聲聲為底忙緑野橋長虹吞野色垂蔭襯霜蹄樹老蒼欄合藤深翠磴齊水隨潮聚散煙共柳高低不見賞心客春留滿一溪戒衣亭亭古誰為額留衣老歲華條清分活水色絳染流霞影落孤雲靜鉤垂片月斜更憐新雨後零落綴簷牙古寺春回即隆福人詠上方春乍暖鐘韻落江湄陋室留雲補疏簷引月窺堤黃金入柳砌白玉浮枝天惜名藍古花開不忍遲浮圖秋月仰聞天上語平看夜光浮素彩摩金頂雕欄挂玉鉤香清澄桂露影倒亂江流一柱燈千古幾人到上頭竹院晚涼滿圃鳴寒玉千竿晚漏光韻邀人飲翠雲抱節分香和露滴雲溼招風納戶涼北窗留一枕良可晤羲皇平田煙雨溪眠雲不起百畝宿溟濛鷺立煙籠雪濤回竹吼風嵐沉山色冷瞑壓水聲空草色平欺眼人疑淡墨中橋畔僧歸潮涸分沙觜小橋僧晚旋錫飛吳嶺月衣染楚江煙帶影尋金剎和聲問玉川忽聞清磬引轉入碧雲邊松林雪霽玉糝山山老人家畫裏新寒消松影瘦凍解竹腰伸嵒瀉千條練林餘一片春袁安何處是笑指路西鄰靜夜聞鐘湛湛天橫水疏鐘映遠洲聲來和鴈落響去共雲浮帶月侵孤枕依風度小樓寂寥時送斷萬里醒人愁龍江夕照風急催歸棹濤驚走白沙留光銜岫影隨浪泛藤花遠岸波中仄孤城畫裏斜鏡空無可洗唯浴暮天霞聽琴非關聲出遠多是覓高賢澗水疑流指松風想入弦似遺清淺外宛在月明前此撥休容易春山曉洞天東岡文宴漠漠蒼煙外平岡倚畫樓同來人興致不減晉風流松落琴聲細杯斟竹葉浮德星相聚處雲擁大江頭晚涼日夕煙光紫山濤出翠微好風將月上野色逐禽飛石竹涼生遠溪雲薄暮歸吟深誰作伴歌唱起漁磯送介丘錢大游九華出郭因風便蘭橈過急湍謫仙為致意采石好盤桓山擬前程遠江如去路寬高巖尋翠晚與我寄來看秋燕畫棟時頻入涼風復見侵語疑辭舊主飛似戀知音香謝銜泥潤衣輕掠水深明年春社到還向玉堂尋江天聞鴈隱約雲排陳依微散水鄉一聲秋滿塞幾處草含霜睡客驚猶遠歸人聽最傷情關無限意況復月光芒遊大山菴次老人韻苔封蒼徑滑極頂小江山樹老眠松閣煙寒依石關千峰從地涌孤鶴自天還欲訪逃禪處問雲借半間祝友裔出龍文傑英華啓後賢臘高峰頂樹心湛水中天閒詠欺工部狂書壓老顛風流人莫測盡道是頑仙自適日間何所事鼓腹嘯長空湖海三生客乾坤一隱翁興來詩自勝悟後語誰同獨羡青霄月論心皎潔中詠竹一林鳴碎玉滿榻照寒光處世能忘熱親人不在香風生彈律呂月上寫文章愛伴禪心靜和雲掃夕陽寓吳江包朗威張九臨陳長發吳小修聞瑋趙砥之山子叔子顧樵水喻非指過訪秋老蒼煙外林幽雨露新雪灘逢釣叟蕭寺作詩人靜極聊堪隱閒多剩得貧他時攜一策乘月問遺民雲門漫興步輕憐草嫩不必更支笻吟詠一溪水盤桓數朵峰雪殘林翠溼春曉曙光濃笑指蒼茫外聲來何處鐘懷北溟大師兩兩關山闊誰憐丘壑情看梅雙眼瘦放鶴一身輕歸夢聯江冷餘懷託月明何時重把袂共眺白雲生訪何山幽禪寺有感為訪幽禪寺千山策一笻藤花迷斷碣溪水咽殘鐘砌老雲根活萊深屐齒封如何天上月不照此杉松遊仙擬入神仙境臨風且挂冠壺中間日月雲外數峰巒不作長年客難成一粒丹殘碁猶未已碧海幾經乾送陳確菴孝廉歸婁東庭花何爛熳多為餞行開送客詩千卷留人茗一杯帆從江上去書寄海邊來莫惜遊山屐乘雲返翠苔早行是誰同曉發只約一枝笻出谷驚棲鳳登舟起臥龍鐘聲煙外遠樹影月邊重十里亭何處蒼茫有數峰贈王思受卜宅臨淞水先調物外心半軒明月淡一徑白雲深欲惜身如玉須憐刻似金君參投子意便向此中尋訪千華和尚不識千華路迢迢信杖藜環山尋竹隱問石見雲棲瀑響傳深谷荷香拂大堤他時風月下再話劍樓西同聖集九一令詒坐于田秋雯之和鶴堂暑退晴光淡涼風報早秋因乘黃鶴去時為白雲留談笑多高士生涯一釣舟欲知明日興傳語問清流遊浮山深林尋古寺曲徑繞危樓鐘磬家聲舊松篁野色幽因瞻雙塔秀得聽一溪流雨過收春去惟餘月半鉤重遊浮山金剎知何處鐘聲杳靄間常因尋碧澗幾度問青山屐齒留新跡苔痕識舊斑白雲猶曉事時伴老僧還贈秬園侯記原次宋荔裳觀察韻十二首負郭山如簇清風滿竹軒乾坤容我懶禽鳥識人言把茗消殘夢焚香弔遠魂蒼茫煙樹外沙淺露苔痕自是紅塵遠窗開翠靄間朝看鴻影度暮聽鶴聲還沼曲煙流徑簷深月扣關同人無限意知我只溪山方池拳石穩野鳥立無妨竹響侵書幔花飛點筆床好風閒不奈送雨納微涼坐久忘塵思誰云日更長樹古名園好幽居分外清詩成新水漲琴對遠山橫石抱雲來宿梅將雪共爭閒閒春日上倚杖聽催耕煙荒三徑窄豐草日重鑱舊業追王謝高風比籍咸橋危人競渡花落鳥爭銜五世丹書在相看啓玉函上谷今如故高林報曉鳥笛聲風裏細亭影月中孤采隱人非遠問奇字更殊不辭時下榻俯仰歎蓁蕪十畝幽棲處歸休得四宜鮮烹籬曲筍香摘路傍葵交重方來遠談深臥去遲他年風雨夕猶憶論交時君有詩千首逍遙共客吟鳴山聽野鹿掠水看飛禽不有先投轄如何得解簪因憐丘壑趣一棹足幽尋雅集傳經宅風流隱士家閒情隨柳葉早信託梅花棋局驚人靜歌聲雜客譁一堂明月冷清影為誰賒文章懷雅道復見謫仙人尹緑憑南斗樵青仰北辰煙霞期共未鷗鷺可同寅剩有光芒在千秋桂一輪一鏡涵天地晴波語鷫鷞彈絲琴劍古逸韻嘯歌良燭剪流金蕊盤餐剖玉漿殷勤遊子意春色滿仙航名公留勝境字字壓江淹飄逸風前得清新雨後添惜花非是俗愛月詎傷廉太史遙觀處賢星兆隱占秬園雜詠次侯記原韻十二首為復前人業閒情故里偏山頽非舊日鳥語似初年曲徑關心細深巖進步邅悠悠几席外品節是家傳偶從林下過蒼翠繞藍輿適興千株柳消閒一帙書清暉移竹密晴影入簾疏尤喜白雲好時來問起居人中誰俊傑江左識君賢弦絶傳經帳花留夢筆年醉心惟古道樂志亦逃禪幽意撩人甚清同一鏡圓一丘堪伴侶獨棹載雲煙緑水成全幅青山作半聯風情真邈矣忠孝尚如然滿壁舒懷抱驚人句可傳招隱芳流古幽懷獨遠超鳥聲春滿閣月色水平橋補竹留先澤磨碑話勝朝寄言花外徑未許玉驄驕荷浦回流淨層軒對此濱波行千片月花漏幾多春瘦以梅為友閒將石作鄰長年門不出令我想伊人重岡閒散步嵐氣半晴陰竹戛篩金影泉流漱玉音魚荒閒水獺飯罷落山禽時有好風至科頭柳外吟故物還新宇人留翰墨香春秋遵上古陵谷信穹蒼澗芷行堪采書田豈自荒微聞牆壁裏絲竹奏先王小圃餘香雪長林把釣竿迎春藝閣暖送雨草亭寒橘樹三千指荷香十二闡交情期舊好何必結雞壇野客棲遲處苔痕溼桂陰煙霞知我意林樾見君心高臥匡床穩閒行古洞深松風時有約一撫不弦琴芝蘭才結秀空谷早傳芳洛下才名重吳中姓字香東巖雙壁燦南浦五雲祥遙看讀書處花陰覆堵牆流水清溪轉孤山土自為卉翹資秀發樹老閲傾欹客去仍明月人間盡好時合歡堤上露常帶柳絲垂時一大師過訪聯句握別青溪後寒重逢將十年時秋高峰頂月香老桂花天寒把茗時懷古論心夜入禪時此情誰共曉寒霜鴈下平川時十僧詠有引豫自別硯脫塵觀摩擇侶假深山而寄跡拓法社以棲禪歌入袖之清風談點頭之白石隻身磨歲月真閒似得病中滿鉢貯煙霞異趣渾忘老至自是乾坤歷遍誰當問慵於人以此質之同心同心不無一哂山僧翠微棲老一枝安樹欲成龍鶴化丹香結深林花晚發光搖峭壁日先看閒中活計雲千片靜裏生涯竹數竿洗菜不流黃葉去遊人那得到危巒禪僧透徹玄關第一機長空霧淨見星稀一聲竹擊青山曉數朵桃開碧澗肥法海深澄波瀲豔禪心獨照月流輝蒲團裏面真消息片片晴雲淡不飛講僧繩床高坐獨披襟一塵清風論素心學冠斗山靈脈遠胸羅江海妙源深香生簾外花初雨龍起虛中墨作霖講罷爐煙誰得旨點頭巖石是知音詩僧瀟灑狂歌別一天無中有味淡中妍空林雨過詩成畫古塔雲收畫入禪閒借推敲消歲月清憑嘯傲老山川從來懷抱多題石不到驚人不浪傳老僧經殘月下影蒼蒼百結鵓衣染戒香臞若松梢棲野鶴皓如鏡裏墮秋霜攜笻笑問乾坤老擁毳閒看歲月長寄語人間休更算由來甲子總相忘病僧淨掃維摩丈室幽閒觀榻外物無留棲身幻示三分病對客常將一默酬藥煮清泉香乍爇柴添活火焰初收安心自得安閒法何必耆婆向世求孤僧雲瓢獨抱枕江濱流水年年寄此身壁立雲根鷗作友梅開雪砌石為鄰數聲幽磬消閒日一衲清風憶古人幾欲逃形天地外回頭尚有影相親遊僧放浪乾坤野鶴同乾坤滿貯一囊中穿林面帶松煙色買渡衣黏杏雨紅盂洗清流來楚澤錫飛明月過秦宮閒雲也道山居好遊罷歸來問曉風貧僧湖山夢破立無錐鉢底塵生虛鳥窺食摘松花餐緑樹衣聯荷葉翦清池半窗月色千年畫四壁濤聲一卷詩清淡門風幾家有翛然唯許白雲知懶僧世事悠悠謾遠圖心同流水是非無涕垂不管寒侵面詔逼寧知使有符佛頂漏殘憑翠積僧房雨仄待風扶彼蒼容我疏慵甚枕石蘧蘧蝶夢孤逃禪長揖雞窗別硯耕半瓢煙水謝虛名青山髮斷千莖緒白社心空一片情衲洗松風鳴曉籟杖挑江月照郵程佛書剩得閒身讀肯被儒冠誤此生過崑山訪乾一諸豸史昔年幾度夢登臨今獨尋流入上林鶴立松梢翻素羽鴻來天外墮清音筍抽石竇和煙煮茶熟蘭泉帶月斟話盡殘燈蓮漏永寒光獨照故人心詠影相親相近已忘年盡日殷勤不變遷秉燭看花隨客後臨流把釣占人前詩尋雪夜同扶杖月載煙波共泛船幾度欲離離未得倦來仍與抱雲眠寄東岡諸子光飛劍色燦星辰隱隱扶桑擬問津詩法遙傳天寶句丰標猶勝永和人無虛鶴渚風前約來看龍江雨後新野墅梅花開欲遍扁舟早放莫逡巡祝張揆原工部春入華林玉滿枝相逢盡道豔陽時茸城山水由拳月才子文章工部詩美釀花間留客飲閒消石上共仙棋年年喜看霞觴進一曲清歌天地知善權寺華林簇簇翠微巔捧出荊溪古善權繞殿雷書唐日月垂庭柏偃晉風煙山環玉帶千嵒擁霜扣金鐘萬里傳大演洞源流正脈派分諸剎續龍淵遊善權洞梯旋石窟覓丹砂幻景幽深巧莫加窈窕暗通仙子徑空明別就野人家竇懸紅日千光燦乳溼清風一滴斜問是誰來為鎖鑰溪眠曲水起煙霞春江一聲旅鴈度江村客舍香銷睡正溫舟放夜潮來古渡霧連寒月亂黃昏落花浪逐魚驚夢垂柳煙迷鳥斷魂何處醉人泥路滑隔林引犬吠柴門初夏偶成古木森森一徑通看雲盡日倚青桐虛堂夢破湘簾雨小榻涼生水殿風霧鎖鶯聲迷葉底煙飛竹翠積庭中桃花謾逐春歸去正有孤笻趁落紅喜青龍前殿落成長年砌老點苔花喜遘雲聯壯海涯掩映門牆仙子第交輝金碧梵王家丹臺無復埋荒草紺宇能令散彩霞更得泖峰來正面簷牙遠挹翠痕斜喜青龍大殿落成鶴渚東回抱隱淪殿臺直壓大江濱成來棟將千尺老去飛霜逾十春天地重教山色秀煙霞共道畫圖新層層梅竹環蒼翠時引清風入戶頻喜梅源普同塔落成十畝林泉鑑影清交加窣堵頌新成雪餘三面銷間夢月到雙扉慰老情白石繞來香皎潔青山捧出勢崢嶸悠悠靜覺乾坤小何必風前覓化城九峰環翠鳳庫神薛機橫天馬崑是謂九峰峰峰秀出勢玲瓏涌地排嵐插遠空翠潑千重吳樹接煙分九點越山通東西城郭圍雲表遠近人家入畫中尚記靈巖新雨過江天掩映沐春風三泖回瀾三泖者大泖園泖長泖也一名谷水風拂流雲動泬漻空澄倒影浴青霄危湍頻瀉銀濤涌峭石驚翻玉壘搖回練遠收江口浪怒聲直接海門潮陰晴不礙漁家樂一釣中天野色饒湖山日出澱山在澱湖之上煙樹參差繞澱湖濛籠霽色隱金烏清波未出同高下碧嶂才離似有無天上風雲隨影現人間樓閣偕光敷閒來隔水聞漁唱一片飛帆狎野鳧海門晴眺海門橋名諸海門公獨建因名海翁曾惜往來繁獨駕長虹跨海門風景賞心隨再覽晴光得意可重論數來五嶽盤閒栗看去三江石上痕因憶授書人不見行藏自許付乾坤學潭泛月潭在泮宮中有小洲今為放生池清流一派曲池來遠漾冰輪印碧苔天散光華隨夜朗人將宮闕向晴開遙生水面鋪金地照出城頭涌玉臺泮底虯鱗興有待乘閒也解共徘回孔宅尋春聖裔孔禎隋時宦于吳葬玉環衣冠地饒梅竹扶杖幽村晝覺寒墓門深處鎖回瀾千年埋玉前朝事半匣藏冠後代看樹色侵衣堪嘯傲禽聲到耳好盤桓彌空雪浪層層接會有人歌聖澤寬江浦潮生邑有三江五浦錯落沙汀寄鳥蹤忽驚斷岸雪溶溶漲成澤國浮天地梳動珠宮起蟄龍萬折瀠紆齊合脈百川匯注盡朝宗乘槎如辨淵源處不向星河泛九重升仙舊臺王可交飛升處偶自飛升偶戰場遊人幾欲問滄桑鶴隨方外煙霞冷栗授舟中日月長鄉國轉睛羅夢杳英雄回首謫仙狂滔滔不盡龍江水只別丹臺泛渺茫夾橋雙剎橋在北關內傍有寶月願豐兩寺金鰲翠柳並婆娑夾構浮幢蘸玉波梁勢高低連石駕鐘聲南北共雲和侵霄細雨迷宮殿拂水輕舟壓芰荷靜聽兩堂歌貝葉往來人帶梵音過隆福聞鐘隆福寺在青龍鎮整麗甲於一邑寶網羅珠散遠芬華鐘隱隱燦靈文空林敲動山風起野曠鳴驚海雉分夢破紅塵天乍曉聽殘紫塞日初曛堪憐道走名場客誰解棲心叩白雲清明值雨春深雨裏落英紅半染飛煙半趁風柳葉聲寒春事老梨花夢斷客愁空片帆人立清江外隔岸鳩呼緑樹中溢目韶華誰共惜年年惟見水流東訪吳司成梅村款乃聲中夏日長薰風影裏挂危檣孤雲出岫三年別一水環村六月涼路入疏籬分古徑香流遠浦識芳塘談深相共忘天暮夕照絲絲柳數行和貫齊殳山人過訪一客天涯久未還誰移畫舫渡潺湲談深壟上三花樹知隱雲間九點山韻戛清風蟾煥彩文投紫霧豹成斑應思梅竹期常晤莫惜芒鞋到石關為百老人求坦菴方學士塔銘次韻留別銘求千里步遲遲才遇知音又別離一櫂寒光牽野興半江晴影賦歸期送行人去風盈袖留別詩成月滿枝攜得文章歸故國白雲也愛共相隨寄懷顧茂倫江天空闊曉風清遙望松陵紫氣橫草載英華招逸士半窗滴露引書聲青山有約音遲寄緑水無期夢欲生浪跡煙霞惟我輩何時相對數閒情英華茂倫巢名過九峰草堂同陸兵憲張水部諸豸史徐蘇野張漢度分得風字片帆無恙挂薰風草里輕煙一櫂通山引客來流水外翠邀人坐畫圖中知音喜有乾坤在話舊惟餘我輩同影對夜深忘溽暑草堂月上細林東細林晚眺分得青字薰風攜我出閒庭宿雨初收草木醒湖面蒼茫千頃白山眉濃淡數痕青才同野色分殘照又伴晴光遠遠馨眺罷不知天早晚一聲漁笛隔溪聽鏡湖草堂分得啼字青山面面接沙堤咫尺仙居路不迷雲起湖邊光聚散帆開簾外影高低吹萍細浪看魚戲拂樹清風聽鳥啼乾一同人放生於此多少人傳新栗里時來問字一留題同乾一登二十三峰閣分得龍字乘暇登高訪舊蹤喜同知己話從容星懸古瓦光堪摘雲繞虛窗影欲重紅藕香中千尺壁緑楊蔭裏草三峰憑欄時喚沙鷗問道是何人起臥龍喜徐松之過訪竹徑參差久不刪偶逢蠟屐破苔斑煙霞老我多年思湖海留君半日閒興到松閒歌白雪倦來枕上對青山牽人更有情深處鐘送黃昏月一灣遊投子寺有感凌風一嘯白雲隈轉入空林草木哀斷碣不堪頻拂拭野猿何事獨徘徊月臨溪畔詢幽徑花落巖前覆劫灰回首山靈相借問幾時得聽曉鐘來顧茂倫王咸平選先師百老人同豫詩入方外英華集梓竣承送閲拈謝徑僻幽深歲月忘誰分桂櫂載文章清標客已傳摩詰逸韻人猶頌野王林接好山來翠遠池開曲水引流長展看欣有知音在欲報還期問草堂看忙人多笑我拙我笑人多巧所以我常閒看人忙不了固窮離家三十載去國一閒身不是慵為計從來懶訴人渡嶺山水知人性山雲見客心愛看山與水一日一登臨泛舟潮生江面闊擊水皺天容一日遊三泖片帆挂九峰鉏豆一鉏復一鉏鉏盡鉏邊草只見白雲深不知春色老答友偶然更一字莫以我為師我到霜侵鬢才能讀古詩送客客路經秋老江聲帶月寒但成天下士莫只到長安看月月破千山寂清輝眼界寬不知何所似立立又看看乞菊秋老連山醉秋英覓近鄰若教無此興誰可伴閒人禱雨荒畬積老火大地為之焚有咎咸歸我無殃天下人試耕曉起驅黃犢披風試白田一犁春色老耕破隴頭煙巡夜鐸聲敲落月犬吠傍籬聽不覺舒長嘯驚飛葉一庭春雨寺冷三春雨鶯啼盡日風吹殘花十里濃染曉煙紅回里吟十首裔出嚴陵第一枝逍遙雲外古如斯那知去後書臺老客至難尋別硯詩故山風景近如何古蹟蕭條少客過聞說前朝英傑盛人家指點在煙蘿去日童顏皓首回半肩風露獨徘徊蒹葭秋水年年在不信伊人去不來欣逢父老歎離居好月窺人影更舒品坐簷牙相對久風和夜色入簾疏一別園林三十年滿庭芳草共誰憐不辭遠路多風雨忍聽啼鳥泣墓田華表當年翠靄閒誰為收拾只空山多情猶是中天月時惜荒原去復還幽棲欲掃幾追尋流水活埋一徑深明月清風聊作供定知鑑我遠來心年深故舊半凋殘遠策孤笻對影寒鳥語林泉應識我且同石上暫盤桓蕭蕭草木盡荒墳陌上誰同細論文山水不須頻發笑朝來應接有煙雲錐無立地忽西東爾汝還應惜我窮莫笑一歌焚冢上不將杯酒奠幽宮善權百老人萬松嶺塔上種樹詩十首一嶺傳來列萬松年深無復翠雲封童山片片誰堪惜惟有春光著意濃白雲西去幾經春人老空階窣堵新遠自他山分得種和煙遍植石嶙峋凌虛一塔洞門隈滿岫雲濤手自栽休笑草荒人不見總期天外鶴飛來價高不惜買山翁撫就森森氣已雄肯比人間桃李質素枝徒染一時紅星散同人天一方誰扶煙霧上高岡移時不見清陰淺他日陰深塔又藏野色交加喜作鄰扶疏檻外倍精神青山莫放樵夫入應惜朝來種樹人夾道平添露遠山青青點破石頭頑好看秀色飛猶聚不禁幽禽去復還籬圍壟上抱清臞繞塔松杉幾萬株漫遣濤聲侵客夢纍他水墨寫榮枯亭亭四顧欲垂陰徑曲幽閒護塔深攜杖時來枝畔立是誰共話歲寒心培成歲月欲婆娑石老文章煥碧蘿分付樹神常愛護莫教人採棟梁過山居閒攜片笠到山家瀑響松風自煮茶啜罷歸來天欲暮半肩明月半肩花道人只合住溪山山愛幽深溪愛閒箇箇溪山如舊識溪山指點結禪關松風賣盡價無酬且把松風枕石頭一葉落時知暑退那從甲子問春秋深入白雲知幾重數間茅屋結雙松花飛林外將成雨樹老巖前欲化龍翠竹一竿千箇字青山萬朵半聯詩閒來倚杖溪邊立鷗鷺無端笑我癡姑蘇夜泊舟留勝地說當年歌管聲連不夜天今夕只餘城上月夜來還照玉人眠澱山遠眺竹樹森森翠欲流半凝曙色半凝秋移笻絶頂諸山小萬頃煙波一聖收元放故居和王介遠韻潛水雲屯略彴孤江山仍在昔人無夜深唯剩簾前月曾照先生一釣鱸送曹道士之茅山君去茅山八月天木樨撩亂曉風前征帆明日吳江水回首雲間一帶煙過佛日寺雨霽江天草木森櫂隨流水訪知音疏疏磬引雲歸壑落落鐘催月上林漁父閒消歲月泛扁舟客裏生涯問碧流細柳疏風天欲暮一聲漁笛下滄洲歸樵閲遍江天事已非一回歲月一更衣年來贏得霜侵鬢十里空山負翠歸送山夫道人住點易臺并序辰山點易臺在九峰中景最幽勝豫常登眺占句云昔人點易坐高臺點罷臺空人不來今對易臺留夜月莫隨朱露點蒼苔吟罷而返昨山夫來我謂乾一請居其上豫喜臺之得主人矣復贈送一絶昨來剡櫂君看我今主仙臺我看君坐到夜深山月上研朱聲在碧霄聞漁火空江一抹轉斜暉燈散漁舟傍晚歸點點燒殘明月夜沙鷗驚起故飛飛九日霜酣楓葉半蕭騷菊老秋英起素濤不信故園離日遠十年九處獨登高寒松大師余同里隱翁也別硯超然得大總持印心於百老人作獅子吼法語以為海內所尊仰至拈題得句清深圓秀讀之如遊珠網瓊林金沙玉沼之間豈漢魏以下人所易得耶松陵顧王二子輯其詩繼百老人以行誠欲使海內重其禪者並重其詩也雖然詩之禪禪之詩有異余敢以詩測禪師蓋禪而詩赴焉我願海內重其詩者當益重其禪爾龍眠山居士方拱乾敬跋
