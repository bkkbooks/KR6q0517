body:
  text: 嗣法門人德昊編録住松江青龍隆福禪寺語録師於順治庚子春即座元寮受請主院事佛殿黃閣簾垂正不居正紫羅帳啓偏不坐偏正當恁麼時還是正耶偏耶虛空開口笑子午不相沖伽藍正大光明絶覆藏護持法席作金湯昔年弘誓深如海今日聊為爇炷香祖堂者夥老古錐何異緑林客爭怪後代人捉盡伊敗缺未審以何為證喝一喝云獅兒一吼祖翁盡方丈寶鏡高懸活捉九苞之威鳳神鋒倒握生擒獨角之祥麟此是吾老人土苴緒餘祇如山僧到來又如何施設卓拄杖云看取令行時老和尚命送衲衣法帔至開堂拈疏一點一畫錦繡輝煌一字一行珠璣宛轉展開則魔魅潛消收藏則正法久住若作佛法商量埋沒自己不作佛法商量辜負現前畢竟如何度疏與維那試念念看法座須彌燈王從空放下新來長老特地升高不是神通妙用亦非法爾如然顧左右云高著眼遂升拈香此一瓣香在天同天在人同人爇向爐中供養釋迦文佛歷代祖師惟冀法燈無盡法雨恆飄此一瓣香秉天地之正氣惟德惟馨萃日月之精華乃聖乃神端為祝延皇帝萬歲萬歲萬萬歲欽願永建皇極於域中萬邦效順覃敷五福於海外兆姓謳歌此一瓣香運絲綸於掌上治國兼以治心斂法界於毫端選官因而選佛奉為滿朝文武府縣宰官遐邇紳襟本山檀護惟冀心廣恆來留玉帶名高長得覆金甌復懷中出香云此一瓣香數千里外撥草瞻風十餘年來霜侵雪凍拶得通身骨露猶遭暗地拳傷滿腹無明一朝拈出端為疁城古昭慶寺堂上洞宗正傳第二十九世百愚斯老和尚用酬法乳之恩斂衣就座紫谷大師白椎云法筵龍象衆當觀第一義師云正令全提十方坐斷大座當軒了無回互果是真龍象不妨蹴踏看問曹源一滴洞水分流向上宗乘如何舉唱師云九峰疊翠涌千江進云出格人來又作麼生師云痛與三十棒進云青龍現瑞金毛吼佛日高輝萬古傳師云莫塗污他好乃展衣帔云若論此事本自現成覿面拈來絲毫不隔輝增三泖之光湛湛一壺風月彩奪九峰之秀澄澄滿目雲霞打成一片時針劄不入羅紋結角處線路難尋古佛堂中曾無異説流通句內卻有多談百千年來紹續不易直得異獸珍禽同現遮那之妙相機絲文彩共轉根本之法輪樂助無為咸揚至化大衆會麼良久云一氣不言含有象萬靈何處謝無私起身敘謝云某愧薄福自揣無能忝居衆首實不知量叵耐師命及諸檀那時相慫恿屈升此座伏念樗木庸材奚堪大任但因長者有命只得歡喜奉行今則開堂祝聖一期佛事幸已云周所冀堯風浩蕩舜日長明在筵諸公世世證無生之旨見前知識處處建最勝之幢有煩久立伏惟珍重復舉世尊初成正覺於鹿野苑中轉四諦法輪憍陳如比丘最初悟道山僧初會開法於青龍寺裏祇轉者箇法輪還有最初悟道者麼設有也須痛棒趁出復白椎云諦觀法王法法王法如是下座當晚小參人人衣線下有片田地曠大劫來曾未欠少只因向聲色門頭逐物迷己年深月久不覺不知失卻祖券了也不見隆福舊基實乃唐宋古剎性空鐵笛韻響於雲間道者法華蓮生於兜率元明以來菽麥不分變瓊瑤而成頑石化寶所而作荊榛賴吾老人應時傑出脫珍披敝激濁揚清拈起钁頭頓使钁頭起舞拋開瓦礫直教瓦礫放光種種妙用處處提撕無非發明者片田地而已汝等諸人要識者片田地正好鏟其聲削其迹折其塹去其籬了無爾我之情不留彼此之念忽然踢破指頭元來只在者裏雖然更須知守成不易始得何故雪後始知松柏操事難方見丈夫心立兩序上堂孤掌難鳴衆擎易舉矮師叔常聽法於香嚴座下老三聖曾推僧於寶壽堂前典型在邇景行可觀若古若今事同一致苟非公謹廉能之士難以承當必也尊上愛下之心方堪委任到者裏説甚高菴出世七人為輔今古名聞者哉卓拄杖云正恁麼時畢竟如何話會大家齊出手扶起破砂盆聖節上堂大哉乾元萬物資始鈞陶有象垂拱無為是謂天中之天聖中之聖且道全身奉重如何舉揚豎拂子云長將日月為天眼指出須彌作壽山上堂祖意分明在目前何須向外覓言詮菜鋪一片黃金地麥涌千層碧玉天香飛幽谷蘭初放絲拂長堤柳乍眠六相迥然離向背三玄裂破沒中邊須領略莫浪傳月出連山露半邊上堂問荊棘叢生三二五是誰行履處師云手執金鞭問歸客夜深誰共御街行進云煙雲罩徑孰能尋尋即錯過不尋轉失如何免得師云將謂少林消息斷桃花依舊笑春風進云烏雞冒雨衝陽焰還是正耶偏耶師云梅落珠簾寂香銷石鼎寒進云赤蝀穿樓和啞音明今時事那畔事師云木雞啼子夜鐵鳳叫天明進云廣澤蘆花藏雪密不是一色邊事作麼生會師云雪覆萬松徑遊人仔細看進云收綸釣艇弄灣深不犯清波如何拋擲師云溪邊楊柳影不礙釣舟行進云當軒黯黯無秦鏡正恁麼時如何辨的師云夜深方見把針人進云散髮齊眉下翠岑古人到此為何站腳不住師云坐卻白雲宗不妙進云謝師答話師云投子道底乃云荊棘叢生三二五手執靈符司正令煙雲罩徑孰能尋夜深幾箇知名姓烏雞冒雨衝陽焰龍樓人醉鳳樓春赤蝀穿樓和啞音漢時客佩秦時鏡廣澤蘆花藏雪密玉鉤倒挂水晶簾收綸釣艇弄灣深白額轉藏欹石磴當軒黯黯無秦鏡一片雄風仔細看散髮齊眉下翠岑異中來也誰深醒諸昆仲古人道底與青龍道底其間還有優劣也無少年一段風流事祇許佳人獨自知佛誕日衆沙彌剃度上堂今朝四月八咄哉小悉達腳根立不牢弄巧反成拙爭如大地人箇箇咸超越憤志入無為辭親將愛割飄然來青龍懇求落鬚髮説甚度雙親九族苦亦拔更聽吾一言慎勿看輕忽出家果如初畢竟成上哲喝一喝云放下著上堂豎拂子云摩尼珠人不識如來藏裏親收得大小永嘉分別不少只此一珠若凡若聖若俗若僧隱現青黃從心所欲阿誰無分豈特如來藏而已哉復豎拂云大衆還識摩尼珠麼罔象到時光燦爛離婁行處浪滔天誕日上堂潦倒行年三十五法門慚愧毫無補頻開太歲頭邊土氣寰宇慣把三更打日午大衆殷勤求法乳無端請作主中主好看放出玄沙虎吞佛祖謾道為人太莽鹵喝一喝下座開爐上堂安居樹下何殊管見之流面壁巖前大似斗筲之輩爭如我以天地為爐鞴日月為炭墼拄杖化為文殊普賢拂子變作觀音勢至巡香底巡香值日底值日灑掃底灑掃搬運底搬運時刻在諸人眼裏耳裏出出入入你且看他圖箇甚麼若簡點得出許你參學事畢復舉法昌遇禪師云法昌今日開爐行腳僧無一箇惟有十八高人緘口圍爐打坐後福源琪長老云福源今日開爐炭墼也無一箇五湖四海禪和衲被蒙頭打坐怪哉二凍儂半斤對八兩山僧則不然青龍今日開爐親切無如者箇任從睡臥經行何必拘拘打坐喝一喝云看腳下至法華菴請上堂湖山高臥枕清流目視雲霄十有秋天霽曉來風力便一帆練水泛輕舟雲冉冉水悠悠滿載雲霞任去留不似明州憨布袋祇觀風色下金鉤還有躍浪錦鱗麼揮拂云收上堂一心不生萬法無咎真空絶迹大智非明至道無為靈源獨耀向上一路千聖不傳學者勞形如猿捉影若謂即心即佛何殊畫餅充飢更云非佛非心不啻望梅止渴畢竟如何即是若不打從山下過怎知鶴唳與猿啼至日上堂昨夜冷灰裏一粒豆爆將升仙臺打失了半邊驚得王可交手舞足蹈鼓腹而歌妙矣哉妙矣哉岸容待臘將舒柳天氣衝寒欲放梅忽被陳那尊者震威一喝云此是甚麼所在作者般語話殊不知我衲僧家頂門上時時一陽來復腳跟下日日萬彙發生似你者等呵寒向熱逐境生情者豈可同日而語哉如是可交仙人直得滿面慚惶而退是汝諸人還信得及麼此言如不信更請問庖羲朱護法得子請小參好箇仲冬十五消息現前誰睹冉冉溪雲半灘羃羃松煙一塢曉風散作七片八片細雨織成三縷五縷端是成家鎡基會得迥超今古何須東魯詩書怡然氣冠寰宇何必西來旨趣卓爾口吞佛祖誠為跨灶之裔諒必繩其祖武且道具甚威光便乃感應如許皇天無私惟德是輔監寺請升座至道無難惟嫌揀擇但莫憎愛洞然明白堯舜帥天下以仁而民從之桀紂帥天下以暴而民從之養老歸呂夷流言誅管蔡齊女展兩家之袒紀妻變一國之俗里名勝母而不入邑號朝歌以回車備頭陀常取魚於浩渺則監寺獨求火於丙丁未審還是揀擇耶憎愛耶試聽一頌日長間打坐夜靜卻經行一陳西風起滿林落葉聲揀不揀憎不憎風光滿目皆成現奚待當年問丙丁臘八上堂舉古德云臘八喫雞羹才疑禍便生溪邊楊柳影不礙釣舟行後傑峰和尚云古人與麼道大悟不拘小節未免與賊過梯引邪入正與國則不然臘八喫紅糟叢林意氣豪酣酣沉醉倒更不惹風騷看來兩箇無孔鐵鎚何異普州人事青龍也不喫雞羹也不喫紅糟亦無禍可生亦無氣可豪惟有由拳善信年年此日設齋表嚫兼請舉揚也有少許臘八喫香齋禪和頗快哉一飽無餘事不用更安排上堂問祖意西來即不問洞上宗風事若何師云寧可截舌不犯國諱如何是正中偏師云畫堂寶鼎起青煙如何是偏中正師云玉案香銷金鴨冷如何是正中來師云赤腳波斯下釣臺如何是兼中至師云龍吟虎嘯看雄勢如何是兼中到師云佛與衆生一齊掃進云曾向龍門浪裏過今日方知滄海寬師云饒知浩渺無涯際也須入水見長人遂豎拂云只者箇本來無名天地以之而生萬物以之而育橫按拂云名可名非常名名既非實體亦寂然擊香几云無中生有有中生無名言不滯纖塵不染搭肩上云殺活同時照用齊彰通宗通途挾帶挾路拂一拂云有無不立能所雙忘佛祖莫知其由凡情罔測其際放下拂云是正耶偏耶兼帶耶寧可截舌不犯國諱除夕小參問正恁麼時如何師云法鼓三通請除夕進云除夕後聻師云畫蛇何必重添足乃云正當恁麼時如何法鼓三通請除夕猛然特地起春雷一衆堂堂赤骨立既爾大家知此時畫蛇何必重添足天成披剃請上堂柳窺白日堤邊翠影婆娑梅笑清風雲外暗香浮動一溪流水調鍾子之宮商數畝幽篁奏伶倫之律呂歷歷真機獨露堂堂祖意分明於此會得不剃髮而僧相周圓不登壇而尸羅具足説甚出家乃大丈夫事非將相之所能為無勞彈指直下超凡入聖去也且道因何所致博盡世間黃金難買主張自肯解冬上堂九旬把住咽喉今日解開袋頭放出神晴鬼面趁起溈山牯牛瀟灑峰前溪後縱橫柳巷花樓踏翻百億香海踢倒四大部洲忽遇庖丁遊刃如何免得其憂若還無計可脫不如直下且休休不休隨緣水草消間日免被花燈換兩眸上堂萬頃波澄三泖月獨照無私千重翠鎖九峰雲流光靡間由是真風遍界大用繁興剎剎全彰頭頭顯露入廛垂手變大地作黃金返本還源攪長河為酥酪且道誰是其人喝一喝云無限風流慵賣弄間乘一葦泛滄洲晚參青龍家法道出尋常種田博飯引水灌蔬蘆䉬夾壁葦幹垂簾燈有月可待地有風可掃瓦有雲可蓋席有草可眠湯不嫌無醬菜不嫌無油上不慕於諸聖下不重於己靈勝他高梁大廈之家何殊簞瓢陋巷之樂貴客緇衣到此一般如是安排若還問若西來大意除卻鋤花種豆更無別物可酬未審還有為人處麼少頃到齋堂應供切忌將飯送在鼻孔裏珍重上堂問如何是金剛寶劍師云光含萬象侵人面如何是踞地獅子師云聲摧海嶽驚山鬼如何是探竿影草師云一點不來命難保如何是一喝不作一喝用師云白雲牽得青山動進云四喝未彰已前請師一接師打云切忌錯會乃云佛道間曠不涉程途建立垂真俱非本色先聖事不獲已乃有四喝之設上根利士一舉便知中下之機幸毋錯會遂喝一喝召衆云聞麼即此一喝世尊拈花也在裏許達磨西來也在裏許正偏功勳也在裏許圓相玄要也在裏許三句六義也在裏許金剛寶劍也在裏許踞地獅子也在裏許探竿影草也在裏許一喝不作一喝用也在裏許以至五車三藏一切淆訛公案亦無不在裏許復喝一喝云還會麼即此一喝是拈花耶西來意耶偏正功勳耶圓相玄要耶三句六義耶金剛寶劍耶踞地獅子耶探竿影草耶一喝不作一喝用耶五車三藏耶一切淆訛公案耶又喝一喝云即此一喝拈花也不可得西來意也不可得偏正功勳也不可得圓相玄要也不可得三句六義也不可得金剛寶劍也不可得踞地獅子也不可得探竿影草也不可得一喝不作一喝用也不可得五車三藏也不可得一切淆訛公案也不可得祇者不可得亦不可得正恁麼時諸人作麼生委悉喝一喝云切忌錯會金陵王護法誕日請上堂豎拂云大衆見麼河上老人坐古槎合丹祇用青蓮花於此見得莫道山僧措大相在寶華王座上誦他好句於此不見而今八十猶四十口道滄溟是我家晚參我見瞞人漢如籃提水走急急走歸家籃裏何曾有以拂左擊云寒山子且立者邊著我見頑鈍人燈心柱須彌蟻子囓大樹焉知氣力微以拂右擊云拾得子且立者邊著將謂你二人別有長處遇此頑瞞人境便打不過討甚好文殊普賢青龍即不然不受頑瞞不近情是非榮辱豈相侵夜深獨把香臺拍只有長天識此心大士聖誕請上堂普門大士在楊柳眼中現八萬四千爍迦羅首能以無畏施諸衆生從聞思修入三摩地復舒八萬四千母陀羅臂向空中大書今日誕生四字大衆點畫既成畢竟是何格局既非邯鄲楷法豈是懷素草書洞庭顧護法請上堂拈拄杖云一卓如出水蛟龍一卓如踞地獅子一卓尊貴兩忘一卓理事兼備大衆何為尊貴兩忘試道看問道即不無如何是出水蛟龍師云滿天雲靉靆如何是踞地獅子師云到處獸潛藏如何是尊貴兩忘師云當堂慵正坐如何是理事兼備師云覿面卻相逢進云謝師答話師便打上堂問如何是祖師西來意師云烏藤長七尺進云意旨如何師便打乃云青龍直指祖師禪不在文章錦繡邊棒下翻身能脫略長鯨吞月浪滔天晚參天欲人人與道謀肯教佛面每搜求一瓢道在高於祿五斗名傳貴似侯生死總成花上露是非誰識水中漚尋常莫畜心田草只恐將來苦未休至集慶寺衆紳襟請上堂舉一明三目機銖兩十方坐斷大地全收猶是釘樁搖櫓抱橋柱洗腳況復言中取則句裏呈機何異鄭州出曹門南轅而北轍殊不知當人腳跟下一著子天地不能包其廣日月不能並其明一言迥脫獨拔今時塵中作主化外來賓雖在途中不離家舍是處是彌勒無門無善財拈拄杖云所以者漢時或撑天拄地時或帶水拖泥帶水拖泥處不妨撑天拄地撑天拄地時奚礙帶水拖泥一動一靜歷無邊剎一語一默現無邊身是汝諸人作麼生見伊行履處卓一卓云城市不堪留錫久恐驚鶯囀畫樓前王思受李仁甫二居士請上堂金佛不度爐霜飛炎日滿皇都木佛不度火陸地蓮開千萬朵泥佛不度水一聲鐵笛雙鳧起惟有真佛屋裏坐喝一喝云切忌逢人更説破結夏上堂欲了生死大事莫若參禪為最宜乎發大信心必也具大根器內外迥絶諸緣精進堅立其志晨昏莫顧危亡行坐須加猛利不分南北東西休管飽飢寤寐卻將妄想昏沉並作話頭參覷忽朝撲落虛空佛祖安敢近視從教婢使雲門一任奴呼臨濟擊竹𡎺指拈花都是眼中著刺若也不曾恁麼切忌未會稱會般若雖乃善因開口莫當容易八十翁翁入場真誠非是兒戲果然頂門豁開自到古人地位祇如到後又若何間眺飛雲自往還一聲長嘯驚天地下座天都胡朝奉為母祝壽請上堂豎拂云無量壽佛在此放眉間白毫相光遍照恆沙國土演大般若顯大神通作大佛事能以方便智慧令諸有情所求皆遂若也端的不須動舌一句圓該不必求仙雙全福壽大衆無量壽佛既有如是威德青龍如何與他作證揮拂云恆演重重功德聚都來顯現一毫端上堂問不立功勳機用如何是曹洞宗師云金輪詔下紫泥封進云掃除玄要權衡喚甚作臨濟宗師云鐵鞭塞外打雷公進云打開一字關鍵那箇是雲門宗師云碧油幢動起清風進云拋卻多方施設將誰成溈仰宗師云明星光耀挂蒼穹進云拈去聲之與色以何為法眼宗師云萬象收歸一鑑中僧禮拜師云還有一宗聻僧擬議師便打乃云山僧未出方丈早已派演新豐踏翻韶陽斗柄源窮濟水撲滅大溈火星騎聲蓋色總為諸人漏泄了也況復升座設問又且茫然只得再請幾位無情上座為汝諸人發明本有大衆淞濤滾滾環古寺而報春回寶殿巍巍鎮龍江而分夕照浮圖秋月或暗或明自是清輝不夜靜夜聞鐘似無似有從教夢破幽人鞭泥牛耕平田之煙雨驅木偶乘竹院之晚涼遠望松林雪霽而瀑瀉崖頭近看橋畔僧歸而錫飛水面所以法法闡明箇事頭頭揭示五宗明則事同一家不明萬別千差差別且置豎拂云祇如五宗還有者箇麼參上堂即心即佛九峰煙雨眉公畫非心非佛三泖人家玄宰詩不是心不是佛不是物人從占波來卻得新羅信青龍與麼告報也是金剛與泥人揩背小參三分光陰二早過甕裏何曾走卻鱉靈臺一點不揩磨本自圓成磨甚底貪生逐日區區去不風流處也風流喚不回頭爭奈何靈利衲僧有幾箇雪竇與麼道青龍恁麼判者裏擔荷得去便可轉天關回地軸移南辰易北斗黑漆桶望空𨁝跳黃金圈匝地騰驤本自不迷今復何悟苦樂逆順得失是非皆為現行三昧山河大地明暗色空總是自己家珍頭頭上明物物上顯有甚禪道佛法之相而可分別者哉如其未然更有一偈聊資鞭影三七工夫一七過英靈莫與日消磨迷時祖意東西隔悟後佛難奈爾何問未打七時人人鼻孔撩天既打七後為何杳無消息師云道泰不傳天子令時清休唱太平歌進云恁麼則澄潭無影像片月自孤圓師云夜半一輪千嶂外韓盧空對影徘徊僧擬議師打出端午上堂今日是何時報道端陽節文殊忍不禁善財忙不徹舉頭遍界觀弄巧都成拙爭似衲僧家迥然用各別鼻不染雄黃手不捏符訣筆借須彌盧墨研滄海渤一點落虛空赤口盡消滅大衆道他憑箇甚麼便有如是奇特卓拄杖云急急如律令敕李洛文文學得男福隆請上堂舉雲門因僧問如何是和尚家風門云有讀書人來報大慧曰讀書人既到者裏且如何與伊相見不是冤家不聚頭師云雲門施格外之機大慧有超宗之辨可謂二俱敏手祇如相見後又作麼生收拾詩書歸舊隱鳥啼花笑一般春上堂拂拂秋風遍九垓晚香浮動繞仙臺空生無意巖中坐引得天花動地來若是玉老師便道修行無力卻被神鬼覷破須知青龍者裏無修無證無變無遷拄杖靠壁袈裟半肩飢則加餐倦則安眠開門七件賴彼人天不將間事罣在心田阿呵呵但得時無憎愛也勝平地登仙自省薦慈德璠雪尢請上堂昨夜青龍塔身涌虛空白鶴江口吞滄溟從教魔宮瓦解惡道潛消業海化為清涼罪山變作淨域其間若凡若聖若冤若親若男若女覓福了不可得覓罪了不可得覓生了不可得覓死了不可得覓淨了不可得覓穢了不可得只此了不可得都盧是箇大圓鏡智未審陳氏安人又在甚處行藏良久云金輪不隱的遍界絶紅塵上堂世尊拈花淨地撒沙迦葉微笑轉眼失照香嚴擊竹妄通消息靈雲見桃魚魯刁刀者夥龍鍾老兒總是倚草附木有甚交涉拈拄杖云爭似者箇孤迥迥峭巍巍有時恁麼賢愚並愛愈老愈親有時不恁麼扣人見血又道慈悲有時恁麼中不恁麼放出南山鱉鼻咬殺長沙大蟲有時不恁麼中卻恁麼青山緑水間終日明月清風富一生大衆正恁麼時如何卓一卓云手指空時天地轉回頭石馬出紗籠晚參舉同安丕禪師因僧問如何是和尚家風安云金雞抱子歸霄漢玉兔懷胎入紫微曰客來將何祗待安云金果朝來猿摘去玉花晚後鳳銜歸師云同安家風太煞尊貴有問青龍如何是和尚家風但云漏笊籬撈無米飯破砂盆搗爛生薑客來將何祗待曰飢餐渴飲渾無事聽雨聞風倦打眠解夏上堂荏苒韶光春復秋伶俜何事屢間遊家財無託誰堪惜幸有清風為解愁大衆祇如愁作麼生解高樓曾聽歌聲好你若無心我便休誕日上堂自出娘生皮袋一杖翛然物外悟得未生已前觸著虛空粉碎不知詔笑逢迎不解看經禮拜鬚眉長帶煙霞袈裟深染沆瀣有為翻作無為貴買何妨賤賣攤向十字街頭問有誰來話會且喜寶塔仙臺共證此箇三昧且如何是此箇三昧參上堂父母所生眼悉見三千界且道非非想天幾人坐臥代曰本來無位次不用更安排彌勒佛開光上堂今佛放光明助發實相義以拂子畫相云拂放光矣作麼生是實相義復畫相云發實相義矣如何是放的光明者裏見得人人頂門上有尊古佛三身四智五眼六通三十二相八十種好無量恆沙功德常在六門放光動地照古明今轉大法輪作大佛事示教利喜一切天龍八部人非人等異口同音而作言曰彌勒真彌勒分身千百億時時示時人還有道得末後句者麼弟子德費備資敬刻方丈和尚語録第一卷普願佛日增輝法輪常轉般若智以現前菩提心而不退
